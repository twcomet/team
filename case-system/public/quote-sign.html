<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>報價確認單 — 繪新國際</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif; background:#f8fafc; color:#1f2937; }
.container { max-width:720px; margin:0 auto; padding:16px; }
.brand { text-align:center; padding:20px 0 16px; border-bottom:3px solid #1a56db; margin-bottom:20px; }
.brand h1 { font-size:22px; font-weight:700; color:#1a56db; }
.brand p  { font-size:13px; color:#6b7280; margin-top:4px; }
.card { background:#fff; border-radius:12px; border:1px solid #e5e7eb; padding:18px; margin-bottom:14px; }
.card h3 { font-size:14px; font-weight:600; color:#374151; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #f3f4f6; }
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.info-item .label { font-size:11px; color:#9ca3af; margin-bottom:3px; }
.info-item .value { font-size:14px; font-weight:500; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:#f9fafb; padding:8px 10px; text-align:left; font-size:11px; color:#6b7280; border-bottom:2px solid #e5e7eb; white-space:nowrap; }
td { padding:10px; border-bottom:1px solid #f3f4f6; vertical-align:top; }
tr:last-child td { border-bottom:none; }
td.num { text-align:right; font-variant-numeric:tabular-nums; }
.totals-table { width:100%; border-collapse:collapse; }
.totals-table td { padding:6px 12px; font-size:14px; }
.totals-table td:last-child { text-align:right; font-weight:600; }
.totals-table .grand { background:#1a56db; color:#fff; border-radius:8px; }
.totals-table .grand td { padding:10px 12px; font-size:16px; }
.discount-row td { color:#059669; }
.sig-section { background:#fff; border-radius:12px; border:2px solid #1a56db; padding:20px; margin-bottom:14px; }
.sig-section h3 { font-size:15px; font-weight:600; color:#1a56db; margin-bottom:8px; }
.sig-desc { font-size:13px; color:#4b5563; margin-bottom:14px; line-height:1.6; }
#sigCanvas { width:100%; height:180px; border:2px dashed #d1d5db; border-radius:8px; background:#fafafa; cursor:crosshair; touch-action:none; display:block; }
#sigCanvas.has-sig { border-color:#1a56db; border-style:solid; background:#fff; }
.sig-controls { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
.btn { padding:10px 20px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; }
.btn-primary { background:#1a56db; color:#fff; width:100%; padding:14px; font-size:15px; margin-top:16px; border-radius:10px; }
.btn-ghost   { background:#f3f4f6; color:#374151; font-size:13px; padding:8px 14px; }
.accepted-box { background:#d1fae5; border:2px solid #6ee7b7; border-radius:12px; padding:24px; text-align:center; margin-bottom:14px; }
.accepted-box h2 { color:#065f46; font-size:20px; margin-bottom:8px; }
.accepted-box p  { color:#047857; font-size:14px; }
.validity-bar { background:#fef9c3; border:1px solid #fcd34d; border-radius:8px; padding:10px 14px; font-size:13px; color:#713f12; margin-bottom:14px; text-align:center; }
.marketing-badge { display:inline-block; background:#ede9fe; color:#5b21b6; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; }
@media print {
  .sig-section, .btn-primary, .sig-controls, .validity-bar { display:none !important; }
  body { background:#fff; }
  .card, .brand { border:none; box-shadow:none; }
}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="brand">
    <h1>🎨 繪新國際有限公司</h1>
    <p>報價確認單</p>
  </div>
  <div id="content">
    <p style="text-align:center;color:#6b7280;padding:40px">載入中…</p>
  </div>
</div>

<script>
const token = location.pathname.split('/quote/')[1]?.split('?')[0];
const printMode = new URLSearchParams(location.search).get('print') === '1';

async function load() {
  const res = await fetch(`/api/quotes/sign/${token}`);
  if (!res.ok) {
    document.getElementById('content').innerHTML = '<p style="text-align:center;color:#e02424;padding:40px">找不到此報價單，連結可能已失效。</p>';
    return;
  }
  const q = await res.json();
  render(q);
  if (printMode) setTimeout(() => window.print(), 800);
}

function fmt(n) {
  return 'NT$' + Number(n || 0).toLocaleString('zh-TW', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function render(q) {
  const accepted = q.status === 'accepted';
  const items = q.items || [];

  // 計算金額
  const subtotal = items.reduce((s, i) => s + (i.display_subtotal || 0), 0);

  const CLIENT_TYPE_LABEL = { owner:'一般業主', designer:'設計師', dealer:'經銷商' };
  const FOLD_LABEL = { 5:'95折', 10:'9折', 20:'8折', 30:'7折' };

  let discountAmt = 0;
  let discountLabel = '';
  const discVal = q.discount_value || 0;
  if (q.discount_type === 'marketing' && discVal > 0) {
    discountAmt = subtotal * (discVal / 100);
    const foldStr = FOLD_LABEL[discVal] || `${100-discVal}折`;
    discountLabel = `行銷優惠 ${foldStr}（-${discVal}%）`;
  }

  const afterDiscount = subtotal - discountAmt;
  const vat = afterDiscount * 0.05;
  const total = afterDiscount + vat;

  // 有效期限
  const createdDate = new Date(q.created_at);
  const expiryDate = new Date(createdDate);
  expiryDate.setDate(expiryDate.getDate() + (q.valid_days || 30));
  const today = new Date();
  const isExpired = today > expiryDate;
  const expiryStr = expiryDate.toLocaleDateString('zh-TW');

  // 報價單編號（案件號 + 版本）
  const quoteNum = `${q.case_number}-Q${q.version || 1}`;

  document.getElementById('content').innerHTML = `
    ${accepted ? `
    <div class="accepted-box">
      <h2>✅ 報價已確認接受</h2>
      <p>確認時間：${q.client_accepted_at ? q.client_accepted_at.slice(0,16).replace('T',' ') : ''}</p>
    </div>` : isExpired ? `
    <div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:12px 16px;font-size:13px;color:#991b1b;margin-bottom:14px;text-align:center">
      ⚠️ 此報價單已超過有效期限（${expiryStr}），如需重新報價請聯繫業務人員。
    </div>` : `
    <div class="validity-bar">📅 本報價單有效期限至 <strong>${expiryStr}</strong>（共 ${q.valid_days || 30} 天）</div>`}

    <div class="card">
      <h3>報價資訊</h3>
      <div class="info-grid">
        <div class="info-item"><div class="label">報價單號</div><div class="value" style="font-family:monospace">${quoteNum}</div></div>
        <div class="info-item"><div class="label">報價日期</div><div class="value">${q.created_at?.slice(0,10) || '—'}</div></div>
        <div class="info-item"><div class="label">客戶</div><div class="value">${q.client_name || '—'}</div></div>
        <div class="info-item"><div class="label">業務 / 聯絡人</div><div class="value">${q.creator_name || '—'}</div></div>
        ${q.client_type ? `<div class="info-item"><div class="label">客戶身份</div><div class="value">${CLIENT_TYPE_LABEL[q.client_type] || q.client_type}</div></div>` : ''}
        ${q.location ? `<div class="info-item" style="grid-column:1/-1"><div class="label">施工地點</div><div class="value">${q.location}</div></div>` : ''}
      </div>
    </div>

    ${items.length ? `
    <div class="card">
      <h3>報價明細</h3>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>施作位置 / 物件</th>
              <th>材料</th>
              <th>尺寸</th>
              <th style="text-align:right">數量</th>
              <th style="text-align:right">單價</th>
              <th style="text-align:right">小計</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(it => {
              const loc = it.location || it.description || it.item_type || '';
              const mat = [it.material_brand, it.material_model].filter(Boolean).join(' ');
              let dimStr = '';
              if (it.width_cm && it.height_cm) dimStr = `${it.width_cm}×${it.height_cm} cm`;
              const unitLabel = it.unit === '才' ? `${(it.area||0).toFixed(1)}才` :
                                it.unit === '平方公尺' ? `${(it.area||0).toFixed(2)}m²` :
                                `${it.quantity||1}${it.unit}`;
              const upStr = it.display_unit_price != null ? fmt(it.display_unit_price) + `/${it.unit}` : '—';
              return `<tr>
                <td><strong>${loc}</strong></td>
                <td style="color:#6b7280">${mat || '—'}</td>
                <td style="color:#6b7280;white-space:nowrap">${dimStr}</td>
                <td class="num">${unitLabel}</td>
                <td class="num">${upStr}</td>
                <td class="num" style="font-weight:600">${fmt(it.display_subtotal)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>

      <div style="margin-top:16px;border-top:2px solid #e5e7eb;padding-top:16px">
        <table class="totals-table">
          <tr><td style="color:#6b7280">小計</td><td>${fmt(subtotal)}</td></tr>
          ${discountAmt > 0 ? `
          <tr class="discount-row">
            <td>🎁 ${discountLabel} <span class="marketing-badge">行銷優惠</span></td>
            <td>- ${fmt(discountAmt)}</td>
          </tr>` : ''}
          ${discountAmt > 0 ? `<tr><td style="color:#6b7280">折後小計</td><td>${fmt(afterDiscount)}</td></tr>` : ''}
          <tr><td style="color:#6b7280">稅金 (5%)</td><td>${fmt(vat)}</td></tr>
          <tr class="grand">
            <td style="border-radius:8px 0 0 8px">總金額（含稅）</td>
            <td style="border-radius:0 8px 8px 0;font-size:18px">${fmt(total)}</td>
          </tr>
        </table>
      </div>
    </div>` : ''}

    ${q.payment_terms ? `
    <div class="card">
      <h3>付款條件</h3>
      <p style="font-size:14px;color:#374151;line-height:1.7">${q.payment_terms.replace(/\n/g,'<br>')}</p>
    </div>` : ''}

    ${q.client_notes ? `
    <div class="card">
      <h3>備註 / 說明</h3>
      <p style="font-size:14px;color:#374151;line-height:1.7">${q.client_notes.replace(/\n/g,'<br>')}</p>
    </div>` : ''}

    ${!accepted && !isExpired ? `
    <div class="sig-section">
      <h3>確認接受報價</h3>
      <p class="sig-desc">請確認以上報價內容無誤後，在下方空白處簽名，完成後點擊「確認並接受報價」。本報價經客戶簽名確認後即視為正式委託。</p>
      <canvas id="sigCanvas" width="640" height="180"></canvas>
      <div class="sig-controls">
        <span style="font-size:12px;color:#9ca3af">請在上方框內簽名</span>
        <button class="btn btn-ghost" onclick="clearSig()">清除重寫</button>
      </div>
      <button class="btn btn-primary" onclick="submitSig()">確認並接受報價</button>
    </div>` : ''}

    ${accepted && q.client_signature ? `
    <div class="card" style="text-align:center">
      <h3>客戶確認簽名</h3>
      <img src="${q.client_signature}" style="max-width:300px;border:1px solid #e5e7eb;border-radius:8px">
      <p style="font-size:12px;color:#6b7280;margin-top:8px">確認時間：${q.client_accepted_at?.slice(0,16).replace('T',' ')}</p>
    </div>` : ''}

    <div style="text-align:center;padding:20px 0;font-size:12px;color:#9ca3af">
      此報價單由 繪新國際有限公司 提供<br>
      如有疑問請聯繫業務人員
    </div>
  `;

  if (!accepted && !isExpired) setupCanvas();
}

function setupCanvas() {
  const canvas = document.getElementById('sigCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.strokeStyle = '#1f2937';
  ctx.lineWidth   = 2.5;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  let drawing = false;
  const getPos = e => {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  };
  canvas.addEventListener('pointerdown', e => {
    drawing = true;
    canvas.classList.add('has-sig');
    const {x,y} = getPos(e);
    ctx.beginPath(); ctx.moveTo(x, y);
  });
  canvas.addEventListener('pointermove', e => {
    if (!drawing) return;
    e.preventDefault();
    const {x,y} = getPos(e);
    ctx.lineTo(x, y); ctx.stroke();
  });
  canvas.addEventListener('pointerup',    () => { drawing = false; });
  canvas.addEventListener('pointerleave', () => { drawing = false; });
}

function clearSig() {
  const canvas = document.getElementById('sigCanvas');
  if (!canvas) return;
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  canvas.classList.remove('has-sig');
}

async function submitSig() {
  const canvas = document.getElementById('sigCanvas');
  if (!canvas || !canvas.classList.contains('has-sig')) {
    alert('請先在上方框內簽名'); return;
  }
  const sig = canvas.toDataURL('image/png');
  const res = await fetch(`/api/quotes/sign/${token}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ signature: sig })
  });
  if (res.ok) {
    load();
  } else {
    const err = await res.json().catch(() => ({}));
    alert(err.error || '送出失敗，請重試');
  }
}

load();
</script>
</body>
</html>
