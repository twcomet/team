<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>繪新國際 — 報價確認單</title>
<link rel="icon" href="/logo.png" type="image/png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#d6336c;--primary-dark:#a41f52;--primary-bg:#fce7ef;--space:#3a1226;
  --gray-50:#faf7f8;--gray-100:#f3eef1;--gray-200:#e9e0e5;--gray-300:#d8ccd2;
  --gray-400:#ad9fa7;--gray-500:#877d83;--gray-600:#675d63;--gray-700:#463c42;--gray-900:#241d20;
  --ok:#1f8a5b;--ok-bg:#e4f4ec;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#eee7ea;color:var(--gray-900);min-height:100vh;font-size:15px;-webkit-font-smoothing:antialiased}
.page{max-width:1000px;margin:0 auto;padding:0 0 40px}
.tnum{font-variant-numeric:tabular-nums}

.header{background:linear-gradient(135deg,var(--space) 0%,#5a1a3a 60%,#7a2450 100%);padding:24px 26px 20px;text-align:center;color:#fff}
.header-mark{height:26px;width:auto;margin:0 8px 0 0;display:inline-block;vertical-align:middle;filter:brightness(0) invert(1)}
.header-logo{font-size:12px;color:rgba(255,255,255,.72);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.header-company{font-size:22px;font-weight:800;letter-spacing:.02em;margin-bottom:4px}
.header-doc{font-size:12px;color:rgba(255,255,255,.8);letter-spacing:.04em}
.header-num{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:3px 14px;font-size:12px;font-family:monospace;margin-top:8px;letter-spacing:.06em}

.body{background:#fff;margin:0 12px;border-radius:0 0 16px 16px;box-shadow:0 4px 24px rgba(60,20,40,.1)}
.status-bar{padding:13px 22px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--gray-100)}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-text{font-size:13px;font-weight:700}
.validity-text{font-size:12px;color:var(--gray-400);margin-left:auto}

.section{padding:18px 22px;border-bottom:1px solid var(--gray-100)}
.section:last-child{border-bottom:none}
.section-title{font-size:11px;font-weight:800;color:var(--gray-500);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}

/* 甲乙方 */
.party{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--gray-200);border-radius:11px;overflow:hidden;font-size:12.5px}
.party>div{padding:12px 15px}
.party>div:first-child{border-right:1px solid var(--gray-200);background:var(--gray-50)}
.party b{color:var(--gray-900);font-size:13px}
.party .r{color:var(--gray-600);margin-top:4px;line-height:1.8}

/* 報價表格 */
.qwrap{border:1px solid var(--gray-300);border-radius:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.qtbl{min-width:640px}
.scroll-hint{display:none;font-size:11px;color:var(--gray-400);margin:6px 2px 0;text-align:right}
@media(max-width:640px){ .scroll-hint{display:block} }
.qtbl{width:100%;border-collapse:collapse;font-size:12.5px;table-layout:fixed}
.qtbl td,.qtbl th{overflow:hidden;word-break:break-word}
.qtbl th{background:var(--space);color:#fff;font-weight:700;padding:10px 8px;text-align:center;font-size:11.5px;border-right:1px solid rgba(255,255,255,.14);white-space:nowrap}
.qtbl td{border:1px solid var(--gray-200);padding:11px 9px;vertical-align:top}
.qtbl td.c{text-align:center;vertical-align:middle}
.qtbl td.num{text-align:right;vertical-align:middle;font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:600}
.q-name{font-weight:800;font-size:13.5px;margin-bottom:6px;line-height:1.4}
.q-note div{font-size:11.5px;line-height:1.8;color:var(--gray-700)}
.q-note div.em{color:#d81f1f;font-weight:700}
.q-size{font-size:11px;color:var(--gray-500);margin-top:7px;border-top:1px dashed var(--gray-200);padding-top:6px}
.q-film{font-size:11.5px;line-height:1.85;text-align:center;color:var(--gray-700)}
.q-film .hi{color:var(--primary-dark);font-weight:800}
.q-film-img{width:64px;height:90px;max-width:100%;border-radius:6px;object-fit:cover;margin:0 auto;display:block;background:linear-gradient(160deg,#d8b98a,#a9855a 45%,#8a6d4b)}
.q-film-ph{width:64px;height:90px;max-width:100%;border-radius:6px;margin:0 auto;background:linear-gradient(160deg,#d8b98a,#a9855a 45%,#8a6d4b);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.9);font-size:18px}
.q-photo,.q-photo-ph{width:100%;max-width:150px;aspect-ratio:3/4;border-radius:9px;margin:0 auto;object-fit:cover;display:block;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
.q-photo{cursor:zoom-in}
.q-photo-ph{background:linear-gradient(160deg,#dbe3e9,#a9b6c0);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#41505c;font-size:12px;font-weight:700;gap:7px}
.q-photo-ph .em{font-size:34px}
.q-thumbs{display:flex;gap:4px;justify-content:center;margin-top:5px;flex-wrap:wrap}
.q-thumbs img{width:34px;height:44px;object-fit:cover;border-radius:4px;cursor:zoom-in;border:1px solid var(--gray-200)}
.q-gallery{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.q-gallery img{width:64px;height:64px;object-fit:cover;border-radius:6px;cursor:zoom-in;border:1px solid var(--gray-200)}
.lb-nav{position:fixed;top:50%;transform:translateY(-50%);width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.16);color:#fff;font-size:30px;display:grid;place-items:center;cursor:pointer;user-select:none}
.lb-nav.prev{left:16px} .lb-nav.next{right:16px}
.lb-count{position:fixed;bottom:22px;left:0;right:0;text-align:center;color:#fff;font-size:14px;font-weight:600;letter-spacing:.05em}
.q-orig{text-decoration:line-through;color:var(--gray-400);font-weight:500}
.q-promo{font-weight:800;color:var(--primary-dark);font-size:14px}

/* 金額 */
.amt{margin-top:2px}
.amt .row{display:flex;justify-content:space-between;align-items:center;font-size:13.5px;padding:5px 0}
.amt .row .l{color:var(--gray-600)}
.amt .row .v{font-weight:600;font-variant-numeric:tabular-nums}
.amt .row.disc .l,.amt .row.disc .v{color:var(--primary-dark)}
.amt hr{border:none;border-top:1px dashed var(--gray-200);margin:6px 0}
.amt .total{display:flex;justify-content:space-between;align-items:center;background:var(--space);border-radius:11px;padding:14px 18px;margin-top:10px;color:#fff}
.amt .total .l{font-size:13px;color:rgba(255,255,255,.85);font-weight:600}
.amt .total .v{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}

/* 行銷優惠 */
.mkt{border:2px solid var(--primary);border-radius:12px;padding:15px;margin-top:14px;background:var(--primary-bg)}
.mkt h4{font-size:14px;font-weight:800;color:var(--primary-dark);margin-bottom:4px}
.mkt .desc{font-size:12px;color:var(--gray-600);line-height:1.6}
.mkt .cmp{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.mkt .cmp .col{background:#fff;border:1px solid var(--gray-200);border-radius:11px;padding:12px;text-align:center}
.mkt .cmp .col.on{border-color:var(--primary);box-shadow:0 0 0 3px rgba(214,51,108,.14)}
.mkt .cmp .t{font-size:11px;color:var(--gray-500);font-weight:700}
.mkt .cmp .val{font-size:19px;font-weight:900;margin-top:3px;font-variant-numeric:tabular-nums}
.mkt label{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:700;cursor:pointer;color:var(--gray-900)}
.mkt label input{width:18px;height:18px;accent-color:var(--primary)}

/* 條款 fold */
.fold{border:1px solid var(--gray-200);border-radius:10px;margin-bottom:9px;overflow:hidden}
.fold-h{padding:12px 15px;font-weight:700;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;background:var(--gray-50)}
.fold-b{padding:0 15px;max-height:0;overflow:hidden;transition:max-height .25s;font-size:12.5px;color:var(--gray-700);line-height:1.85;white-space:pre-line}
.fold-b .em{color:#d81f1f;font-weight:700}
.fold-b img.clause-img{display:block;max-width:100%;margin:10px 0 2px;border:1px solid #eee;border-radius:8px}
.fold.open .fold-b{max-height:1200px;padding:12px 15px}

/* 簽名 */
.accepted-banner{background:var(--ok-bg);border-top:3px solid #10b981;padding:20px;text-align:center}
.accepted-banner .ab-icon{font-size:36px;margin-bottom:8px}
.accepted-banner .ab-title{font-size:17px;font-weight:700;color:#065f46;margin-bottom:4px}
.accepted-banner .ab-time{font-size:12px;color:#047857}
.sig-section{padding:20px 22px}
.sig-title{font-size:15px;font-weight:800;color:var(--primary-dark);margin-bottom:8px}
.sig-desc{font-size:13px;color:var(--gray-600);margin-bottom:16px;line-height:1.6}
#sigCanvas{width:100%;height:180px;border:2px dashed var(--gray-300);border-radius:10px;background:#fafafa;cursor:crosshair;touch-action:none;display:block}
#sigCanvas.has-sig{border:2px solid var(--primary);background:#fff}
.sig-controls{display:flex;justify-content:space-between;align-items:center;margin:8px 0 16px}
.sig-hint{font-size:12px;color:var(--gray-400)}
.btn-clear{background:var(--gray-100);color:var(--gray-600);border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;font-weight:600}
.btn-submit{display:block;width:100%;padding:16px;background:linear-gradient(145deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.04em}
.btn-submit:disabled{background:var(--gray-400);cursor:not-allowed}
.btn-submit.btn-locked:disabled{background:linear-gradient(145deg,#10b981,#059669);opacity:1;cursor:default;letter-spacing:.06em}
.sig-image-card{text-align:center;padding:16px}
.sig-image-card img{max-width:280px;width:100%;border:1px solid var(--gray-200);border-radius:8px}
.sig-image-card .sig-time{font-size:12px;color:var(--gray-400);margin-top:8px}
.expired-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:16px 20px;text-align:center;margin:16px}
.expired-box .exp-icon{font-size:28px;margin-bottom:8px}
.expired-box p{font-size:13px;color:#9a3412;line-height:1.6}
.footer{text-align:center;padding:20px 16px 0;font-size:11px;color:var(--gray-400);line-height:1.8}
.print-bar{text-align:center;padding:16px;display:flex;justify-content:center;gap:10px}
.btn-print{background:linear-gradient(145deg,var(--primary),var(--primary-dark));border:none;color:#fff;border-radius:9px;padding:11px 24px;font-size:14px;cursor:pointer;font-weight:700;box-shadow:0 4px 14px -4px rgba(164,31,82,.5)}

/* lightbox */
.lb{position:fixed;inset:0;background:rgba(10,4,8,.88);display:none;align-items:center;justify-content:center;z-index:120;padding:24px}
.lb.on{display:flex}
.lb img{max-width:92vw;max-height:90vh;border-radius:10px;box-shadow:0 20px 60px -18px rgba(0,0,0,.7)}
.lb .x{position:fixed;top:16px;right:20px;color:#fff;font-size:26px;cursor:pointer;background:rgba(255,255,255,.15);width:42px;height:42px;border-radius:50%;display:grid;place-items:center}

@media print{
  @page{size:A4;margin:10mm}
  body{background:#fff}
  .page{max-width:100%}
  .body{box-shadow:none;margin:0;border-radius:0}
  .header{background:var(--space)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .qtbl th{background:var(--space)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .amt .total{background:var(--space)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .qwrap{overflow:visible}
  .qtbl{min-width:0}
  .q-photo,.q-photo-ph{width:150px;height:200px}
  .sig-section .btn-submit,.sig-controls,.print-bar,.mkt label{display:none!important}
  .fold-b{max-height:none!important;padding:8px 15px!important}
  /* 段落盡量不跨頁：每個區塊/表格列/條款/方框整塊留在同一 A4 */
  .fold,.qtbl tr,.party,.mkt,.amt,.sig-image-card,.status-bar{break-inside:avoid;page-break-inside:avoid}
  .section-title{break-after:avoid;page-break-after:avoid}
  .section{break-inside:avoid;page-break-inside:avoid;padding:13px 20px}
  .header{padding:16px 22px 14px}
  .header-mark{height:22px}
  .clause-img,.q-photo img,.q-film-photo{break-inside:avoid}
}
</style>
</head>
<body>
<div class="page">
  <div id="app"><div style="text-align:center;padding:80px 20px;color:var(--gray-400);font-size:14px">載入中…</div></div>
  <div class="print-bar" id="printBar" style="display:none">
    <button class="btn-print" onclick="window.print()">📄 下載 / 列印 PDF</button>
  </div>
</div>
<div class="lb" id="lb" onclick="if(event.target.id==='lb')closeLb()">
  <div class="x" onclick="closeLb()">✕</div>
  <div class="lb-nav prev" id="lbPrev" onclick="galStep(-1)">‹</div>
  <img id="lbImg" src="" alt="">
  <div class="lb-nav next" id="lbNext" onclick="galStep(1)">›</div>
  <div class="lb-count" id="lbCount"></div>
</div>

<script>
const token   = location.pathname.split('/quote/')[1]?.split('?')[0];
const isPrint = new URLSearchParams(location.search).get('print') === '1';
let quoteData = null, agreeMkt = false;

const fmt = n => 'NT$ ' + Math.round(n||0).toLocaleString('zh-TW');
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
function weekdayZh(d){ if(!d) return ''; const m=String(d).match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return ''; const dt=new Date(+m[1],+m[2]-1,+m[3]); if(isNaN(dt.getTime())) return ''; return '（'+['日','一','二','三','四','五','六'][dt.getDay()]+'）'; }

// 貼覆項目說明：行首「!」＝紅字重點
function noteHtml(note){
  return String(note||'').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    const em=/^[!！]/.test(l); const t=esc(l.replace(/^[!！]\s*/,''));   // 同時認全形！與半形!
    return em?`<div class="em">${t}</div>`:`<div>${t}</div>`;
  }).join('');
}
function filmInfo(it){
  const brand=[it.film_brand].filter(Boolean).join('');
  const model=it.film_model||it.film_spec||'';
  const w=it.film_width_cm;
  return `${brand?'品牌：'+esc(brand)+'<br>':''}${model?'型號：<span class="hi">'+esc(model)+'</span><br>':''}${w?'膜料寬度 '+w+' 公分':''}` || '—';
}
function siteThumbs(it){
  let arr=[]; try{ arr=JSON.parse(it.area_photos||'[]'); }catch(e){}
  const all=[]; const seen=new Set();
  [it.area_photo_url,...arr].forEach(u=>{ if(u&&!seen.has(u)){ seen.add(u); all.push(u); } });
  if(!all.length) return `<div class="q-photo-ph"><div class="em">📷</div>現場照</div>`;
  // 全部照片整齊排成縮圖牆，點任一張開燈箱可翻頁
  return `<div class="q-gallery">${all.map(u=>`<img src="${esc(u)}" onclick="openGal(this)" alt="現場照">`).join('')}</div>`;
}
function filmImg(it){
  return it.material_photo_url
    ? `<img class="q-film-img" src="${esc(it.material_photo_url)}" onclick="openLb('${esc(it.material_photo_url)}')" alt="膜料">`
    : `<div class="q-film-ph">🎞️</div>`;
}
const promoOf = it => (it.promo_price!=null?it.promo_price:it.subtotal)||0;

async function load(){
  const res = await fetch(`/api/quotes/sign/${token}`);
  if(!res.ok){
    document.getElementById('app').innerHTML = `<div style="text-align:center;padding:60px 24px"><div style="font-size:40px;margin-bottom:16px">🔍</div><div style="font-size:16px;font-weight:600;color:#991b1b;margin-bottom:8px">找不到此報價單</div><div style="font-size:13px;color:var(--gray-400)">連結可能已失效，請洽業務人員重新傳送。</div></div>`;
    return;
  }
  quoteData = await res.json();
  render(quoteData);
  document.getElementById('printBar').style.display='';
  if(isPrint) setTimeout(()=>window.print(),800);
}

function render(q){
  const accepted = q.status==='accepted';
  const items = q.items||[];
  const hideChi = !!q.hide_chi;
  const quoteNum = `${q.case_number||'QT'}-v${q.version||1}`;
  const created = new Date(q.created_at);
  const expiry = new Date(created); expiry.setDate(expiry.getDate()+(q.valid_days||30));
  const isExpired = !accepted && new Date()>expiry;
  const expiryStr = expiry.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});

  // 金額（v2：subtotal=原價, discount_value=優惠後, marketing_total=行銷後, final_total=同意拍照應付）
  const subtotal = q.subtotal||0;
  const promoTotal = q.discount_value!=null?q.discount_value:subtotal;
  const afterMkt = q.marketing_total!=null?q.marketing_total:promoTotal;
  const taxRate = q.tax_rate||0.05;
  const mktCut = Math.max(0, promoTotal-afterMkt);
  const hasMkt = mktCut>0;
  const deduction = Math.max(0, (afterMkt + (q.tax_amount||0)) - (q.final_total||0));
  const payAgree = q.final_total||0;                                   // 同意拍照
  const payNormal = Math.round(promoTotal*(1+taxRate)) - deduction;    // 不同意拍照
  const stateMap = { draft:{dot:'#d1d5db',text:'草稿',c:'#6b7280'}, sent:{dot:'#d6336c',text:'待確認',c:'#a41f52'}, accepted:{dot:'#10b981',text:'已確認接受',c:'#065f46'}, rejected:{dot:'#ef4444',text:'已拒絕',c:'#991b1b'} };
  const st = stateMap[q.status]||stateMap.sent;

  const colspan = hideChi ? 6 : 6; // 貼覆項目起算的合併欄(自由文字列用)

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-logo"><img class="header-mark" src="/logo.png" alt="" onerror="this.style.display='none'">${esc(q.org_name||'繪新國際有限公司')}</div>
      <div class="header-company">報價確認單</div>
      <div class="header-num">${quoteNum}</div>
    </div>
    <div class="body">
      <div class="status-bar">
        <div class="status-dot" style="background:${st.dot}"></div>
        <div class="status-text" style="color:${st.c}">${st.text}</div>
        ${!accepted && !isExpired ? `<div class="validity-text">有效至 ${expiryStr}</div>`:''}
        ${isExpired ? `<div class="validity-text" style="color:#dc2626">已於 ${expiryStr} 失效</div>`:''}
      </div>
      ${accepted ? `<div class="accepted-banner"><div class="ab-icon">✅</div><div class="ab-title">報價已確認接受</div><div class="ab-time">確認時間：${(q.client_accepted_at||'').slice(0,16).replace('T',' ')}</div></div>`:''}
      ${isExpired && !accepted ? `<div class="expired-box"><div class="exp-icon">⏰</div><p>此報價單已超過有效期限（${expiryStr}）。<br>如需重新報價，請聯繫業務人員。</p></div>`:''}

      <div class="section">
        <div class="section-title">甲乙方資訊</div>
        <div class="party">
          <div><b>${esc(q.org_name||'繪新國際有限公司')}（甲方）</b><div class="r">${q.org_tax_id?'統一編號 '+esc(q.org_tax_id)+'<br>':''}${q.org_phone?'聯絡電話 '+esc(q.org_phone)+'<br>':''}${q.org_address?'公司地址 '+esc(q.org_address)+'<br>':''}業務負責人 ${esc(q.creator_name||'—')}</div></div>
          <div><b>${esc(q.client_name||'—')}（乙方）</b><div class="r">${q.client_phone?'聯絡電話 '+esc(q.client_phone)+'<br>':''}${q.location?'施工地點 '+esc(q.location):''}</div></div>
        </div>
        <div style="font-size:12px;color:var(--gray-500);margin-top:8px">報價日期 ${(q.created_at||'').slice(0,10)}${weekdayZh(q.created_at)}${q.title?'　·　專案 '+esc(q.title):''}</div>
      </div>

      ${items.length ? `
      <div class="section">
        <div class="section-title">訂單資訊（共 ${items.length} 項）</div>
        <div class="qwrap"><table class="qtbl">
          <thead><tr>
            <th style="width:34px">項目</th><th>貼覆項目</th>
            <th style="width:124px">膜料資訊</th><th style="width:74px">膜料示意圖</th><th style="width:132px">貼覆區域（現場照）</th>
            ${hideChi?'':'<th style="width:88px;white-space:normal">連工帶料單價</th>'}<th style="width:42px">數量</th>
            <th style="width:108px;white-space:nowrap">連工帶料總價</th><th style="width:120px;white-space:nowrap">連工帶料優惠價</th>
          </tr></thead>
          <tbody>${items.map((it,i)=>rowHtml(it,i,hideChi)).join('')}</tbody>
        </table></div>
        <div class="scroll-hint">← 左右滑動可看數量與價格 →</div>
      </div>`:''}

      <div class="section">
        <div class="section-title">金額合計</div>
        <div class="amt">
          <div class="row"><span class="l">各項總價合計（未稅）</span><span class="v">${fmt(subtotal)}</span></div>
          <div class="row disc"><span class="l">各項優惠價合計（未稅）</span><span class="v">${fmt(promoTotal)}</span></div>
          ${hasMkt?`<div class="row disc"><span class="l">🎁 行銷優惠折抵（同意拍照才享）</span><span class="v">− ${fmt(mktCut)}</span></div>`:''}
          <hr>
          <div class="row"><span class="l">稅金（${Math.round(taxRate*100)}%）</span><span class="v">${fmt(Math.round((hasMkt?afterMkt:promoTotal)*taxRate))}</span></div>
          ${deduction>0?`<div class="row disc"><span class="l">🧾 折抵合計（預付金／彈性）</span><span class="v">− ${fmt(deduction)}</span></div>`:''}
        </div>
        <div class="amt"><div class="total"><span class="l">應付總金額${hasMkt?'（同意拍照）':''}</span><span class="v">${fmt(hasMkt?payAgree:payNormal)}</span></div></div>

        ${hasMkt && !accepted ? `
        <div class="mkt">
          <h4>🎁 行銷優惠方案</h4>
          <div class="desc">同意繪新於施工時拍照攝影紀錄、授權用於官網及社群（不揭露個資），即可享行銷優惠價。</div>
          <div class="cmp">
            <div class="col ${agreeMkt?'':'on'}" id="colNormal"><div class="t">不同意拍照（優惠價）</div><div class="val">${fmt(payNormal)}</div></div>
            <div class="col ${agreeMkt?'on':''}" id="colMkt"><div class="t">同意拍照（行銷優惠價）</div><div class="val" style="color:var(--primary-dark)">${fmt(payAgree)}</div></div>
          </div>
          <label><input type="checkbox" id="mktCheck" ${agreeMkt?'checked':''} onchange="onMkt(this.checked)"> 我同意拍照攝影紀錄並授權用於媒體，選擇行銷優惠價</label>
        </div>`:''}
      </div>

      ${foldsHtml(q)}

      ${!accepted && !isExpired ? `
      <div class="sig-section">
        <div class="sig-title">確認並接受報價</div>
        <p class="sig-desc">請確認以上報價內容無誤後，在下方以手指或滑鼠簽名，完成後點「確認接受報價」。經簽名確認即視為正式委託授權。不方便線上簽者，可按下方「下載 / 列印 PDF」印出簽名後回傳。</p>
        <canvas id="sigCanvas"></canvas>
        <div class="sig-controls"><span class="sig-hint">↑ 請在框內簽名</span><button class="btn-clear" onclick="clearSig()">清除重寫</button></div>
        <button class="btn-submit" id="submitBtn" onclick="submitSig()">確認接受報價</button>
      </div>`:''}
      ${accepted && q.client_signature ? `<div class="sig-image-card section"><div class="section-title">客戶確認簽名</div><img src="${q.client_signature}" alt="客戶簽名"><div class="sig-time">確認時間：${(q.client_accepted_at||'').slice(0,16).replace('T',' ')}</div></div>`:''}
      ${accepted ? `<div class="sig-section" style="text-align:center">
        <button class="btn-submit btn-locked" disabled>✅ 已確認報價單</button>
        <div style="font-size:12px;color:var(--gray-500);margin-top:10px;line-height:1.6">本報價單已確認接受並鎖定，如需修改請聯繫業務人員。<br>可按下方「下載 / 列印 PDF」保存本報價確認單。</div>
      </div>`:''}
    </div>
    <div class="footer">${esc(q.org_name||'繪新國際有限公司')} · 報價單 ${quoteNum}<br>如有疑問請聯繫業務人員</div>
  `;
  if(!accepted && !isExpired) setupCanvas();
}

function rowHtml(it,i,hideChi){
  if(it.row_kind==='text'){
    const priced=(it.subtotal||0)>0;
    return `<tr><td class="c" style="font-weight:700">${i+1}</td>
      <td colspan="${hideChi?3:4}" style="background:var(--gray-50)"><div class="q-name">${esc(it.description||it.location||'')}</div><div class="q-note">${noteHtml(it.notes)}</div></td>
      ${hideChi?'':`<td class="num">${priced?fmt(it.unit_price):'—'}</td>`}
      <td class="num">${priced?(it.quantity||1):'—'}</td>
      <td class="num q-orig">${priced?fmt(it.subtotal):'—'}</td>
      <td class="num">${priced?`<span class="q-promo">${fmt(promoOf(it))}</span>`:'—'}</td></tr>`;
  }
  return `<tr>
    <td class="c" style="font-weight:700">${i+1}</td>
    <td><div class="q-name">${esc(it.description||it.location||'')}</div><div class="q-note">${noteHtml(it.notes)}</div>${it.size_text?`<div class="q-size">尺寸：${esc(it.size_text)}</div>`:''}</td>
    <td class="q-film">${filmInfo(it)}</td>
    <td class="c">${filmImg(it)}</td>
    <td class="c">${siteThumbs(it)}</td>
    ${hideChi?'':`<td class="num">${it.unit_price?fmt(it.unit_price)+(it.calc_mode==='cai'?' /才':it.calc_mode==='material'?' /米':''):'—'}</td>`}
    <td class="num">${it.quantity||1}</td>
    <td class="num q-orig">${fmt(it.subtotal)}</td>
    <td class="num"><span class="q-promo">${fmt(promoOf(it))}</span></td>
  </tr>`;
}

function foldsHtml(q){
  let bi={}; try{ bi=JSON.parse(q.block_images||'{}')||{}; }catch(e){}
  const imgsOf=k=>(k&&Array.isArray(bi[k]))?bi[k]:[];
  const blocks = [
    ['報價單優惠條款', q.notes_terms, 'terms'],
    ['貼膜前須知', q.notes_notice, 'notice'],
    ['驗收須知', q.notes_inspection, 'inspection'],
    ['付款條件', q.payment_terms, null],
    ['回簽 / 訂單簽核資訊', q.notes_acceptance, 'acceptance'],
  ].filter(b=>b[1] || imgsOf(b[2]).length);
  if(!blocks.length) return '';
  return `<div class="section"><div class="section-title">條款與須知</div>
    ${blocks.map(b=>{
      const imgHtml=imgsOf(b[2]).map(u=>`<img class="clause-img" src="${esc(u)}" alt="">`).join('');
      return `<div class="fold open" onclick="this.classList.toggle('open')"><div class="fold-h">${esc(b[0])} <span>▾</span></div><div class="fold-b">${noteHtml(b[1])}${imgHtml}</div></div>`;
    }).join('')}</div>`;
}

function onMkt(on){ agreeMkt=on; document.getElementById('colNormal')?.classList.toggle('on',!on); document.getElementById('colMkt')?.classList.toggle('on',on);
  const b=document.getElementById('submitBtn'); if(b) b.textContent = on?'確認接受報價（享行銷優惠價）':'確認接受報價'; }
let GAL=[], GALI=0;
function showGal(){
  document.getElementById('lbImg').src=GAL[GALI]||'';
  const multi=GAL.length>1;
  document.getElementById('lbCount').textContent=multi?`${GALI+1} / ${GAL.length}`:'';
  document.getElementById('lbPrev').style.display=multi?'grid':'none';
  document.getElementById('lbNext').style.display=multi?'grid':'none';
  document.getElementById('lb').classList.add('on');
}
function galStep(d){ if(!GAL.length)return; GALI=(GALI+d+GAL.length)%GAL.length; showGal(); }
function openGal(imgEl){
  const imgs=[...imgEl.parentElement.querySelectorAll('img')].map(i=>i.getAttribute('src'));
  GAL=imgs; GALI=Math.max(0,imgs.indexOf(imgEl.getAttribute('src'))); showGal();
}
function openLb(src){ GAL=[src]; GALI=0; showGal(); }   // 單張（膜料示意圖）
function closeLb(){ document.getElementById('lb').classList.remove('on'); }
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lb').classList.contains('on'))return;
  if(e.key==='ArrowLeft')galStep(-1); else if(e.key==='ArrowRight')galStep(1); else if(e.key==='Escape')closeLb();
});

function setupCanvas(){
  const canvas=document.getElementById('sigCanvas'); if(!canvas) return;
  const rect=canvas.getBoundingClientRect(), dpr=window.devicePixelRatio||1, h=180;
  canvas.width=rect.width*dpr; canvas.height=h*dpr; canvas.style.height=h+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr); ctx.strokeStyle='#1f2937'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round';
  let drawing=false;
  const pos=e=>{const r=canvas.getBoundingClientRect(); const s=e.touches?e.touches[0]:e; return {x:s.clientX-r.left,y:s.clientY-r.top};};
  canvas.addEventListener('pointerdown',e=>{drawing=true;canvas.classList.add('has-sig');const{x,y}=pos(e);ctx.beginPath();ctx.moveTo(x,y);});
  canvas.addEventListener('pointermove',e=>{if(!drawing)return;e.preventDefault();const{x,y}=pos(e);ctx.lineTo(x,y);ctx.stroke();});
  canvas.addEventListener('pointerup',()=>{drawing=false;});
  canvas.addEventListener('pointerleave',()=>{drawing=false;});
}
function clearSig(){ const c=document.getElementById('sigCanvas'); if(!c)return; c.getContext('2d').clearRect(0,0,c.width,c.height); c.classList.remove('has-sig'); }
async function submitSig(){
  const canvas=document.getElementById('sigCanvas');
  if(!canvas?.classList.contains('has-sig')){ alert('請先在框內完成簽名'); return; }
  const btn=document.getElementById('submitBtn');
  if(btn){ btn.disabled=true; btn.textContent='處理中…'; }
  try{
    const res=await fetch(`/api/quotes/sign/${token}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({signature:canvas.toDataURL('image/png'),marketing_consent:agreeMkt})});
    if(res.ok){ const qr=await fetch(`/api/quotes/sign/${token}`); if(qr.ok){ quoteData=await qr.json(); render(quoteData); } }
    else{ const e=await res.json().catch(()=>({})); alert(e.error||'送出失敗，請稍後再試'); if(btn){ btn.disabled=false; btn.textContent='確認接受報價'; } }
  }catch(err){ alert('網路錯誤，請稍後再試'); if(btn){ btn.disabled=false; btn.textContent='確認接受報價'; } }
}
load();
</script>
</body>
