<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>場勘任務 — 繪新國際</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif; background:#f8fafc; color:#1f2937; }
.container { max-width:680px; margin:0 auto; padding:16px; }
.brand { text-align:center; padding:20px 0 16px; border-bottom:3px solid #1a56db; margin-bottom:20px; }
.brand h1 { font-size:22px; font-weight:700; color:#1a56db; }
.brand p  { font-size:13px; color:#6b7280; margin-top:4px; }
.card { background:#fff; border-radius:12px; border:1px solid #e5e7eb; padding:18px; margin-bottom:14px; }
.card h3 { font-size:14px; font-weight:600; color:#374151; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #f3f4f6; }
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.info-item .label { font-size:11px; color:#9ca3af; margin-bottom:3px; }
.info-item .value { font-size:14px; font-weight:500; line-height:1.5; }
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
.badge-draft   { background:#f3f4f6; color:#374151; }
.badge-sent    { background:#dbeafe; color:#1d4ed8; }
.badge-signed  { background:#d1fae5; color:#065f46; }
.dispatch-note { background:#fffbeb; border:1px solid #fcd34d; border-radius:8px; padding:14px; margin-bottom:14px; }
.dispatch-note .note-label { font-size:11px; color:#92400e; font-weight:600; margin-bottom:6px; }
.dispatch-note .note-body  { font-size:14px; color:#78350f; line-height:1.7; white-space:pre-wrap; }
.map-btn { display:inline-flex; align-items:center; gap:6px; background:#1a56db; color:#fff; border-radius:8px; padding:10px 18px; font-size:14px; font-weight:600; text-decoration:none; margin-top:8px; }
.form-label { font-size:12px; color:#6b7280; font-weight:600; margin-bottom:5px; display:block; }
input[type="text"],input[type="date"],input[type="time"],input[type="tel"],textarea,select {
  width:100%; padding:9px 11px; border:1.5px solid #d1d5db; border-radius:8px; font-size:14px; font-family:inherit; background:#fff;
}
input:focus,textarea:focus { outline:none; border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.1); }
textarea { resize:vertical; }
.finding-row { display:grid; grid-template-columns:1fr 1.5fr 70px 70px 32px; gap:6px; align-items:center; margin-bottom:6px; }
.finding-row input { padding:7px 9px; font-size:13px; }
.del-btn { background:#fee2e2; color:#991b1b; border:none; border-radius:6px; cursor:pointer; font-size:16px; width:32px; height:34px; display:flex; align-items:center; justify-content:center; }
.add-row-btn { background:#eff6ff; color:#1d4ed8; border:1.5px dashed #93c5fd; border-radius:8px; padding:8px; font-size:13px; cursor:pointer; width:100%; margin-top:4px; }
.save-btn { background:#1a56db; color:#fff; border:none; border-radius:10px; padding:14px; font-size:16px; font-weight:700; cursor:pointer; width:100%; margin-top:8px; }
.save-btn:active { background:#1e40af; }
.save-btn:disabled { background:#9ca3af; cursor:not-allowed; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#111; color:#fff; padding:12px 24px; border-radius:10px; font-size:14px; z-index:999; opacity:0; transition:opacity .2s; pointer-events:none; }
.toast.show { opacity:1; }
.section-title { font-size:15px; font-weight:700; color:#1f2937; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
th { background:#f9fafb; padding:8px 6px; text-align:left; font-size:11px; color:#6b7280; border-bottom:2px solid #e5e7eb; white-space:nowrap; }
.footer { text-align:center; padding:20px 0; font-size:12px; color:#9ca3af; }
.fee-card { background:#fff7ed; border:1.5px solid #fdba74; border-radius:12px; padding:16px; margin-bottom:14px; }
.fee-card h3 { font-size:14px; font-weight:600; color:#9a3412; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid #fed7aa; }
.fee-amount { font-size:24px; font-weight:800; color:#9a3412; }
.fee-paid-badge { background:#d1fae5; color:#065f46; border-radius:8px; padding:6px 14px; font-size:13px; font-weight:700; display:inline-flex; align-items:center; gap:6px; margin-top:10px; }
.sign-entry-card { background:#eff6ff; border:1.5px solid #93c5fd; border-radius:12px; padding:16px; margin-bottom:14px; }
.sign-entry-card h3 { font-size:14px; font-weight:600; color:#1d4ed8; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid #bfdbfe; }
.sign-open-btn { display:block; background:#1a56db; color:#fff; text-align:center; border-radius:10px; padding:12px; font-size:14px; font-weight:700; text-decoration:none; margin-top:12px; }
.confirm-fee-btn { background:#059669; color:#fff; border:none; border-radius:10px; padding:12px; font-size:15px; font-weight:700; cursor:pointer; width:100%; margin-top:12px; }
.confirm-fee-btn:active { background:#047857; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="container" id="app">
  <div class="brand">
    <h1>🎨 繪新國際有限公司</h1>
    <p>場勘任務回填</p>
  </div>
  <div id="content">
    <p style="text-align:center;color:#6b7280;padding:40px">載入中…</p>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const token = new URLSearchParams(location.search).get('token');
let formData = null;

function showToast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? '#059669' : '#dc2626';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

async function load() {
  if (!token) {
    document.getElementById('content').innerHTML = '<p style="text-align:center;color:#e02424;padding:40px">無效的連結，請確認連結是否完整。</p>';
    return;
  }
  const res = await fetch(`/api/survey/worker/${token}`);
  if (!res.ok) {
    document.getElementById('content').innerHTML = '<p style="text-align:center;color:#e02424;padding:40px">找不到此場勘任務，連結可能已失效。</p>';
    return;
  }
  formData = await res.json();
  render(formData);
}

function statusLabel(s) {
  if (s === 'signed')    return { text:'客戶已簽名', cls:'badge-signed' };
  if (s === 'sent')      return { text:'已發送給客戶', cls:'badge-sent' };
  if (s === 'cancelled') return { text:'已取消', cls:'badge-draft' };
  return { text:'草稿', cls:'badge-draft' };
}

function render(f) {
  const { text: stText, cls: stCls } = statusLabel(f.status);
  const address = f.site_address || f.location || '';
  const mapsUrl = address ? `https://maps.google.com/?q=${encodeURIComponent(address)}` : null;
  const findings = f.findings || [];
  const isSigned = f.status === 'signed';

  document.getElementById('content').innerHTML = `
    <!-- 案件資訊（唯讀） -->
    <div class="card">
      <h3>案件資訊</h3>
      <div class="info-grid">
        <div class="info-item"><div class="label">案號</div><div class="value" style="font-family:monospace">${f.case_number || '—'}</div></div>
        <div class="info-item"><div class="label">狀態</div><div class="value"><span class="badge ${stCls}">${stText}</span></div></div>
        <div class="info-item" style="grid-column:1/-1"><div class="label">案件名稱</div><div class="value">${f.title || '—'}</div></div>
        <div class="info-item"><div class="label">場勘人員</div><div class="value">${f.surveyor_name || '—'}</div></div>
        <div class="info-item"><div class="label">施工地址</div><div class="value">${address || '—'}</div></div>
      </div>
      ${mapsUrl ? `<a class="map-btn" href="${mapsUrl}" target="_blank">📍 在地圖中查看地址</a>` : ''}
    </div>

    ${f.dispatch_note ? `<div class="dispatch-note"><div class="note-label">📌 調度備注</div><div class="note-body">${f.dispatch_note}</div></div>` : ''}

    <!-- 場勘費資訊 -->
    ${f.survey_fee_required != null ? `
    <div class="fee-card">
      <h3>💰 場勘費</h3>
      ${f.survey_fee_required == 1 ? `
        <div style="font-size:12px;color:#92400e;margin-bottom:6px">現場向客戶收取</div>
        <div class="fee-amount">NT$ ${f.survey_fee ? Number(f.survey_fee).toLocaleString() : '—'}</div>
        ${isSigned
          ? (f.survey_fee_paid
              ? `<div class="fee-paid-badge">✅ 已確認收款</div>`
              : `<button class="confirm-fee-btn" onclick="markFeePaid()">確認已收取場勘費</button>`)
          : `<div style="font-size:12px;color:#92400e;margin-top:10px">客戶簽名後即可確認收款</div>`}
      ` : `
        <div style="font-size:16px;font-weight:700;color:#065f46">✓ 免收場勘費</div>
      `}
    </div>` : ''}

    <!-- 客戶簽名入口 -->
    ${f.share_token ? `
    <div class="sign-entry-card">
      <h3>${isSigned ? '✅ 客戶已完成簽名' : '📋 請客戶簽名'}</h3>
      ${!isSigned ? `
        <div style="font-size:13px;color:#374151;margin-bottom:12px">請讓客戶掃描 QR code，或點擊下方按鈕將手機交給客戶操作。</div>
        <div id="qrcode" style="background:#fff;padding:10px;border-radius:8px;width:fit-content;margin:0 auto 12px"></div>
        <a class="sign-open-btn" href="/sign/${f.share_token}" target="_blank">📱 開啟客戶簽名頁</a>
      ` : `
        <p style="font-size:13px;color:#047857">客戶已完成簽名確認，場勘單已鎖定。</p>
      `}
    </div>` : ''}

    <!-- 可編輯區域 -->
    <div class="card" id="editSection">
      <div class="section-title">✏️ 場勘回填（可編輯）</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div>
          <label class="form-label">場勘日期</label>
          <input type="date" id="w_date" value="${f.survey_date || ''}" ${isSigned ? 'disabled' : ''}>
        </div>
        <div>
          <label class="form-label">場勘時間</label>
          <input type="time" id="w_time" value="${f.survey_time || ''}" ${isSigned ? 'disabled' : ''}>
        </div>
        <div>
          <label class="form-label">現場聯絡人</label>
          <input type="text" id="w_contact" value="${f.site_contact || f.client_name || ''}" placeholder="聯絡人姓名" ${isSigned ? 'disabled' : ''}>
        </div>
        <div>
          <label class="form-label">聯絡電話</label>
          <input type="tel" id="w_phone" value="${f.site_phone || f.client_phone || ''}" placeholder="0912-345-678" ${isSigned ? 'disabled' : ''}>
        </div>
      </div>

      <div style="margin-bottom:12px">
        <label class="form-label">場勘項目清單</label>
        <div style="overflow-x:auto">
          <div style="display:grid;grid-template-columns:1fr 1.5fr 70px 70px 32px;gap:6px;margin-bottom:4px">
            <div style="font-size:11px;color:#9ca3af;padding:0 4px">施作位置</div>
            <div style="font-size:11px;color:#9ca3af;padding:0 4px">材料 / 說明</div>
            <div style="font-size:11px;color:#9ca3af;padding:0 4px;text-align:center">寬(cm)</div>
            <div style="font-size:11px;color:#9ca3af;padding:0 4px;text-align:center">高(cm)</div>
            <div></div>
          </div>
          <div id="findingsList">
            ${findings.map((it,i) => findingRowHtml(i, it)).join('')}
          </div>
        </div>
        ${!isSigned ? `<button class="add-row-btn" onclick="addFindingRow()">＋ 新增項目</button>` : ''}
      </div>

      <div style="margin-bottom:16px">
        <label class="form-label">備註 / 注意事項</label>
        <textarea id="w_notes" rows="4" placeholder="現場狀況、客戶需求、特殊注意事項…" ${isSigned ? 'disabled' : ''}>${f.extra_notes || ''}</textarea>
      </div>

      ${isSigned
        ? `<div style="text-align:center;padding:10px;background:#f0fdf4;border-radius:8px;color:#065f46;font-size:14px">✅ 此場勘單已簽署完成，無法修改</div>`
        : `<button class="save-btn" id="saveBtn" onclick="save()">💾 儲存場勘結果</button>`}
    </div>

    <div class="footer">繪新國際有限公司<br>如有問題請聯繫負責業務</div>
  `;

  if (f.share_token && !isSigned && typeof QRCode !== 'undefined') {
    try {
      new QRCode(document.getElementById('qrcode'), {
        text: `${location.origin}/sign/${f.share_token}`,
        width: 180, height: 180,
        colorDark: '#1f2937', colorLight: '#ffffff',
      });
    } catch(e) {}
  }
}

function findingRowHtml(i, it={}) {
  return `<div class="finding-row" id="row_${i}">
    <input type="text" placeholder="位置" value="${it.location||''}" class="f-loc">
    <input type="text" placeholder="材料/說明" value="${it.material||''}" class="f-mat">
    <input type="text" placeholder="寬" value="${it.width||''}" class="f-w" style="text-align:center">
    <input type="text" placeholder="高" value="${it.height||''}" class="f-h" style="text-align:center">
    <button class="del-btn" onclick="this.closest('.finding-row').remove()">×</button>
  </div>`;
}

let rowIdx = 10;
function addFindingRow() {
  const list = document.getElementById('findingsList');
  const div = document.createElement('div');
  div.innerHTML = findingRowHtml(rowIdx++);
  list.appendChild(div.firstElementChild);
  div.remove();
  list.lastElementChild.querySelector('.f-loc').focus();
}

function getFindings() {
  return [...document.querySelectorAll('#findingsList .finding-row')].map(row => ({
    location: row.querySelector('.f-loc').value.trim(),
    material: row.querySelector('.f-mat').value.trim(),
    width:    row.querySelector('.f-w').value.trim(),
    height:   row.querySelector('.f-h').value.trim(),
  })).filter(f => f.location || f.material);
}

async function markFeePaid() {
  if (!confirm('確認已向客戶收取場勘費？')) return;
  const res = await fetch(`/api/survey/worker/${token}/mark-fee-paid`, { method: 'POST' });
  if (res.ok) {
    showToast('✅ 已確認收款');
    load();
  } else {
    const e = await res.json().catch(() => ({}));
    showToast(e.error || '操作失敗', false);
  }
}

async function save() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '儲存中…';
  const body = {
    survey_date:  document.getElementById('w_date').value || null,
    survey_time:  document.getElementById('w_time').value || null,
    site_contact: document.getElementById('w_contact').value.trim() || null,
    site_phone:   document.getElementById('w_phone').value.trim() || null,
    findings:     getFindings(),
    extra_notes:  document.getElementById('w_notes').value.trim() || null,
  };
  try {
    const res = await fetch(`/api/survey/worker/${token}`, {
      method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    if (res.ok) {
      showToast('✅ 已儲存場勘結果');
    } else {
      const e = await res.json();
      showToast(e.error || '儲存失敗', false);
    }
  } catch {
    showToast('網路錯誤，請稍後再試', false);
  }
  btn.disabled = false; btn.textContent = '💾 儲存場勘結果';
}

load();
</script>
</body>
</html>
