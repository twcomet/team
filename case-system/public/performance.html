<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業績報表 — 繪新管理系統</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="icon" href="/logo.png" type="image/png">
<style>
.period-bar { display:flex; gap:8px; margin-bottom:20px; align-items:center; flex-wrap:wrap; }
.period-tab { padding:6px 18px; border-radius:20px; border:1px solid var(--gray-300); background:#fff; cursor:pointer; font-size:13px; font-weight:500; color:var(--gray-600); }
.period-tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(145px,1fr)); gap:12px; margin-bottom:20px; }
.stat-card { background:#fff; border:1px solid var(--gray-200); border-radius:10px; padding:16px 20px; }
.stat-card .label { font-size:12px; color:var(--gray-500); margin-bottom:6px; }
.stat-card .value { font-size:20px; font-weight:700; }
.stat-card .value.success { color:#057a55; }
.stat-card .value.danger  { color:#e02424; }
.stat-card .trend { font-size:11px; margin-top:4px; }
.stat-card .trend.up   { color:#059669; }
.stat-card .trend.down { color:#dc2626; }
.analysis-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; margin-bottom:20px; }
.mini-card { background:#fff; border:1px solid var(--gray-200); border-radius:10px; padding:16px; }
.mini-card h4 { font-size:13px; font-weight:600; color:var(--gray-700); margin-bottom:12px; border-bottom:1px solid var(--gray-100); padding-bottom:8px; }
.bar-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:12px; }
.bar-label { width:80px; color:var(--gray-600); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bar-track { flex:1; height:8px; background:var(--gray-100); border-radius:4px; overflow:hidden; }
.bar-fill  { height:100%; border-radius:4px; transition:width .4s; }
.bar-val   { width:72px; text-align:right; color:var(--gray-700); font-weight:500; font-size:11px; }
.bar-cnt   { width:34px; text-align:right; color:var(--gray-400); font-size:11px; }
.pipeline-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--gray-100); font-size:13px; }
.pipeline-row:last-child { border:none; }
.pipeline-cnt { font-size:18px; font-weight:700; color:var(--primary); width:36px; text-align:center; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><h2><img src="/logo.png" style="height:28px;width:28px;object-fit:contain;filter:brightness(0) invert(1);margin-right:8px;flex-shrink:0"> 繪新管理系統</h2><p id="sidebarOrgName"></p></div>
    <nav class="sidebar-nav">
        <a class="nav-item" data-page="dashboard"      href="/dashboard">      <span class="icon">📊</span>總覽</a>
        <a class="nav-item" data-page="my-tasks"       href="/my-tasks">       <span class="icon">📌</span>我的任務</a>
        <a class="nav-item" data-page="my-calendar"    href="/my-calendar">   <span class="icon">🗓️</span>我的行事曆</a>
        <a class="nav-item" data-page="line-inquiries" href="/line-inquiries"> <span class="icon">💬</span>LINE 詢問</a>
        <a class="nav-item" data-page="cases-inquiry"  href="/cases-inquiry">   <span class="icon">📝</span>詢價管理</a>
        <a class="nav-item" data-page="cases-survey"   href="/cases-survey">    <span class="icon">🔍</span>場勘管理</a>
        <a class="nav-item" data-page="cases-deal"     href="/cases-deal">      <span class="icon">✅</span>成交案件管理</a>
        <a class="nav-item" data-page="dispatch-pool"  href="/dispatch-pool">  <span class="icon">🏊</span>派案池管理</a>
        <a class="nav-item" data-page="calendar"       href="/calendar">       <span class="icon">📅</span>派單行事曆</a>
        <a class="nav-item" data-page="clients"        href="/clients">        <span class="icon">👥</span>客戶管理</a>
        <a class="nav-item" data-page="materials"      href="/materials">      <span class="icon">🎞️</span>膜料管理</a>
        <a class="nav-item" data-page="material-calc"  href="/material-calc">  <span class="icon">🧮</span>快速報價</a>
        <a class="nav-item" data-page="payments"       href="/payments">       <span class="icon">💰</span>收款追蹤</a>
        <a class="nav-item" data-page="ledger"         href="/ledger">         <span class="icon">📒</span>收支流水帳</a>
        <a class="nav-item" data-page="performance"    href="/performance">    <span class="icon">🏆</span>業績報表</a>
        <a class="nav-item" data-page="reports"        href="/reports">        <span class="icon">📈</span>財務報表</a>
        <a class="nav-item" data-page="marketing"      href="/marketing">      <span class="icon">📣</span>行銷報表</a>
        <a class="nav-item" data-page="hr" href="/hr"><span class="icon">👤</span>人事資料管理</a>
        <a class="nav-item" data-page="profile"        href="/profile">        <span class="icon">🪪</span>我的個人資料</a>
      <a class="nav-item" data-page="guide"        href="/guide">        <span class="icon">📖</span>系統使用說明</a>
      <a class="nav-item" data-page="admin"          href="/admin" data-need="manage_users"><span class="icon">⚙️</span>人員管理</a>
    </nav>
    <div class="sidebar-user">
      <div class="user-name" id="sidebarUserName"></div>
      <div class="user-role" id="sidebarUserRole"></div>
      <button class="logout-btn" id="logoutBtn">登出</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <span class="page-title">業績報表</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="orgFilterWrap" style="display:none;align-items:center;gap:6px">
          <label style="font-size:13px;color:var(--gray-600)">店別</label>
          <select id="filterOrg" style="padding:6px 10px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px">
            <option value="">全部</option>
          </select>
        </span>
        <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨️ 列印</button>
      </div>
    </div>
    <div class="page-body">

      <div class="period-bar">
        <button class="period-tab active" onclick="setPeriod('today')">今日</button>
        <button class="period-tab"        onclick="setPeriod('week')">本週</button>
        <button class="period-tab"        onclick="setPeriod('month')">本月</button>
      </div>

      <div style="font-size:12px;font-weight:600;color:var(--gray-500);letter-spacing:.5px;margin-bottom:6px">回簽業績</div>
      <div class="stats-grid" id="perfStats"></div>

      <div style="font-size:12px;font-weight:600;color:var(--gray-500);letter-spacing:.5px;margin-bottom:6px;margin-top:4px">施工派案（依施工日計算）</div>
      <div class="stats-grid" id="dispatchStats"></div>

      <div class="analysis-grid">
        <div class="mini-card">
          <h4>業務員排名</h4>
          <div id="bySales"></div>
        </div>
        <div class="mini-card">
          <h4>案件類型分析</h4>
          <div id="byType"></div>
        </div>
        <div class="mini-card">
          <h4>客戶來源分析</h4>
          <div id="bySource"></div>
        </div>
        <div class="mini-card">
          <h4>客戶等級分析</h4>
          <div id="byLevel"></div>
        </div>
      </div>

      <div class="mini-card" style="margin-bottom:20px">
        <h4>目前案件漏斗（所有進行中案件）</h4>
        <div id="pipeline"></div>
      </div>

      <div class="card" style="margin-bottom:16px">
        <div class="card-body" style="padding:0">
          <div style="padding:12px 16px 4px;font-size:13px;font-weight:600;color:var(--gray-600);border-bottom:1px solid var(--gray-100)">回簽案件明細</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>案號</th><th>客戶</th><th>項目</th><th>類型</th>
                  <th>業務</th><th>回簽日</th>
                  <th style="text-align:right">成交金額</th>
                  <th style="text-align:right">含稅</th>
                  <th style="text-align:right">已收</th>
                  <th style="text-align:right">待收</th>
                </tr>
              </thead>
              <tbody id="caseTable"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-body" style="padding:0">
          <div style="padding:12px 16px 4px;font-size:13px;font-weight:600;color:var(--gray-600);border-bottom:1px solid var(--gray-100)">施工派案明細（依施工日）</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>案號</th><th>客戶</th><th>項目</th><th>類型</th>
                  <th>業務</th><th>施工日</th><th>派工次數</th>
                  <th style="text-align:right">成交金額（未稅）</th>
                </tr>
              </thead>
              <tbody id="dispatchTable"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
let currentPeriod = 'month';
let orgId = '';

const SOURCE_LABELS = {
  line: 'LINE', referral: '口碑介紹', google: 'Google', fb: 'Facebook/IG',
  ig: 'Instagram', friend: '朋友介紹', walk_in: '自來客', other: '其他',
};

async function init() {
  await loadUser();
  highlightNav('performance');

  if (currentUser?.view_all_branches) {
    document.getElementById('orgFilterWrap').style.display = 'flex';
    const orgs = await fetch('/api/orgs').then(r => r.json());
    const sel = document.getElementById('filterOrg');
    orgs.forEach(o => { const opt = document.createElement('option'); opt.value = o.id; opt.textContent = o.name; sel.appendChild(opt); });
    sel.addEventListener('change', () => { orgId = sel.value; load(); });
  }

  await load();
}

function setPeriod(p) {
  currentPeriod = p;
  document.querySelectorAll('.period-tab').forEach((b, i) =>
    b.classList.toggle('active', ['today','week','month'][i] === p)
  );
  load();
}

async function load() {
  const qs = `period=${currentPeriod}${orgId ? '&org_id='+orgId : ''}`;
  let d;
  try {
    const res = await fetch(`/api/reports/sales?${qs}`);
    d = await res.json();
    if (!res.ok) throw new Error(d.error);
  } catch (e) {
    document.getElementById('perfStats').innerHTML = `<div style="color:#e02424">載入失敗：${e.message}</div>`;
    return;
  }
  renderStats(d);
  renderDispatchStats(d);
  renderAnalysis(d);
  renderPipeline(d.pipeline);
  renderTable(d.cases);
  renderDispatchTable(d.dispatchCases);
}

function pctDiff(cur, prev) {
  if (!prev) return null;
  return ((cur - prev) / prev * 100).toFixed(0);
}

function renderStats(d) {
  const s = d.summary || {};
  const p = d.prevSummary || {};
  const gross = s.gross_value || 0;
  const tax   = Math.round((s.tax_value || gross * 1.05));
  const recv  = s.received || 0;
  const avg   = s.count ? Math.round(gross / s.count) : 0;
  const diffCnt = pctDiff(s.count || 0, p.count || 0);
  const diffAmt = pctDiff(gross, p.gross_value || 0);

  document.getElementById('perfStats').innerHTML = `
    <div class="stat-card">
      <div class="label">回簽件數</div>
      <div class="value">${s.count || 0} 件</div>
      ${diffCnt !== null ? `<div class="trend ${Number(diffCnt)>=0?'up':'down'}">${Number(diffCnt)>=0?'▲':'▼'} ${Math.abs(diffCnt)}% vs 前期</div>` : ''}
    </div>
    <div class="stat-card">
      <div class="label">回簽金額（未稅）</div>
      <div class="value">${fmt(gross)}</div>
      ${diffAmt !== null ? `<div class="trend ${Number(diffAmt)>=0?'up':'down'}">${Number(diffAmt)>=0?'▲':'▼'} ${Math.abs(diffAmt)}% vs 前期</div>` : ''}
    </div>
    <div class="stat-card">
      <div class="label">含稅總額</div>
      <div class="value">${fmt(tax)}</div>
    </div>
    <div class="stat-card">
      <div class="label">平均單價（未稅）</div>
      <div class="value">${avg ? fmt(avg) : '—'}</div>
    </div>
    <div class="stat-card">
      <div class="label">已收款</div>
      <div class="value success">${fmt(recv)}</div>
    </div>
  `;
}

function barRows(items, labelKey, valKey, cntKey, color, labelMap) {
  if (!items?.length) return '<div style="color:var(--gray-400);font-size:13px">無資料</div>';
  const max = Math.max(...items.map(r => r[valKey] || 0), 1);
  return items.map(r => {
    const label = labelMap ? (labelMap[r[labelKey]] || r[labelKey] || '—') : (r[labelKey] || '—');
    return `<div class="bar-row">
      <span class="bar-label" title="${label}">${label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${((r[valKey]||0)/max*100).toFixed(1)}%;background:${color}"></div></div>
      <span class="bar-val">${fmt(r[valKey]||0)}</span>
      ${cntKey ? `<span class="bar-cnt">${r[cntKey]}件</span>` : ''}
    </div>`;
  }).join('');
}

function renderAnalysis(d) {
  document.getElementById('bySales').innerHTML = barRows(d.bySales, 'name', 'gross_value', 'count', 'var(--primary)', null);
  document.getElementById('byType').innerHTML  = barRows(d.byType, 'case_type', 'gross_value', 'count', '#10b981', CASE_TYPE_LABELS);
  document.getElementById('bySource').innerHTML = barRows(d.bySource, 'source', 'gross_value', 'count', '#8b5cf6', SOURCE_LABELS);
  document.getElementById('byLevel').innerHTML  = barRows(d.byLevel, 'level', 'gross_value', 'count', '#f59e0b', null);
}

const PIPE_LABELS = {
  inquiry:'詢價', initial_estimate:'初步估價', survey_pending:'待排場勘',
  survey_scheduled:'已排場勘', surveyed:'已場勘', quote_draft:'報價草稿', quoted:'已報價',
};
const PIPE_ORDER = ['inquiry','initial_estimate','survey_pending','survey_scheduled','surveyed','quote_draft','quoted'];

function renderPipeline(pipeline) {
  const el = document.getElementById('pipeline');
  if (!pipeline?.length) { el.innerHTML = '<div style="color:var(--gray-400);font-size:13px">目前無進行中案件</div>'; return; }
  const map = {};
  pipeline.forEach(r => { map[r.status] = r.cnt; });
  el.innerHTML = PIPE_ORDER.filter(s => map[s]).map(s => `
    <div class="pipeline-row">
      <span class="pipeline-cnt">${map[s]}</span>
      <span style="flex:1;font-size:13px">${PIPE_LABELS[s]}</span>
      <div style="width:120px;height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden">
        <div style="width:${Math.min(100,(map[s]/Math.max(...Object.values(map))*100)).toFixed(0)}%;height:100%;background:var(--primary);border-radius:3px"></div>
      </div>
    </div>`).join('');
}

function renderDispatchStats(d) {
  const ds = d.dispatchSummary || {};
  const pd = d.prevDispatchSummary || {};
  const cnt   = ds.count || 0;
  const gross = ds.gross_value || 0;
  const diffCnt = pctDiff(cnt, pd.count || 0);
  const diffAmt = pctDiff(gross, pd.gross_value || 0);

  document.getElementById('dispatchStats').innerHTML = `
    <div class="stat-card" style="border-left:3px solid #10b981">
      <div class="label">施工件數</div>
      <div class="value">${cnt} 件</div>
      ${diffCnt !== null ? `<div class="trend ${Number(diffCnt)>=0?'up':'down'}">${Number(diffCnt)>=0?'▲':'▼'} ${Math.abs(diffCnt)}% vs 前期</div>` : ''}
    </div>
    <div class="stat-card" style="border-left:3px solid #10b981">
      <div class="label">施工派案金額（未稅）</div>
      <div class="value">${fmt(gross)}</div>
      ${diffAmt !== null ? `<div class="trend ${Number(diffAmt)>=0?'up':'down'}">${Number(diffAmt)>=0?'▲':'▼'} ${Math.abs(diffAmt)}% vs 前期</div>` : ''}
    </div>
    <div class="stat-card" style="border-left:3px solid #10b981">
      <div class="label">施工派案（含稅估算）</div>
      <div class="value">${fmt(Math.round(gross * 1.05))}</div>
    </div>
    <div class="stat-card" style="border-left:3px solid #10b981">
      <div class="label">平均每案（未稅）</div>
      <div class="value">${cnt ? fmt(Math.round(gross / cnt)) : '—'}</div>
    </div>
  `;
}

function renderTable(cases) {
  const tbody = document.getElementById('caseTable');
  if (!cases?.length) {
    tbody.innerHTML = '<tr><td colspan="10"><div class="empty-state"><div class="icon">📋</div>此期間無回簽案件</div></td></tr>';
    return;
  }
  tbody.innerHTML = cases.map(c => {
    const outstanding = Math.round((c.tax_value||0)) - (c.received||0);
    return `<tr onclick="location.href='/case-detail?id=${c.id}'" style="cursor:pointer">
      <td><code style="font-size:11px">${c.case_number}</code></td>
      <td>${c.client_name||'—'}</td>
      <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title}</td>
      <td>${CASE_TYPE_LABELS[c.case_type]||c.case_type||'—'}</td>
      <td>${c.sales_name||'—'}</td>
      <td>${c.contracted_at ? c.contracted_at.slice(0,10) : '—'}</td>
      <td style="text-align:right">${c.value ? fmt(c.value) : '—'}</td>
      <td style="text-align:right;font-weight:600">${c.tax_value ? fmt(Math.round(c.tax_value)) : '—'}</td>
      <td style="text-align:right;color:#057a55">${c.received ? fmt(c.received) : '—'}</td>
      <td style="text-align:right;color:${outstanding>0?'#e02424':'#057a55'};font-weight:600">${outstanding>0?fmt(outstanding):'✓'}</td>
    </tr>`;
  }).join('');
}

function renderDispatchTable(cases) {
  const tbody = document.getElementById('dispatchTable');
  if (!cases?.length) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="icon">🔧</div>此期間無施工派案</div></td></tr>';
    return;
  }
  tbody.innerHTML = cases.map(c => `
    <tr onclick="location.href='/case-detail?id=${c.id}'" style="cursor:pointer">
      <td><code style="font-size:11px">${c.case_number}</code></td>
      <td>${c.client_name||'—'}</td>
      <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title}</td>
      <td>${CASE_TYPE_LABELS[c.case_type]||c.case_type||'—'}</td>
      <td>${c.sales_name||'—'}</td>
      <td>${c.dispatch_date ? c.dispatch_date.slice(0,10) : '—'}</td>
      <td style="text-align:center">${c.dispatch_count}</td>
      <td style="text-align:right;font-weight:600">${c.value ? fmt(c.value) : '—'}</td>
    </tr>`).join('');
}

init();
</script>
</body>
</html>
