<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合約簽署 — 繪新管理系統</title>
<link rel="icon" href="/logo.png" type="image/png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; background: #f3f4f6; color: #1f2937; min-height: 100vh; }

.page-wrap { max-width: 800px; margin: 0 auto; padding: 24px 16px 60px; }

.brand { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.brand img { height: 36px; }
.brand h1 { font-size: 20px; font-weight: 700; color: #1f2937; }

/* 進度列 */
.progress-bar-wrap { background: #fff; border-radius: 12px; padding: 14px 20px; margin-bottom: 20px; box-shadow: 0 1px 6px rgba(0,0,0,.07); display: flex; align-items: center; gap: 14px; }
.progress-text { font-size: 14px; font-weight: 700; color: #374151; white-space: nowrap; }
.progress-track { flex: 1; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: #2563eb; border-radius: 4px; transition: width .4s; }

/* 合約內容卡 */
.contract-card { background: #fff; border-radius: 16px; box-shadow: 0 1px 8px rgba(0,0,0,.08); padding: 40px; margin-bottom: 20px; }
.contract-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; }
.contract-sub { font-size: 13px; color: #6b7280; text-align: center; margin-bottom: 28px; }
.contract-body { font-size: 14px; line-height: 2; color: #374151; }
.contract-body h1, .contract-body h2, .contract-body h3 { margin: 16px 0 8px; }
.contract-body p { margin-bottom: 8px; }
.contract-body ul, .contract-body ol { padding-left: 1.5em; margin-bottom: 8px; }
.contract-body li { margin-bottom: 4px; }
.scroll-sentinel { height: 1px; }

/* 簽署區 */
.sign-card { background: #fff; border-radius: 16px; box-shadow: 0 1px 8px rgba(0,0,0,.08); padding: 32px; margin-bottom: 20px; transition: opacity .3s; }
.sign-card.locked { opacity: .4; pointer-events: none; }
.scroll-hint { text-align: center; padding: 12px; background: #fef9c3; border: 1px solid #fde047; border-radius: 10px; font-size: 13px; color: #92400e; margin-bottom: 20px; }
.scroll-hint.hidden { display: none; }

.sign-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; padding: 14px 18px; background: #f9fafb; border-radius: 10px; font-size: 14px; }
.meta-label { font-size: 12px; color: #6b7280; margin-bottom: 3px; }
.meta-value { font-weight: 600; color: #111827; }

.agree-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 24px; padding: 16px; background: #fef9c3; border: 1px solid #fde047; border-radius: 10px; }
.agree-row input[type="checkbox"] { width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px; cursor: pointer; accent-color: #2563eb; }
.agree-row label { font-size: 13px; color: #713f12; line-height: 1.8; cursor: pointer; }

.sig-section label { font-size: 14px; font-weight: 600; color: #374151; display: block; margin-bottom: 10px; }
#sigCanvas { width: 100%; height: 160px; border: 2px dashed #d1d5db; border-radius: 10px; background: #fafafa; cursor: crosshair; touch-action: none; display: block; }
#sigCanvas.has-sig { border-color: #2563eb; border-style: solid; }
.sig-actions { display: flex; justify-content: flex-end; margin-top: 8px; margin-bottom: 20px; }

.submit-btn { width: 100%; padding: 15px; font-size: 16px; font-weight: 700; color: #fff; background: #2563eb; border: none; border-radius: 10px; cursor: pointer; transition: background .15s; }
.submit-btn:hover:not(:disabled) { background: #1d4ed8; }
.submit-btn:disabled { background: #9ca3af; cursor: not-allowed; }

/* 完成卡片 */
.done-card { display: none; background: #fff; border-radius: 16px; box-shadow: 0 1px 8px rgba(0,0,0,.08); padding: 48px 32px; text-align: center; }
.done-icon { font-size: 60px; margin-bottom: 20px; }
.done-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.done-sub { font-size: 14px; color: #6b7280; margin-bottom: 32px; }
.done-btn { display: inline-block; padding: 13px 32px; border-radius: 10px; background: #2563eb; color: #fff; font-size: 15px; font-weight: 700; text-decoration: none; cursor: pointer; border: none; }
.done-btn:hover { background: #1d4ed8; }

@media (max-width: 600px) {
  .contract-card { padding: 24px 18px; }
  .sign-card { padding: 20px 16px; }
}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="brand">
    <img src="/logo.png" alt="繪新" onerror="this.style.display='none'">
    <h1>繪新管理系統</h1>
  </div>

  <div class="progress-bar-wrap" id="progressWrap" style="display:none">
    <span class="progress-text" id="progressText">0 / 0</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0"></div></div>
  </div>

  <!-- 合約內容 -->
  <div id="signingArea">
    <div class="contract-card" id="contractCard">
      <div class="contract-title" id="contractTitle">載入中…</div>
      <div class="contract-sub">請詳細閱讀以下合約內容，閱讀完畢後向下捲動完成簽署</div>
      <div class="contract-body" id="contractBody"></div>
      <div class="scroll-sentinel" id="scrollSentinel"></div>
    </div>

    <!-- 簽署卡片 -->
    <div class="sign-card locked" id="signCard">
      <div class="scroll-hint" id="scrollHint">請先向上閱讀完整合約內容，捲動到底後即可簽署</div>

      <div class="sign-meta">
        <div><div class="meta-label">簽署人</div><div class="meta-value" id="signerName">—</div></div>
        <div><div class="meta-label">簽署日期</div><div class="meta-value" id="signerDate">—</div></div>
      </div>

      <div class="agree-row">
        <input type="checkbox" id="agreeCheck" onchange="updateSubmitBtn()">
        <label for="agreeCheck">
          本人確認已詳細閱讀並完全理解上述合約之全部條款，同意遵守本協議之所有規定，並確認此電子簽署與親筆簽名具有同等法律效力。
        </label>
      </div>

      <div class="sig-section">
        <label>手寫電子簽名 <span style="font-size:12px;color:#6b7280;font-weight:400">（請在下方框內以手指或滑鼠簽名）</span></label>
        <canvas id="sigCanvas"></canvas>
        <div class="sig-actions">
          <button class="btn btn-ghost" id="clearBtn" style="padding:6px 14px;font-size:13px" onclick="clearSig()">清除重寫</button>
        </div>
      </div>

      <button class="submit-btn" id="submitBtn" disabled onclick="doSign()">確認簽署</button>
    </div>
  </div>

  <!-- 全部完成 -->
  <div class="done-card" id="doneCard">
    <div class="done-icon">✅</div>
    <div class="done-title">所有合約簽署完成！</div>
    <div class="done-sub">感謝您完成電子簽署，相關紀錄已儲存至系統。</div>
    <button class="done-btn" onclick="location.href='/dashboard'">進入系統</button>
  </div>
</div>

<script>
let pendingContracts = [];
let currentIndex = 0;
let userName = '';
let scrollUnlocked = false;
let scrollObserver = null;
let hasSig = false;

// ── Canvas 簽名 ──────────────────────────────────────────────
let canvas, ctx, drawing = false, lastX = 0, lastY = 0;

function initCanvas() {
  canvas = document.getElementById('sigCanvas');
  ctx = canvas.getContext('2d');

  // 實際像素對應 CSS 尺寸（高 DPI 螢幕）
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#1e3a8a';

  function pos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  }
  function start(e) {
    e.preventDefault();
    drawing = true;
    const p = pos(e);
    lastX = p.x; lastY = p.y;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
  }
  function move(e) {
    e.preventDefault();
    if (!drawing) return;
    const p = pos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    lastX = p.x; lastY = p.y;
    if (!hasSig) {
      hasSig = true;
      canvas.classList.add('has-sig');
      updateSubmitBtn();
    }
  }
  function end() { drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup',   end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove',  move,  { passive: false });
  canvas.addEventListener('touchend',   end);
}

function clearSig() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hasSig = false;
  canvas.classList.remove('has-sig');
  updateSubmitBtn();
}

function getSigDataURL() {
  return canvas.toDataURL('image/png');
}

// ── 主流程 ───────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('/api/auth/me');
    if (r.ok) { const u = await r.json(); userName = u.name || ''; }
  } catch(_) {}

  document.getElementById('signerName').textContent = userName || '—';
  document.getElementById('signerDate').textContent = new Date().toLocaleDateString('zh-TW');

  const r = await fetch('/api/contracts/my/pending');
  if (!r.ok) { location.href = '/dashboard'; return; }
  pendingContracts = await r.json();

  if (!pendingContracts.length) { location.href = '/dashboard'; return; }

  document.getElementById('progressWrap').style.display = 'flex';
  await loadContract(0);
  initCanvas();
}

async function loadContract(index) {
  scrollUnlocked = false;
  hasSig = false;
  currentIndex = index;
  const c = pendingContracts[index];
  const total = pendingContracts.length;

  document.getElementById('progressText').textContent = `合約 ${index + 1} / ${total}`;
  document.getElementById('progressFill').style.width = `${Math.round(index / total * 100)}%`;

  document.getElementById('contractTitle').textContent = c.title;

  // 取得合約 HTML 內容
  let bodyHtml = '';
  try {
    const cr = await fetch(`/api/contracts/${c.id}/content`);
    if (cr.ok) {
      const cd = await cr.json();
      bodyHtml = cd.content || '';
    }
  } catch(_) {}

  const pdfHtml = c.original_name
    ? `<div style="margin-bottom:18px"><iframe src="/api/contracts/${c.id}/file" style="width:100%;height:620px;border:1px solid #d1d5db;border-radius:10px" title="合約 PDF"></iframe><div style="font-size:12px;color:#6b7280;margin-top:6px">📎 ${c.original_name}</div></div>`
    : '';
  const emptyHtml = (!pdfHtml && !bodyHtml) ? '<p style="color:#9ca3af;text-align:center;padding:32px 0">（此合約尚未填寫內容）</p>' : '';
  document.getElementById('contractBody').innerHTML = pdfHtml + (bodyHtml || '') + emptyHtml;

  // 重置簽署區
  document.getElementById('agreeCheck').checked = false;
  document.getElementById('signCard').classList.add('locked');
  document.getElementById('scrollHint').classList.remove('hidden');
  document.getElementById('submitBtn').disabled = true;
  if (canvas) clearSig();

  // 重新綁定 scroll observer
  if (scrollObserver) scrollObserver.disconnect();
  setupScrollObserver();
}

function setupScrollObserver() {
  const sentinel = document.getElementById('scrollSentinel');
  scrollObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && !scrollUnlocked) {
      scrollUnlocked = true;
      document.getElementById('signCard').classList.remove('locked');
      document.getElementById('scrollHint').classList.add('hidden');
      updateSubmitBtn();
      scrollObserver.disconnect();
    }
  }, { threshold: 0.5 });
  scrollObserver.observe(sentinel);
}

function updateSubmitBtn() {
  const agreed = document.getElementById('agreeCheck').checked;
  document.getElementById('submitBtn').disabled = !(scrollUnlocked && agreed && hasSig);
}

async function doSign() {
  const agreed = document.getElementById('agreeCheck').checked;
  if (!agreed || !hasSig) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '簽署中…';

  const c = pendingContracts[currentIndex];
  const signature = getSigDataURL();

  const r = await fetch(`/api/contracts/${c.id}/sign`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ signature, agreed: true }),
  });

  if (!r.ok) {
    const d = await r.json();
    alert(d.error || '簽署失敗，請重試');
    btn.disabled = false;
    btn.textContent = '確認簽署';
    return;
  }

  const next = currentIndex + 1;
  if (next < pendingContracts.length) {
    document.getElementById('progressFill').style.width = `${Math.round(next / pendingContracts.length * 100)}%`;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    await loadContract(next);
  } else {
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('signingArea').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('doneCard').style.display = 'block';
  }
}

init();
</script>
</body>
</html>
