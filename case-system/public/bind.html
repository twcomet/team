<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE 綁定 — 繪新國際</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
           background:#f5f6f8; color:#1a1a1a; min-height:100vh;
           display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { background:#fff; border-radius:18px; box-shadow:0 8px 30px rgba(0,0,0,.08);
            max-width:400px; width:100%; padding:32px 26px; text-align:center; }
    .logo { font-size:22px; font-weight:800; color:#111; margin-bottom:4px; letter-spacing:1px; }
    .sub  { font-size:13px; color:#999; margin-bottom:24px; }
    h1 { font-size:19px; margin-bottom:8px; }
    .name { color:#06c755; font-weight:700; }
    p  { font-size:14px; color:#555; line-height:1.7; }
    .oa { display:inline-block; margin:14px 0 4px; font-size:13px; color:#888; }
    .btn { display:block; width:100%; margin-top:22px; padding:15px; border:none; border-radius:12px;
           background:#06c755; color:#fff; font-size:16px; font-weight:700; text-decoration:none;
           cursor:pointer; transition:.15s; }
    .btn:active { transform:scale(.98); }
    .code-box { margin-top:20px; padding:16px; background:#f0f2f5; border-radius:12px; }
    .code-label { font-size:12px; color:#999; margin-bottom:6px; }
    .code { font-size:22px; font-weight:800; letter-spacing:2px; color:#111; font-family:ui-monospace,monospace; }
    .copy { margin-top:12px; padding:9px 16px; border:1px solid #ddd; border-radius:9px; background:#fff;
            font-size:13px; color:#333; cursor:pointer; }
    .hint { margin-top:18px; font-size:12.5px; color:#999; line-height:1.6; }
    .state-fail .emoji { font-size:40px; }
    .spinner { width:30px; height:30px; border:3px solid #eee; border-top-color:#06c755;
               border-radius:50%; animation:spin .8s linear infinite; margin:20px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="logo">繪新國際</div>
    <div class="sub">Twcomet International</div>
    <div class="spinner"></div>
  </div>

  <script>
    const code = decodeURIComponent(location.pathname.split('/').filter(Boolean).pop() || '');
    const card = document.getElementById('card');
    const HEAD = `<div class="logo">繪新國際</div><div class="sub">Twcomet International</div>`;

    function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    function render(html){ card.innerHTML = HEAD + html; }

    function fail(msg){
      render(`<div class="state-fail"><div class="emoji">😕</div>
        <h1 style="margin-top:14px">${esc(msg)}</h1>
        <p style="margin-top:10px">請向繪新客服索取新的綁定連結。</p></div>`);
    }

    async function copyCode(){
      try { await navigator.clipboard.writeText('綁定 ' + code);
        const b = document.getElementById('copyBtn'); b.textContent = '✓ 已複製'; setTimeout(()=>b.textContent='複製綁定碼',1500);
      } catch(e){ alert('請手動長按複製：綁定 ' + code); }
    }
    window.copyCode = copyCode;

    (async () => {
      if (!code) return fail('連結不正確');
      let d;
      try { d = await (await fetch('/api/clients/bind-info/' + encodeURIComponent(code))).json(); }
      catch(e){ return fail('連線失敗，請稍後再試'); }

      if (!d.ok) {
        return fail(d.reason === 'used' ? '這組綁定碼已使用過'
                  : d.reason === 'expired' ? '這組綁定碼已過期'
                  : '找不到這組綁定碼');
      }

      const oa = d.oa_name ? `<div class="oa">綁定官方帳號：${esc(d.oa_name)}</div>` : '';

      if (d.deep_link) {
        // 一鍵：開 LINE 對話、預填綁定碼，按傳送即完成
        render(`
          <h1>您好，<span class="name">${esc(d.client_name)}</span></h1>
          <p>綁定後，繪新將直接透過 LINE 傳送報價單、場勘與驗收資料給您。</p>
          ${oa}
          <a class="btn" href="${esc(d.deep_link)}">開啟 LINE 完成綁定</a>
          <div class="hint">點按上方按鈕後，LINE 對話框會自動帶入綁定碼，<br>直接按「傳送」即完成綁定。</div>
        `);
      } else {
        // 中轉頁：手動輸入
        render(`
          <h1>您好，<span class="name">${esc(d.client_name)}</span></h1>
          <p>請回到您加入的繪新官方帳號對話視窗，<br>輸入下方綁定碼並傳送即可完成綁定。</p>
          ${oa}
          <div class="code-box">
            <div class="code-label">綁定碼</div>
            <div class="code">綁定 ${esc(code)}</div>
          </div>
          <button class="copy" id="copyBtn" onclick="copyCode()">複製綁定碼</button>
          <div class="hint">綁定後，繪新將直接透過 LINE 傳送報價單、<br>場勘與驗收資料給您。</div>
        `);
      }
    })();
  </script>
</body>
</html>
