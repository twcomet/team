<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收款追蹤 — 繪新管理系統</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:20px; }
.stat-card  { background:#fff; border:1px solid var(--gray-200); border-radius:10px; padding:16px 20px; }
.stat-card .label { font-size:12px; color:var(--gray-500); margin-bottom:6px; }
.stat-card .value { font-size:22px; font-weight:700; }
.stat-card .value.success { color:#057a55; }
.stat-card .value.danger  { color:#e02424; }
.stat-card .value.warning { color:#c27803; }
.filter-bar { display:flex; gap:8px; margin-bottom:16px; align-items:center; flex-wrap:wrap; }
.tab-bar { display:flex; gap:0; border-bottom:2px solid var(--gray-200); margin-bottom:20px; }
.tab-btn { padding:10px 22px; font-size:14px; font-weight:500; cursor:pointer; border:none; background:none; color:var(--gray-500); border-bottom:2px solid transparent; margin-bottom:-2px; transition:color .15s,border-color .15s; }
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
.ledger-income  { color:#057a55; font-weight:600; }
.ledger-expense { color:#e02424; font-weight:600; }
.badge-income  { background:#def7ec; color:#057a55; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-expense { background:#fde8e8; color:#e02424; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.cat-list { display:flex; flex-direction:column; gap:6px; max-height:380px; overflow-y:auto; }
.cat-item { display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--gray-50); border-radius:8px; font-size:13px; }
.cat-item .cat-name { flex:1; }
.cat-item .cat-type { padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.cat-item .cat-type.income  { background:#def7ec; color:#057a55; }
.cat-item .cat-type.expense { background:#fde8e8; color:#e02424; }
.cat-inactive { opacity:.4; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><h2>🎨 繪新管理系統</h2><p id="sidebarOrgName"></p></div>
    <nav class="sidebar-nav">
      <a class="nav-item" data-page="dashboard" href="/dashboard"><span class="icon">📊</span>總覽</a>
      <a class="nav-item" data-page="cases"     href="/cases">    <span class="icon">📋</span>案件管理</a>
      <a class="nav-item" data-page="calendar"  href="/calendar"> <span class="icon">📅</span>派單行事曆</a>
      <a class="nav-item" data-page="payments"  href="/payments"> <span class="icon">💰</span>收款追蹤</a>
      <a class="nav-item" data-page="clients"   href="/clients">  <span class="icon">👥</span>客戶管理</a>
      <a class="nav-item" data-page="materials"  href="/materials"> <span class="icon">🎞️</span>膜料管理</a>
      <a class="nav-item" data-page="reports"     href="/reports">  <span class="icon">📈</span>財務報表</a>
      <a class="nav-item" data-page="admin"      href="/admin" data-need="manage_users"><span class="icon">⚙️</span>人員管理</a>
    </nav>
    <div class="sidebar-user">
      <div class="user-name" id="sidebarUserName"></div>
      <div class="user-role" id="sidebarUserRole"></div>
      <button class="logout-btn" id="logoutBtn">登出</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <span class="page-title">收款追蹤</span>
      <div style="display:flex;gap:8px">
        <input type="text" id="searchInput" placeholder="🔍 搜尋案號、客戶…"
               style="padding:7px 12px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px;width:200px">
      </div>
    </div>
    <div class="page-body">

      <div class="tab-bar">
        <button class="tab-btn active" id="tabCases"  onclick="switchTab('cases')">案件收款</button>
        <button class="tab-btn"        id="tabLedger" onclick="switchTab('ledger')">流水帳</button>
      </div>

      <!-- ===== 案件收款 ===== -->
      <div id="panelCases">
        <div class="stats-grid" id="paymentStats"></div>
        <div class="filter-bar">
          <span id="caseOrgFilterWrap" style="display:none;align-items:center;gap:6px">
            <label style="font-size:13px;color:var(--gray-600)">店別</label>
            <select id="filterCaseOrg" style="padding:7px 10px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px">
              <option value="">全部店別</option>
            </select>
          </span>
          <label style="font-size:13px;color:var(--gray-600)">收款狀態</label>
          <select id="filterPayment" style="padding:7px 10px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px">
            <option value="">全部</option>
            <option value="unpaid">未收款</option>
            <option value="partial">部分收款</option>
            <option value="paid">已收款</option>
            <option value="overdue">逾期</option>
          </select>
          <label style="font-size:13px;color:var(--gray-600)">案件階段</label>
          <select id="filterStatus" style="padding:7px 10px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px">
            <option value="">全部</option>
            <option value="contracted">已成交／施工中</option>
            <option value="payment">收款中</option>
            <option value="closed">已結案</option>
          </select>
          <button class="btn btn-ghost btn-sm" id="clearBtn">清除篩選</button>
        </div>
        <div class="card">
          <div class="card-body" style="padding:0">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>案號</th><th>客戶</th><th>項目</th><th>施工日</th>
                    <th>成交金額</th><th>含稅總額</th><th>訂金</th>
                    <th>已收</th><th>待收</th><th>收款狀態</th><th>業務</th><th></th>
                  </tr>
                </thead>
                <tbody id="payBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- ===== 流水帳 ===== -->
      <div id="panelLedger" style="display:none">
        <div class="stats-grid" id="ledgerStats"></div>
        <div class="filter-bar">
          <label style="font-size:13px;color:var(--gray-600)">月份</label>
          <input type="month" id="filterMonth" style="padding:7px 10px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px">
          <label style="font-size:13px;color:var(--gray-600)">類型</label>
          <select id="filterLedgerType" style="padding:7px 10px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px">
            <option value="">全部</option>
            <option value="income">收入</option>
            <option value="expense">支出</option>
          </select>
          <!-- 店別（僅跨分店角色可見） -->
          <span id="orgFilterWrap" style="display:none;align-items:center;gap:6px">
            <label style="font-size:13px;color:var(--gray-600)">店別</label>
            <select id="filterOrg" style="padding:7px 10px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px">
              <option value="">全部</option>
            </select>
          </span>
          <button class="btn btn-ghost btn-sm" id="clearLedgerBtn">清除篩選</button>
          <button class="btn btn-primary btn-sm" onclick="openLedgerModal()">＋ 新增</button>
          <button class="btn btn-ghost btn-sm" id="manageCatBtn" style="display:none" onclick="openCatModal()">管理科目</button>
        </div>
        <div class="card">
          <div class="card-body" style="padding:0">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>日期</th><th>類型</th><th>科目</th><th>說明</th>
                    <th>關聯案件</th><th>店別</th>
                    <th style="text-align:right">收入</th>
                    <th style="text-align:right">支出</th>
                    <th>登記人</th><th></th>
                  </tr>
                </thead>
                <tbody id="ledgerBody"></tbody>
                <tfoot id="ledgerFoot"></tfoot>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- 收款更新 Modal -->
<div class="modal-overlay" id="payModal">
  <div class="modal" style="max-width:460px">
    <div class="modal-header">
      <h3 id="payModalTitle">更新收款狀態</h3>
      <button class="modal-close" id="payModalClose">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="payingCaseId">
      <div style="background:var(--gray-50);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px" id="payModalInfo"></div>
      <div class="form-row">
        <div class="form-group">
          <label>收款狀態</label>
          <select id="payStatus">
            <option value="unpaid">未收款</option>
            <option value="partial">部分收款</option>
            <option value="paid">已收款</option>
            <option value="overdue">逾期</option>
          </select>
        </div>
        <div class="form-group"><label>已收金額</label><input type="number" id="payReceived" placeholder="0"></div>
      </div>
      <div class="form-group"><label>收款備註</label><textarea id="payNotes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="payCancel">取消</button>
      <button class="btn btn-primary" id="payConfirm">確認更新</button>
    </div>
  </div>
</div>

<!-- 流水帳新增/編輯 Modal -->
<div class="modal-overlay" id="ledgerModal">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h3 id="ledgerModalTitle">新增帳務記錄</h3>
      <button class="modal-close" onclick="document.getElementById('ledgerModal').classList.remove('open')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="ledgerEntryId">
      <div class="form-row">
        <div class="form-group">
          <label>日期 *</label>
          <input type="date" id="ledgerDate">
        </div>
        <div class="form-group">
          <label>類型 *</label>
          <select id="ledgerType" onchange="updateCategoryOptions()">
            <option value="income">收入</option>
            <option value="expense">支出</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>科目 *</label>
          <select id="ledgerCategory"></select>
        </div>
        <div class="form-group">
          <label>金額 *</label>
          <input type="number" id="ledgerAmount" placeholder="0" min="0">
        </div>
      </div>
      <div class="form-group">
        <label>店別</label>
        <select id="ledgerOrg">
          <option value="">— 請選擇 —</option>
        </select>
      </div>
      <div class="form-group">
        <label>說明</label>
        <input type="text" id="ledgerDescription" placeholder="例如：HX2605-001 尾款入帳">
      </div>
      <div class="form-group">
        <label>關聯案件（選填）</label>
        <input type="text" id="ledgerCaseSearch" placeholder="輸入案號或客戶名搜尋…" autocomplete="off">
        <input type="hidden" id="ledgerCaseId">
        <div id="ledgerCaseSuggest" style="display:none;position:absolute;z-index:100;background:#fff;border:1px solid var(--gray-200);border-radius:8px;margin-top:4px;max-height:160px;overflow-y:auto;font-size:13px;min-width:300px"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('ledgerModal').classList.remove('open')">取消</button>
      <button class="btn btn-primary" onclick="saveLedgerEntry()">儲存</button>
    </div>
  </div>
</div>

<!-- 管理科目 Modal -->
<div class="modal-overlay" id="catModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h3>管理會計科目</h3>
      <button class="modal-close" onclick="document.getElementById('catModal').classList.remove('open')">×</button>
    </div>
    <div class="modal-body">
      <div class="filter-bar" style="margin-bottom:12px">
        <select id="newCatType" style="padding:7px 10px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px">
          <option value="income">收入科目</option>
          <option value="expense">支出科目</option>
        </select>
        <input type="text" id="newCatName" placeholder="新科目名稱" style="padding:7px 12px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px;flex:1">
        <button class="btn btn-primary btn-sm" onclick="addCategory()">新增</button>
      </div>
      <div class="filter-bar" style="margin-bottom:12px">
        <label style="font-size:13px;color:var(--gray-600)">顯示</label>
        <select id="catFilterType" onchange="renderCatList()" style="padding:7px 10px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px">
          <option value="">全部</option>
          <option value="income">收入</option>
          <option value="expense">支出</option>
        </select>
      </div>
      <div class="cat-list" id="catList"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('catModal').classList.remove('open')">關閉</button>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
let allPayments = [], filtered = [];
let allLedger = [];
let allCategories = [];
let allOrgs = [];
let allCases = [];

async function init() {
  currentUser = await loadUser();
  highlightNav('payments');

  const now = new Date();
  document.getElementById('filterMonth').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  await Promise.all([loadOrgs(), loadCategories(), loadCasesForSearch()]);
  updateCategoryOptions();
  populateOrgSelects();

  await Promise.all([loadPayments(), loadLedger()]);

  // 案件收款篩選
  document.getElementById('filterPayment').addEventListener('change', applyFilter);
  document.getElementById('filterStatus').addEventListener('change', applyFilter);
  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('filterPayment').value = '';
    document.getElementById('filterStatus').value  = '';
    const caseOrgSel = document.getElementById('filterCaseOrg');
    if (caseOrgSel) caseOrgSel.value = '';
    loadPayments();
  });
  let t;
  document.getElementById('searchInput').addEventListener('input', () => { clearTimeout(t); t = setTimeout(applyFilter, 300); });

  // 流水帳篩選
  document.getElementById('filterMonth').addEventListener('change', loadLedger);
  document.getElementById('filterLedgerType').addEventListener('change', applyLedgerFilter);
  document.getElementById('filterOrg').addEventListener('change', loadLedger);
  document.getElementById('clearLedgerBtn').addEventListener('click', () => {
    document.getElementById('filterLedgerType').value = '';
    document.getElementById('filterOrg').value = '';
    loadLedger();
  });

  // 案件搜尋
  document.getElementById('ledgerCaseSearch').addEventListener('input', onCaseSearch);
  document.addEventListener('click', e => {
    if (!e.target.closest('#ledgerCaseSuggest') && !e.target.closest('#ledgerCaseSearch'))
      document.getElementById('ledgerCaseSuggest').style.display = 'none';
  });
}

async function loadOrgs() {
  const res = await fetch('/api/orgs');
  allOrgs = await res.json();
}

async function loadCategories() {
  const res = await fetch('/api/ledger/categories');
  allCategories = await res.json();
}

function populateOrgSelects() {
  // 店別篩選（流水帳 filter bar）
  const viewAll = currentUser?.view_all_branches;
  const orgWrap = document.getElementById('orgFilterWrap');
  if (viewAll) {
    orgWrap.style.display = 'flex';
    const sel = document.getElementById('filterOrg');
    allOrgs.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.id; opt.textContent = o.name;
      sel.appendChild(opt);
    });

    // 案件收款店別篩選
    const caseOrgWrap = document.getElementById('caseOrgFilterWrap');
    caseOrgWrap.style.display = 'flex';
    const caseSel = document.getElementById('filterCaseOrg');
    allOrgs.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.id; opt.textContent = o.name;
      caseSel.appendChild(opt);
    });
    caseSel.addEventListener('change', loadPayments);
  }

  // 新增記錄的店別下拉
  const ledgerOrgSel = document.getElementById('ledgerOrg');
  if (viewAll) {
    allOrgs.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.id; opt.textContent = o.name;
      ledgerOrgSel.appendChild(opt);
    });
  } else {
    // 固定自己的 org
    if (currentUser?.org_id) {
      const myOrg = allOrgs.find(o => o.id === currentUser.org_id);
      if (myOrg) {
        ledgerOrgSel.innerHTML = `<option value="${myOrg.id}">${myOrg.name}</option>`;
        ledgerOrgSel.disabled = true;
      }
    }
  }

  // owner 才顯示管理科目按鈕
  if (currentUser?.role === 'owner') {
    document.getElementById('manageCatBtn').style.display = '';
  }
}

// ─── Tab ─────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tabCases').classList.toggle('active',  tab==='cases');
  document.getElementById('tabLedger').classList.toggle('active', tab==='ledger');
  document.getElementById('panelCases').style.display  = tab==='cases'  ? '' : 'none';
  document.getElementById('panelLedger').style.display = tab==='ledger' ? '' : 'none';
  document.getElementById('searchInput').style.display = tab==='cases'  ? '' : 'none';
}

// ─── 案件收款 ──────────────────────────────────────────────────
async function loadPayments() {
  const orgId = document.getElementById('filterCaseOrg')?.value || '';
  let url = '/api/cases';
  if (orgId) url += `?org_id=${orgId}`;
  const res = await fetch(url);
  const all = await res.json();
  allPayments = all.filter(c => ['contracted','payment','closed'].includes(c.status));
  applyFilter();
}

function applyFilter() {
  const ps  = document.getElementById('filterPayment').value;
  const st  = document.getElementById('filterStatus').value;
  const org = document.getElementById('filterCaseOrg')?.value || '';
  const q   = document.getElementById('searchInput').value.trim().toLowerCase();
  filtered = allPayments.filter(c => {
    if (ps  && c.payment_status !== ps) return false;
    if (st  && c.status !== st) return false;
    if (org && String(c.org_id) !== org) return false;
    if (q   && !`${c.case_number} ${c.client_name} ${c.title}`.toLowerCase().includes(q)) return false;
    return true;
  });
  renderStats(filtered);
  renderTable(filtered);
}

function renderStats(cases) {
  const total    = cases.reduce((s,c) => s+(c.final_price||0), 0);
  const totalTax = total*1.05;
  const received = cases.reduce((s,c) => s+(c.payment_received||0), 0);
  const outstanding = totalTax-received;
  document.getElementById('paymentStats').innerHTML = `
    <div class="stat-card"><div class="label">含稅總應收</div><div class="value">${fmt(totalTax)}</div></div>
    <div class="stat-card"><div class="label">已收金額</div><div class="value success">${fmt(received)}</div></div>
    <div class="stat-card"><div class="label">未收金額</div><div class="value danger">${fmt(outstanding)}</div></div>
    <div class="stat-card"><div class="label">未收款案件</div><div class="value danger">${cases.filter(c=>c.payment_status==='unpaid').length} 件</div></div>
    <div class="stat-card"><div class="label">部分收款</div><div class="value warning">${cases.filter(c=>c.payment_status==='partial').length} 件</div></div>
  `;
}

function renderTable(cases) {
  const tbody = document.getElementById('payBody');
  if (!cases.length) {
    tbody.innerHTML = '<tr><td colspan="12"><div class="empty-state"><div class="icon">💰</div>沒有符合的收款記錄</div></td></tr>';
    return;
  }
  tbody.innerHTML = cases.map(c => {
    const base=c.final_price||c.quoted_price||0, total=base*1.05, dep=c.deposit_amount||0, recv=c.payment_received||0;
    const outstanding=total-recv;
    return `<tr onclick="location.href='/case-detail?id=${c.id}'" style="cursor:pointer">
      <td><code style="font-size:12px">${c.case_number}</code></td>
      <td><div style="font-weight:500">${c.client_name||'—'}</div><div style="font-size:11px;color:var(--gray-500)">${c.client_phone||''}</div></td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title}</td>
      <td>${fmtDate(c.scheduled_date)}</td>
      <td>${base?fmt(base):'—'}</td>
      <td style="font-weight:600">${base?fmt(total):'—'}</td>
      <td>${dep?fmt(dep):'—'}</td>
      <td style="color:#057a55">${recv?fmt(recv):'—'}</td>
      <td style="color:${outstanding>0?'#e02424':'#057a55'};font-weight:600">${outstanding>0?fmt(outstanding):'✓ 結清'}</td>
      <td>${paymentBadge(c.payment_status)}</td>
      <td>${c.sales_name||'—'}</td>
      <td onclick="event.stopPropagation()"><button class="btn btn-ghost btn-sm" onclick="openPayModal(${c.id})">更新</button></td>
    </tr>`;
  }).join('');
}

function openPayModal(id) {
  const c=allPayments.find(x=>x.id===id); if(!c) return;
  const base=c.final_price||c.quoted_price||0, total=base*1.05;
  document.getElementById('payModalTitle').textContent = `收款更新 — ${c.case_number}`;
  document.getElementById('payingCaseId').value = id;
  document.getElementById('payModalInfo').innerHTML = `
    <strong>${c.client_name||'（無客戶）'}</strong>｜${c.title}<br>
    成交金額：<strong>${fmt(base)}</strong>　含稅：<strong>${fmt(total)}</strong>
    ${c.deposit_amount?`　訂金：<strong>${fmt(c.deposit_amount)}</strong>`:''}
  `;
  document.getElementById('payStatus').value   = c.payment_status||'unpaid';
  document.getElementById('payReceived').value = c.payment_received||'';
  document.getElementById('payNotes').value    = c.payment_notes||'';
  document.getElementById('payModal').classList.add('open');
}

document.getElementById('payConfirm').addEventListener('click', async () => {
  const id=document.getElementById('payingCaseId').value;
  const c=allPayments.find(x=>x.id==id); if(!c) return;
  const body={...c,
    payment_status:   document.getElementById('payStatus').value,
    payment_received: parseFloat(document.getElementById('payReceived').value)||0,
    payment_notes:    document.getElementById('payNotes').value,
  };
  const res=await fetch(`/api/cases/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(res.ok){document.getElementById('payModal').classList.remove('open');showToast('收款狀態已更新');await loadPayments();}
  else showToast('更新失敗','error');
});
document.getElementById('payCancel').addEventListener('click',    ()=>document.getElementById('payModal').classList.remove('open'));
document.getElementById('payModalClose').addEventListener('click', ()=>document.getElementById('payModal').classList.remove('open'));

// ─── 流水帳 ───────────────────────────────────────────────────
async function loadLedger() {
  const month  = document.getElementById('filterMonth').value;
  const orgId  = document.getElementById('filterOrg')?.value || '';
  let url = '/api/ledger';
  const params = [];
  if (month)  params.push(`from=${month}-01`, `to=${month}-31`);
  if (orgId)  params.push(`org_id=${orgId}`);
  if (params.length) url += '?' + params.join('&');
  const res = await fetch(url);
  allLedger = await res.json();
  applyLedgerFilter();
}

function applyLedgerFilter() {
  const type = document.getElementById('filterLedgerType').value;
  const rows = type ? allLedger.filter(r=>r.type===type) : allLedger;
  renderLedgerStats(rows);
  renderLedgerTable(rows);
}

function renderLedgerStats(rows) {
  const inc = rows.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const exp = rows.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const net = inc-exp;
  document.getElementById('ledgerStats').innerHTML = `
    <div class="stat-card"><div class="label">收入合計</div><div class="value success">${fmt(inc)}</div></div>
    <div class="stat-card"><div class="label">支出合計</div><div class="value danger">${fmt(exp)}</div></div>
    <div class="stat-card"><div class="label">淨餘</div><div class="value ${net>=0?'success':'danger'}">${fmt(net)}</div></div>
    <div class="stat-card"><div class="label">筆數</div><div class="value">${rows.length} 筆</div></div>
  `;
}

function renderLedgerTable(rows) {
  const tbody = document.getElementById('ledgerBody');
  if (!rows.length) {
    tbody.innerHTML='<tr><td colspan="10"><div class="empty-state"><div class="icon">📒</div>尚無帳務記錄</div></td></tr>';
    document.getElementById('ledgerFoot').innerHTML='';
    return;
  }
  tbody.innerHTML = rows.map(r=>`
    <tr>
      <td>${fmtDate(r.date)}</td>
      <td><span class="badge-${r.type}">${r.type==='income'?'收入':'支出'}</span></td>
      <td>${r.category}</td>
      <td style="color:var(--gray-600)">${r.description||'—'}</td>
      <td>${r.case_number?`<code style="font-size:11px">${r.case_number}</code>`:'—'}</td>
      <td style="font-size:12px;color:var(--gray-500)">${r.org_name||'—'}</td>
      <td style="text-align:right" class="ledger-income">${r.type==='income'?fmt(r.amount):''}</td>
      <td style="text-align:right" class="ledger-expense">${r.type==='expense'?fmt(r.amount):''}</td>
      <td style="font-size:12px;color:var(--gray-500)">${r.created_by_name||'—'}</td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="editLedgerEntry(${r.id})">編輯</button>
        <button class="btn btn-ghost btn-sm" style="color:#e02424" onclick="deleteLedgerEntry(${r.id})">刪除</button>
      </td>
    </tr>
  `).join('');

  const inc=rows.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const exp=rows.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const net=inc-exp;
  document.getElementById('ledgerFoot').innerHTML=`
    <tr style="font-weight:700;background:var(--gray-50)">
      <td colspan="6">合計</td>
      <td style="text-align:right;color:#057a55">${fmt(inc)}</td>
      <td style="text-align:right;color:#e02424">${fmt(exp)}</td>
      <td colspan="2" style="color:${net>=0?'#057a55':'#e02424'}">淨餘 ${fmt(net)}</td>
    </tr>
  `;
}

// ─── 流水帳 Modal ─────────────────────────────────────────────
function updateCategoryOptions() {
  const type = document.getElementById('ledgerType').value;
  const cats = allCategories.filter(c=>c.type===type && c.active);
  const sel  = document.getElementById('ledgerCategory');
  sel.innerHTML = cats.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
}

function openLedgerModal(entry=null) {
  document.getElementById('ledgerModalTitle').textContent = entry?'編輯帳務記錄':'新增帳務記錄';
  document.getElementById('ledgerEntryId').value     = entry?entry.id:'';
  document.getElementById('ledgerDate').value         = entry?entry.date:new Date().toISOString().slice(0,10);
  document.getElementById('ledgerType').value         = entry?(entry.type):'income';
  updateCategoryOptions();
  if (entry) document.getElementById('ledgerCategory').value = entry.category;
  document.getElementById('ledgerAmount').value       = entry?entry.amount:'';
  document.getElementById('ledgerDescription').value  = entry?(entry.description||''):'';
  document.getElementById('ledgerCaseSearch').value   = entry?(entry.case_number||''):'';
  document.getElementById('ledgerCaseId').value       = entry?(entry.case_id||''):'';
  // 店別
  const orgSel = document.getElementById('ledgerOrg');
  if (entry?.org_id) orgSel.value = entry.org_id;
  else if (currentUser?.org_id) orgSel.value = currentUser.org_id;
  document.getElementById('ledgerModal').classList.add('open');
}

async function editLedgerEntry(id) {
  const entry=allLedger.find(r=>r.id===id); if(entry) openLedgerModal(entry);
}

async function deleteLedgerEntry(id) {
  if(!confirm('確定刪除這筆記錄？')) return;
  const res=await fetch(`/api/ledger/${id}`,{method:'DELETE'});
  if(res.ok){showToast('已刪除');await loadLedger();}
  else showToast('刪除失敗','error');
}

async function saveLedgerEntry() {
  const id=document.getElementById('ledgerEntryId').value;
  const body={
    date:        document.getElementById('ledgerDate').value,
    type:        document.getElementById('ledgerType').value,
    category:    document.getElementById('ledgerCategory').value,
    amount:      parseFloat(document.getElementById('ledgerAmount').value),
    description: document.getElementById('ledgerDescription').value,
    case_id:     document.getElementById('ledgerCaseId').value||null,
    org_id:      document.getElementById('ledgerOrg').value||null,
  };
  if(!body.date||!body.amount||isNaN(body.amount)) return showToast('請填寫日期與金額','error');
  const url=id?`/api/ledger/${id}`:'/api/ledger';
  const res=await fetch(url,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(res.ok){document.getElementById('ledgerModal').classList.remove('open');showToast(id?'已更新':'已新增');await loadLedger();}
  else showToast('儲存失敗','error');
}

// ─── 會計科目管理 ─────────────────────────────────────────────
async function openCatModal() {
  await loadCategories();
  renderCatList();
  document.getElementById('catModal').classList.add('open');
}

function renderCatList() {
  const typeFilter = document.getElementById('catFilterType').value;
  const cats = typeFilter ? allCategories.filter(c=>c.type===typeFilter) : allCategories;
  document.getElementById('catList').innerHTML = cats.map(c=>`
    <div class="cat-item ${c.active?'':'cat-inactive'}">
      <span class="cat-type ${c.type}">${c.type==='income'?'收入':'支出'}</span>
      <span class="cat-name">${c.name}</span>
      <button class="btn btn-ghost btn-sm" onclick="toggleCat(${c.id},${c.active})">${c.active?'停用':'啟用'}</button>
      <button class="btn btn-ghost btn-sm" style="color:#e02424" onclick="deleteCat(${c.id})">刪除</button>
    </div>
  `).join('') || '<div style="color:var(--gray-400);text-align:center;padding:16px">尚無科目</div>';
}

async function addCategory() {
  const type = document.getElementById('newCatType').value;
  const name = document.getElementById('newCatName').value.trim();
  if (!name) return showToast('請輸入科目名稱','error');
  const res = await fetch('/api/ledger/categories',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type,name})});
  if (res.ok) {
    document.getElementById('newCatName').value='';
    showToast('科目已新增');
    await loadCategories();
    renderCatList();
    updateCategoryOptions();
  } else showToast('新增失敗','error');
}

async function toggleCat(id, active) {
  const cat = allCategories.find(c=>c.id===id); if(!cat) return;
  await fetch(`/api/ledger/categories/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({...cat,active:active?0:1})});
  await loadCategories(); renderCatList(); updateCategoryOptions();
}

async function deleteCat(id) {
  if(!confirm('確定刪除此科目？')) return;
  const res = await fetch(`/api/ledger/categories/${id}`,{method:'DELETE'});
  if(res.ok){showToast('已刪除');await loadCategories();renderCatList();updateCategoryOptions();}
  else showToast('刪除失敗','error');
}

// ─── 案件搜尋自動完成 ─────────────────────────────────────────
async function loadCasesForSearch() {
  const res=await fetch('/api/cases'); allCases=await res.json();
}

function onCaseSearch(e) {
  const q=e.target.value.trim().toLowerCase();
  const box=document.getElementById('ledgerCaseSuggest');
  if(!q){box.style.display='none';document.getElementById('ledgerCaseId').value='';return;}
  const matches=allCases.filter(c=>`${c.case_number} ${c.client_name} ${c.title}`.toLowerCase().includes(q)).slice(0,8);
  if(!matches.length){box.style.display='none';return;}
  box.style.display='block';
  box.innerHTML=matches.map(c=>`
    <div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--gray-100)"
         onmousedown="selectCase(${c.id},'${c.case_number}')">
      <code style="font-size:11px">${c.case_number}</code>
      <span style="margin-left:8px">${c.client_name||''}</span>
      <span style="color:var(--gray-400);font-size:12px;margin-left:4px">${c.title}</span>
    </div>
  `).join('');
}

function selectCase(id,number) {
  document.getElementById('ledgerCaseId').value=''+id;
  document.getElementById('ledgerCaseSearch').value=number;
  document.getElementById('ledgerCaseSuggest').style.display='none';
}

init();
</script>
