<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客戶管理 — 繪新管理系統</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.client-card {
  background:#fff; border:1px solid var(--gray-200); border-radius:10px;
  padding:16px 20px; margin-bottom:10px; cursor:pointer; transition:all .15s;
}
.client-card:hover { border-color:var(--primary); box-shadow:0 2px 8px rgba(26,86,219,.1); }
.client-card.open  { border-color:var(--primary); }
.cc-header { display:flex; justify-content:space-between; align-items:center; }
.cc-name   { font-size:16px; font-weight:600; }
.cc-meta   { font-size:12px; color:var(--gray-500); margin-top:4px; }
.cc-badge  { padding:3px 10px; border-radius:20px; font-size:12px; font-weight:500; background:var(--gray-100); color:var(--gray-600); }
.cc-cases  { display:none; margin-top:14px; border-top:1px solid var(--gray-100); padding-top:14px; }
.client-card.open .cc-cases { display:block; }
.case-row  { display:flex; align-items:center; gap:12px; padding:8px 0;
             border-bottom:1px solid var(--gray-100); font-size:13px; }
.case-row:last-child { border-bottom:none; }
.source-tag { padding:2px 8px; border-radius:12px; font-size:11px; font-weight:500; }
.source-line     { background:#d1fae5; color:#065f46; }
.source-ig       { background:#ede9fe; color:#5b21b6; }
.source-fb       { background:#dbeafe; color:#1e40af; }
.source-referral { background:#fef3c7; color:#92400e; }
.source-bni      { background:#fee2e2; color:#991b1b; }
.source-google   { background:#f0fdf4; color:#166534; }
.source-boss_friend { background:#fce7f3; color:#9d174d; }
.source-other    { background:var(--gray-100); color:var(--gray-600); }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><h2>🎨 繪新管理系統</h2><p id="sidebarOrgName"></p></div>
    <nav class="sidebar-nav">
      <a class="nav-item" data-page="dashboard" href="/dashboard"><span class="icon">📊</span>總覽</a>
      <a class="nav-item" data-page="cases"     href="/cases">    <span class="icon">📋</span>案件管理</a>
      <a class="nav-item" data-page="clients"   href="/clients">  <span class="icon">👥</span>客戶管理</a>
      <a class="nav-item" data-page="calendar"  href="/calendar"> <span class="icon">📅</span>派單行事曆</a>
      <a class="nav-item" data-page="payments"  href="/payments"> <span class="icon">💰</span>收款追蹤</a>
      <a class="nav-item" data-page="admin"     href="/admin" data-need="manage_users"><span class="icon">⚙️</span>人員管理</a>
    </nav>
    <div class="sidebar-user">
      <div class="user-name" id="sidebarUserName"></div>
      <div class="user-role" id="sidebarUserRole"></div>
      <button class="logout-btn" id="logoutBtn">登出</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <span class="page-title">客戶管理</span>
      <div style="display:flex;gap:8px">
        <input type="text" id="searchInput" placeholder="🔍 搜尋姓名、電話…"
               style="padding:7px 12px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px;width:200px">
        <button class="btn btn-primary btn-sm" id="newClientBtn">＋ 新增客戶</button>
      </div>
    </div>
    <div class="page-body">

      <!-- 統計 -->
      <div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap">
        <div class="card" style="flex:1;min-width:120px;padding:16px 20px">
          <div style="font-size:12px;color:var(--gray-500)">客戶總數</div>
          <div style="font-size:24px;font-weight:700" id="statTotal">—</div>
        </div>
        <div class="card" style="flex:1;min-width:120px;padding:16px 20px">
          <div style="font-size:12px;color:var(--gray-500)">有施工記錄</div>
          <div style="font-size:24px;font-weight:700;color:var(--primary)" id="statActive">—</div>
        </div>
        <div class="card" style="flex:1;min-width:120px;padding:16px 20px">
          <div style="font-size:12px;color:var(--gray-500)">來源：Line@</div>
          <div style="font-size:24px;font-weight:700" id="statLine">—</div>
        </div>
        <div class="card" style="flex:1;min-width:120px;padding:16px 20px">
          <div style="font-size:12px;color:var(--gray-500)">來源：介紹</div>
          <div style="font-size:24px;font-weight:700" id="statRef">—</div>
        </div>
      </div>

      <!-- 來源篩選 -->
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <span class="type-tab active" data-src="">全部</span>
        <span class="type-tab" data-src="line">Line@</span>
        <span class="type-tab" data-src="ig">Instagram</span>
        <span class="type-tab" data-src="fb">Facebook</span>
        <span class="type-tab" data-src="referral">介紹</span>
        <span class="type-tab" data-src="bni">BNI</span>
        <span class="type-tab" data-src="google">Google</span>
        <span class="type-tab" data-src="boss_friend">老闆的親友</span>
        <span class="type-tab" data-src="other">其他</span>
      </div>

      <!-- 客戶卡片列表 -->
      <div id="clientList"></div>
    </div>
  </div>
</div>

<!-- 新增 / 編輯客戶 Modal -->
<div class="modal-overlay" id="clientModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h3 id="clientModalTitle">新增客戶</h3>
      <button class="modal-close" onclick="closeClientModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="cm_id">

      <!-- 名片上傳 OCR -->
      <div style="margin-bottom:16px;padding:12px 14px;background:#f0f4ff;border-radius:8px;border:1px dashed #93c5fd">
        <div style="font-size:13px;font-weight:600;color:#1e40af;margin-bottom:8px">📷 上傳名片自動辨識</div>
        <div style="display:flex;gap:8px;align-items:center">
          <label style="cursor:pointer">
            <input type="file" id="cm_card_file" accept="image/*" style="display:none">
            <span class="btn btn-ghost btn-sm">選擇名片圖片</span>
          </label>
          <span id="cm_card_filename" style="font-size:12px;color:#6b7280">（支援 JPG、PNG）</span>
          <button class="btn btn-primary btn-sm" id="cm_ocr_btn" style="display:none">辨識並填入</button>
        </div>
        <div id="cm_ocr_status" style="font-size:12px;margin-top:6px;color:#6b7280"></div>
      </div>

      <div class="form-row">
        <div class="form-group"><label>客戶抬頭 / 公司名 *</label><input type="text" id="cm_name" placeholder="王大明 / 信義裝潢有限公司"></div>
        <div class="form-group"><label>聯絡人</label><input type="text" id="cm_contact_person" placeholder="負責人姓名"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>電話</label><input type="tel" id="cm_phone" placeholder="0912-345-678"></div>
        <div class="form-group"><label>Email</label><input type="email" id="cm_email"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>統一編號</label><input type="text" id="cm_tax_id" placeholder="12345678"></div>
        <div class="form-group"><label>電子發票代碼</label><input type="text" id="cm_einvoice_code" placeholder="（選填）"></div>
      </div>
      <div class="form-group"><label>名片地址</label><input type="text" id="cm_address"></div>
      <div class="form-row">
        <div class="form-group"><label>客戶等級</label>
          <select id="cm_client_level">
            <option value="">不指定</option>
            <option value="A">A 級（優質常客）</option>
            <option value="B">B 級（一般）</option>
            <option value="C">C 級（潛在）</option>
          </select>
          <div id="cm_level_hint" style="font-size:11px;margin-top:4px;color:#92400e;display:none"></div>
        </div>
        <div class="form-group"><label>來源</label>
          <select id="cm_source">
            <option value="">不指定</option>
            <option value="line">Line@</option>
            <option value="ig">Instagram</option>
            <option value="fb">Facebook</option>
            <option value="referral">客戶介紹</option>
            <option value="bni">BNI</option>
            <option value="google">Google 搜尋</option>
            <option value="boss_friend">老闆的親友</option>
            <option value="other">其他</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>付款條件</label><input type="text" id="cm_payment_terms" placeholder="例：月結30天"></div>
        <div class="form-group"><label>優惠條件</label><input type="text" id="cm_discount_terms" placeholder="例：9折"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>資本額</label><input type="text" id="cm_capital" placeholder="（選填）"></div>
        <div class="form-group"><label>折扣（1.0 = 全額）</label><input type="number" id="cm_discount" value="1" step="0.01" min="0" max="1"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>介紹人 / 來源備註</label><input type="text" id="cm_referrer" placeholder="（選填）"></div>
        <div class="form-group"><label>LINE 群組名稱</label><input type="text" id="cm_line_group_name" placeholder="例：@繪新-信義案"></div>
      </div>
      <div class="form-group"><label>備註</label><textarea id="cm_notes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeClientModal()">取消</button>
      <button class="btn btn-primary" id="saveClientBtn">儲存</button>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
const SOURCE_LABELS = { line:'Line@', ig:'Instagram', fb:'Facebook', referral:'客戶介紹', bni:'BNI', google:'Google', boss_friend:'老闆的親友', other:'其他' };

function suggestLevel(c) {
  const orders = c.orders_last_year || 0;
  const revenue = c.total_revenue || 0;
  if (orders >= 3 || revenue >= 200000) return 'A';
  if (orders >= 1 || revenue >= 100000) return 'B';
  return 'C';
}

async function applyLevel(cid, level) {
  const c = allClients.find(x => x.id === cid);
  if (!c) return;
  const body = {
    name: c.name, contact_person: c.contact_person, phone: c.phone,
    email: c.email, tax_id: c.tax_id, einvoice_code: c.einvoice_code,
    address: c.address, client_level: level, source: c.source,
    payment_terms: c.payment_terms, discount_terms: c.discount_terms,
    capital: c.capital, referrer: c.referrer, line_group_name: c.line_group_name,
    discount: c.discount, notes: c.notes,
  };
  const res = await fetch(`/api/clients/${cid}`, {
    method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  if (res.ok) {
    showToast(`${c.name} 已套用為 ${level} 級`);
    clientCases = {};
    await loadClients();
  }
}

let allClients = [], activeSource = '', searchQ = '';
let clientCases = {};

async function init() {
  await loadUser();
  highlightNav('clients');
  await loadClients();

  document.querySelectorAll('.type-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeSource = tab.dataset.src;
      render();
    });
  });

  let t;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(t);
    t = setTimeout(() => { searchQ = e.target.value.trim().toLowerCase(); render(); }, 250);
  });

  document.getElementById('newClientBtn').addEventListener('click', () => openClientModal());
  document.getElementById('saveClientBtn').addEventListener('click', saveClient);
}

async function loadClients() {
  allClients = await fetchClients();
  renderStats();
  render();
}

function renderStats() {
  document.getElementById('statTotal').textContent = allClients.length;
  document.getElementById('statActive').textContent = allClients.filter(c => c._case_count > 0).length;
  document.getElementById('statLine').textContent = allClients.filter(c => c.source === 'line').length;
  document.getElementById('statRef').textContent  = allClients.filter(c => c.source === 'referral').length;
}

function render() {
  const list = allClients.filter(c => {
    if (activeSource && c.source !== activeSource) return false;
    if (searchQ && !`${c.name} ${c.contact_person || ''} ${c.phone || ''} ${c.email || ''}`.toLowerCase().includes(searchQ)) return false;
    return true;
  });
  const el = document.getElementById('clientList');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state" style="padding:48px"><div class="icon">👥</div>沒有符合的客戶</div>`;
    return;
  }
  el.innerHTML = list.map(c => {
    const srcLabel = SOURCE_LABELS[c.source] || '';
    const srcCls   = c.source ? `source-${c.source}` : '';
    return `
    <div class="client-card" id="cc-${c.id}" onclick="toggleCard(${c.id})">
      <div class="cc-header">
        <div>
          <div class="cc-name">${c.name}
            ${srcLabel ? `<span class="source-tag ${srcCls}" style="margin-left:8px">${srcLabel}</span>` : ''}
          </div>
          <div class="cc-meta">
            ${c.contact_person ? `👤 ${c.contact_person}　` : ''}${c.client_level ? `[${c.client_level}級]　` : ''}
            ${c.phone ? `📞 ${c.phone}` : ''}
            ${c.email ? `　✉️ ${c.email}` : ''}
            ${c.address ? `　📍 ${c.address}` : ''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="cc-badge" id="ccase-${c.id}">歷史案件載入中…</span>
          ${(() => {
            const sug = suggestLevel(c);
            return sug !== (c.client_level || '') ?
              `<button class="btn btn-sm" style="background:#fef3c7;color:#92400e;border:1px solid #fcd34d;font-size:11px"
                 onclick="event.stopPropagation();applyLevel(${c.id},'${sug}')">✨ 建議${sug}級</button>` : '';
          })()}
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openClientModal(${c.id})">編輯</button>
        </div>
      </div>
      <div class="cc-cases" id="cases-${c.id}">
        <div style="font-size:12px;color:var(--gray-500);text-align:center;padding:8px">載入中…</div>
      </div>
    </div>`;
  }).join('');

  // 預先載入每個客戶的案件數（輕量）
  list.forEach(c => loadClientCases(c.id));
}

async function loadClientCases(cid) {
  if (clientCases[cid]) { renderClientCases(cid); return; }
  const res = await fetch(`/api/clients/${cid}/cases`);
  clientCases[cid] = res.ok ? await res.json() : [];
  renderClientCases(cid);
}

function renderClientCases(cid) {
  const cases = clientCases[cid] || [];
  const badge = document.getElementById(`ccase-${cid}`);
  if (badge) badge.textContent = cases.length ? `${cases.length} 件歷史案件` : '新客戶';

  const el = document.getElementById(`cases-${cid}`);
  if (!el) return;
  if (!cases.length) {
    el.innerHTML = `<p style="font-size:13px;color:var(--gray-500);text-align:center">尚無案件記錄</p>
      <div style="text-align:center;margin-top:8px">
        <a href="/cases" class="btn btn-primary btn-sm">為此客戶建立案件</a>
      </div>`;
    return;
  }
  el.innerHTML = cases.map(c => `
    <div class="case-row" onclick="event.stopPropagation();location.href='/case-detail?id=${c.id}'" style="cursor:pointer">
      <code style="font-size:12px;color:var(--gray-500);min-width:100px">${c.case_number}</code>
      <span style="flex:1;font-weight:500">${c.title}</span>
      <span>${statusBadge(c.status)}</span>
      ${currentUser.can_see_amounts && c.final_price ? `<span style="font-weight:600;color:var(--primary)">${fmt(c.final_price)}</span>` : ''}
      <span>${paymentBadge(c.payment_status)}</span>
    </div>
  `).join('');
}

function toggleCard(cid) {
  const card = document.getElementById(`cc-${cid}`);
  const isOpen = card.classList.contains('open');
  card.classList.toggle('open', !isOpen);
  if (!isOpen) loadClientCases(cid);
}

function openClientModal(id) {
  document.getElementById('clientModalTitle').textContent = id ? '編輯客戶' : '新增客戶';
  document.getElementById('cm_id').value = id || '';
  if (id) {
    const c = allClients.find(x => x.id === id);
    if (!c) return;
    document.getElementById('cm_name').value           = c.name || '';
    document.getElementById('cm_contact_person').value  = c.contact_person || '';
    document.getElementById('cm_phone').value           = c.phone || '';
    document.getElementById('cm_email').value           = c.email || '';
    document.getElementById('cm_tax_id').value          = c.tax_id || '';
    document.getElementById('cm_einvoice_code').value   = c.einvoice_code || '';
    document.getElementById('cm_address').value         = c.address || '';
    document.getElementById('cm_client_level').value    = c.client_level || '';
    document.getElementById('cm_source').value          = c.source || '';
    document.getElementById('cm_payment_terms').value   = c.payment_terms || '';
    document.getElementById('cm_discount_terms').value  = c.discount_terms || '';
    document.getElementById('cm_capital').value         = c.capital || '';
    document.getElementById('cm_discount').value        = c.discount ?? 1;
    document.getElementById('cm_referrer').value         = c.referrer || '';
    document.getElementById('cm_line_group_name').value  = c.line_group_name || '';
    document.getElementById('cm_notes').value            = c.notes || '';
  } else {
    ['cm_name','cm_contact_person','cm_phone','cm_email','cm_tax_id','cm_einvoice_code',
     'cm_address','cm_payment_terms','cm_discount_terms','cm_capital','cm_referrer','cm_line_group_name','cm_notes']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('cm_source').value       = '';
    document.getElementById('cm_client_level').value = '';
    document.getElementById('cm_discount').value     = '1';
  }
  document.getElementById('cm_card_filename').textContent = '（支援 JPG、PNG）';
  document.getElementById('cm_card_file').value = '';
  document.getElementById('cm_ocr_btn').style.display = 'none';
  document.getElementById('cm_ocr_status').textContent = '';

  const hint = document.getElementById('cm_level_hint');
  if (id) {
    const c = allClients.find(x => x.id === id);
    const sug = c ? suggestLevel(c) : null;
    if (sug && sug !== (c.client_level || '')) {
      hint.style.display = 'block';
      hint.innerHTML = `✨ 系統建議：<strong>${sug} 級</strong>（近一年成交 ${c.orders_last_year} 筆 / 累計 ${fmt(c.total_revenue)}）
        <a href="#" style="margin-left:6px;color:#1e40af" onclick="event.preventDefault();document.getElementById('cm_client_level').value='${sug}';this.parentElement.style.display='none'">套用</a>`;
    } else { hint.style.display = 'none'; }
  } else { hint.style.display = 'none'; }

  document.getElementById('clientModal').classList.add('open');
}
function closeClientModal() { document.getElementById('clientModal').classList.remove('open'); }

async function saveClient() {
  const id   = document.getElementById('cm_id').value;
  const name = document.getElementById('cm_name').value.trim();
  if (!name) { showToast('請填入客戶姓名', 'error'); return; }
  const g = id => document.getElementById(id).value || null;
  const body = {
    name,
    contact_person:  g('cm_contact_person'),
    phone:           g('cm_phone'),
    email:           g('cm_email'),
    tax_id:          g('cm_tax_id'),
    einvoice_code:   g('cm_einvoice_code'),
    address:         g('cm_address'),
    client_level:    g('cm_client_level'),
    source:          g('cm_source'),
    payment_terms:   g('cm_payment_terms'),
    discount_terms:  g('cm_discount_terms'),
    capital:         g('cm_capital'),
    referrer:        g('cm_referrer'),
    line_group_name: g('cm_line_group_name'),
    discount:        parseFloat(document.getElementById('cm_discount').value) || 1,
    notes:           g('cm_notes'),
  };
  const url    = id ? `/api/clients/${id}` : '/api/clients';
  const method = id ? 'PUT' : 'POST';
  const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if (res.ok) {
    closeClientModal();
    showToast(id ? '客戶資訊已更新' : `客戶「${name}」已建立`);
    clientCases = {};
    await loadClients();
  } else { showToast('儲存失敗', 'error'); }
}

// ── 名片 OCR ──────────────────────────────────────────────────
document.getElementById('cm_card_file').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  document.getElementById('cm_card_filename').textContent = file.name;
  document.getElementById('cm_ocr_btn').style.display = 'inline-flex';
  document.getElementById('cm_ocr_status').textContent = '';
});

document.getElementById('cm_ocr_btn').addEventListener('click', async () => {
  const file = document.getElementById('cm_card_file').files[0];
  if (!file) return;
  const btn    = document.getElementById('cm_ocr_btn');
  const status = document.getElementById('cm_ocr_status');
  btn.disabled = true;
  btn.textContent = '辨識中…';
  status.textContent = '正在辨識名片，請稍候…';
  status.style.color = '#6b7280';

  try {
    const form = new FormData();
    form.append('card', file);
    const res  = await fetch('/api/clients/ocr-card', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '辨識失敗');

    // 填入欄位（只覆蓋空白的，讓客服可以手動保留已填的值）
    const fill = (id, val) => { if (val && !document.getElementById(id).value) document.getElementById(id).value = val; };
    fill('cm_name',           data.name);
    fill('cm_contact_person', data.contact_person || data.name);
    fill('cm_phone',          data.phone);
    fill('cm_email',          data.email);
    fill('cm_address',        data.address);
    fill('cm_tax_id',         data.tax_id);

    status.textContent = '✅ 辨識完成，請確認並補齊資料';
    status.style.color = '#057a55';
  } catch (e) {
    status.textContent = '❌ ' + e.message;
    status.style.color = '#e02424';
  } finally {
    btn.disabled = false;
    btn.textContent = '辨識並填入';
  }
});

init();
</script>
</body>
</html>
