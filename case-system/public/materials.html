<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>膜料管理 — 繪新管理系統</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="icon" href="/logo.png" type="image/png">
<style>
.filter-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
.filter-row select, .filter-row input { padding:8px 12px; border:1px solid var(--gray-300); border-radius:8px; font-size:13px; background:#fff; }

.mat-row td { vertical-align:middle; }
.mat-row:hover td { background:var(--gray-50); cursor:pointer; }
.mat-row.expanded td { background:#fff8fe !important; border-bottom:none; }

.rolls-panel { background:#fdf2ff; border:1px solid var(--primary-light); border-top:none; }
.rolls-panel td { padding:0 !important; border-bottom:1px solid var(--primary-light) !important; }
.rolls-inner { padding:16px 20px; }
.roll-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.roll-title { font-size:13px; font-weight:600; color:var(--primary-dark); }

.roll-table { width:100%; border-collapse:collapse; font-size:13px; }
.roll-table th { background:rgba(255,0,128,.06); padding:6px 10px; font-size:11px; font-weight:600; color:var(--gray-500); border-bottom:1px solid var(--primary-light); white-space:nowrap; }
.roll-table td { padding:8px 10px; border-bottom:1px solid rgba(255,0,128,.08); vertical-align:middle; }
.roll-table tr:last-child td { border-bottom:none; }

.status-pill { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.status-pill.active   { background:#dcfce7; color:#14532d; }
.status-pill.finished { background:var(--gray-100); color:var(--gray-500); }
.status-pill.lost     { background:#fee2e2; color:#991b1b; }

.log-type-badge { display:inline-block; padding:2px 7px; border-radius:4px; font-size:11px; font-weight:500; }
.log-purchase   { background:#dbeafe; color:#1e40af; }
.log-case_cut   { background:#dcfce7; color:#14532d; }
.log-case_loss  { background:#fee2e2; color:#991b1b; }
.log-store_sale { background:#fef9c3; color:#713f12; }
.log-academy    { background:#e0e7ff; color:#3730a3; }
.log-ecommerce  { background:#fce7f3; color:#9d174d; }
.log-adjust     { background:var(--gray-100); color:var(--gray-500); }
.log-reserve    { background:#fef3c7; color:#92400e; }

.stock-low  { color:var(--danger); font-weight:700; }
.stock-mid  { color:var(--warning); font-weight:600; }
.stock-ok   { color:var(--success); }

.expand-btn { background:none; border:none; cursor:pointer; color:var(--gray-500); font-size:16px; padding:2px 6px; transition:transform .2s; }
.expand-btn.open { transform:rotate(90deg); color:var(--primary); }

/* 品牌色塊 */
.brand-tag { display:inline-block; padding:2px 7px; border-radius:4px; font-size:11px; font-weight:700; }
.brand-BODAQ  { background:#e0e7ff; color:#3730a3; }
.brand-LG     { background:#dcfce7; color:#14532d; }
.brand-3M     { background:#dbeafe; color:#1e40af; }
.brand-Paroi  { background:#fce7f3; color:#9d174d; }
.brand-穩得   { background:#fef9c3; color:#713f12; }
.brand-AICA   { background:#f3e8ff; color:#6b21a8; }
.brand-other  { background:var(--gray-100); color:var(--gray-700); }

.branch-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
.branch-tab { padding:6px 14px; border-radius:20px; font-size:13px; font-weight:600;
              border:1.5px solid var(--gray-300); background:#fff; cursor:pointer;
              color:var(--gray-600); transition:all .15s; }
.branch-tab:hover { border-color:var(--primary); color:var(--primary); }
.branch-tab.active { background:var(--primary); border-color:var(--primary); color:#fff; }
.branch-badge { display:inline-block; padding:1px 7px; border-radius:4px; font-size:11px;
                font-weight:600; background:#e0f2fe; color:#0369a1; }

.case-option { padding:9px 12px; cursor:pointer; display:flex; align-items:center; gap:8px;
               border-bottom:1px solid var(--gray-100); font-size:13px; transition:background .1s; }
.case-option:last-child { border-bottom:none; }
.case-option:hover { background:var(--gray-50); }
.case-option.selected { background:rgba(255,0,128,.07); border-left:3px solid var(--primary); }
.case-option .case-num { font-family:monospace; font-size:11px; color:var(--gray-500); white-space:nowrap; }
.case-option .case-title { font-weight:600; flex:1; }
.case-option .case-client { font-size:12px; color:var(--gray-500); white-space:nowrap; }

/* 膜料異動紀錄 */
.activity-item { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--gray-100); font-size:13px; }
.activity-item:last-child { border-bottom:none; }
.activity-icon { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.activity-icon.create   { background:#dcfce7; }
.activity-icon.edit     { background:#e0e7ff; }
.activity-icon.delete   { background:#fee2e2; }
.activity-icon.purchase { background:#dbeafe; }
.activity-icon.store_sale, .activity-icon.academy, .activity-icon.ecommerce { background:#fef9c3; }
.activity-icon.adjust   { background:var(--gray-100); }
.activity-body { flex:1; min-width:0; }
.activity-detail { color:var(--gray-700); line-height:1.4; }
.activity-meta { font-size:11px; color:var(--gray-400); margin-top:2px; }
.activity-user { font-weight:600; color:var(--gray-600); }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><h2><img src="/logo.png" style="height:28px;width:28px;object-fit:contain;filter:brightness(0) invert(1);margin-right:8px;flex-shrink:0"> 繪新管理系統</h2><p id="sidebarOrgName"></p></div>
            <nav class="sidebar-nav">
        <a class="nav-item" data-page="dashboard"      href="/dashboard">      <span class="icon">📊</span>總覽</a>
        <a class="nav-item" data-page="my-tasks"       href="/my-tasks">       <span class="icon">📌</span>我的任務</a>
        <a class="nav-item" data-page="my-calendar"    href="/my-calendar">   <span class="icon">🗓️</span>我的行事曆</a>
        <a class="nav-item" data-page="line-inquiries" href="/line-inquiries"> <span class="icon">💬</span>LINE 詢問</a>
        <a class="nav-item" data-page="cases-inquiry"  href="/cases-inquiry">   <span class="icon">📝</span>詢價管理</a>
        <a class="nav-item" data-page="cases-survey"   href="/cases-survey">    <span class="icon">🔍</span>場勘案件管理</a>
        <a class="nav-item" data-page="cases-deal"     href="/cases-deal">      <span class="icon">✅</span>成交案件管理</a>
        <a class="nav-item" data-page="dispatch-pool"  href="/dispatch-pool">  <span class="icon">🏊</span>派案池管理</a>
        <a class="nav-item" data-page="calendar"       href="/calendar">       <span class="icon">📅</span>派單行事曆</a>
        <a class="nav-item" data-page="clients"        href="/clients">        <span class="icon">👥</span>客戶管理</a>
        <a class="nav-item" data-page="materials"      href="/materials">      <span class="icon">🎞️</span>膜料管理</a>
        <a class="nav-item" data-page="material-calc"  href="/material-calc">  <span class="icon">🧮</span>快速報價</a>
        <a class="nav-item" data-page="payments"       href="/payments">       <span class="icon">💰</span>收款追蹤</a>
        <a class="nav-item" data-page="ledger"         href="/ledger">         <span class="icon">📒</span>收支流水帳</a>
        <a class="nav-item" data-page="performance"    href="/performance">    <span class="icon">🏆</span>業績報表</a>

    </nav>
    <div class="sidebar-user">
      <div class="user-name" id="sidebarUserName"></div>
      <div class="user-role" id="sidebarUserRole"></div>
      <button class="logout-btn" id="logoutBtn">登出</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <span class="page-title">膜料管理</span>
      <button class="btn btn-primary btn-sm" onclick="openMatModal()">＋ 新增膜料型號</button>
    </div>
    <div class="page-body">
      <div class="stats-grid" id="statsGrid"></div>

      <!-- 膜料異動紀錄 -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-header" style="cursor:default">
          <h3>膜料異動紀錄</h3>
          <button id="activityToggleBtn" onclick="toggleActivity()" class="btn btn-ghost btn-sm">展開全部</button>
        </div>
        <div id="activityList" style="padding:0 20px 4px"></div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>膜料庫存</h3>
        </div>
        <div style="padding:12px 20px;border-bottom:1px solid var(--gray-200)">
          <div class="branch-tabs" id="branchTabs"></div>
          <div class="filter-row">
            <input type="text" id="searchInput" placeholder="🔍 搜尋品牌/型號…" oninput="applyFilters()" style="width:200px">

              <option value="">全部品牌</option>

            <select id="filterSpec" onchange="applyFilters()">

            </select>
            <select id="filterStock" onchange="applyFilters()">
              <option value="">全部庫存</option>

        <div class="card-body" style="padding:0">

</div>

<!-- 新增/編輯膜料 Modal -->
<div class="modal-overlay" id="matModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h3 id="matModalTitle">新增膜料型號</h3>
      <button class="modal-close" onclick="closeMatModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>品牌 *</label>
          <input type="text" id="m_brand" list="dl_brand" placeholder="3M、BODAQ、LG…" autocomplete="off">
        </div>
        <div class="form-group"><label>型號 *</label>
          <input type="text" id="m_model" list="dl_model" autocomplete="off">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>材質/紋路</label>
          <select id="m_spec">
            <option value="">請選擇</option>
            <option>木紋</option><option>石紋</option><option>金屬</option>
            <option>素面</option><option>塗料</option><option>皮革</option>
            <option>布紋</option><option>編織</option><option>隔熱紙</option>
            <option>炫彩虹膜</option><option>長虹玻璃膜</option><option>其他</option>
          </select>
        </div>
        <div class="form-group"><label>貨架位置</label>
          <input type="text" id="m_location" list="dl_location" placeholder="N-1、B-3…" autocomplete="off">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>成本/米（NT$）</label><input type="number" id="m_unit_cost" min="0" step="1" placeholder="0"></div>
        <div class="form-group"><label>售價/米（NT$）</label><input type="number" id="m_unit_price" min="0" step="1" placeholder="0"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>庫存米數</label><input type="number" id="m_stock_meters" min="0" step="0.1" placeholder="0"></div>
        <div class="form-group"></div>
      </div>
      <div class="form-group"><label>備注</label><textarea id="m_notes" rows="2"></textarea></div>
    </div>
    <datalist id="dl_brand"></datalist>
    <datalist id="dl_model"></datalist>
    <datalist id="dl_location"></datalist>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeMatModal()">取消</button>
      <button class="btn btn-primary" onclick="saveMat()">儲存</button>
    </div>
  </div>
</div>

<!-- 新增捲料（進貨）Modal -->
<div class="modal-overlay" id="rollModal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h3 id="rollModalTitle">新增捲料（進貨）</h3>
      <button class="modal-close" onclick="closeRollModal()">✕</button>
    </div>

      <div class="form-row">

      </div>

        <div class="form-group"><label>進貨米數 *</label><input type="number" id="r_initial_meters" min="0" step="0.1" placeholder="50"></div>
        <div class="form-group"><label>進貨成本/米</label><input type="number" id="r_unit_cost" min="0" step="1" placeholder="0"></div>

      <div class="form-row">
        <div class="form-group">
          <label>店別 *</label>
          <select id="r_branch"></select>
        </div>
        <div class="form-group"><label>存放位置</label>
          <input type="text" id="r_location" list="dl_location" placeholder="N-1 第3支…" autocomplete="off">
        </div>
      </div>
      <div class="form-group"><label>備注</label><textarea id="r_notes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeRollModal()">取消</button>
      <button class="btn btn-primary" onclick="saveRoll()">確認入庫</button>
    </div>
  </div>
</div>

<!-- 新增使用紀錄 Modal -->
<div class="modal-overlay" id="logModal">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <h3 id="logModalTitle">新增使用紀錄</h3>
      <button class="modal-close" onclick="closeLogModal()">✕</button>

    <div class="modal-body">

          <option value="adjust">庫存調整</option>

      <div class="form-group">

        <input type="number" id="l_meters" min="0.1" step="0.1" placeholder="3.5">
      </div>
      <div class="form-group" id="l_case_group">
        <label>關聯案件（選填）</label>
        <input type="text" id="l_case_search" placeholder="輸入案件編號或名稱搜尋…" oninput="searchCase()" autocomplete="off">

      <div class="form-group"><label>備注</label><textarea id="l_notes" rows="2"></textarea></div>

    <div class="modal-footer">

<!-- 銷貨／扣庫 Modal -->
<div class="modal-overlay" id="sellModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h3 id="sellModalTitle">銷貨／扣庫</h3>
      <button class="modal-close" onclick="closeSellModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>選擇捲料 *</label>
        <select id="s_roll_id" onchange="updateRollRemaining()">

        </select>
        <div id="s_roll_remaining" style="font-size:12px;margin-top:4px"></div>

      <div class="form-row">
        <div class="form-group">
          <label>用途 *</label>
          <select id="s_type">
            <option value="reserve">保留</option>
            <option value="case_cut">案場切料</option>
            <option value="case_loss">案場損失重貼</option>
            <option value="store_sale">門市銷售</option>
            <option value="academy">學院使用</option>
            <option value="ecommerce">電商訂單</option>
            <option value="adjust">庫存調整</option>
          </select>
        </div>
        <div class="form-group">
          <label>使用米數 *</label>
          <input type="number" id="s_meters" min="0.1" step="0.1" placeholder="3.5" oninput="updateSellPreview()">
        </div>
      </div>
      <div class="form-group">
        <label>關聯案件（選填）</label>
        <input type="text" id="s_case_search" placeholder="搜尋案件名稱、編號或客戶…"

          style="margin-bottom:6px;width:100%;padding:8px 12px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px">
        <input type="hidden" id="s_case_id">
        <div id="s_case_list" style="border:1px solid var(--gray-200);border-radius:8px;max-height:200px;overflow-y:auto"></div>

      <div id="s_preview" style="background:var(--gray-50);border-radius:8px;padding:10px 14px;font-size:13px;display:none;margin-top:4px">

      </div>
      <div class="form-group" style="margin-top:10px"><label>備注</label><textarea id="s_notes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSellModal()">取消</button>
      <button class="btn btn-primary" onclick="saveSell()">確認扣庫</button>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
let materials = [];
let editMatId = null;
let rollTargetMatId = null;
let logTargetRollId = null;
let expandedRows = new Set();
let activeBranch = null;   // null = 全部
let knownBranches = [];
let showFinishedSet = new Set();  // 哪些 matId 要顯示已用完捲料
let activeCases = [];
let sellTargetMatId = null;
let sellRolls = [];

const LOG_LABELS = {
  purchase:'進貨', case_cut:'案場切料', case_loss:'案場損失重貼',
  store_sale:'門市銷售', academy:'學院使用', ecommerce:'電商訂單', adjust:'庫存調整',
  reserve:'保留'
};

async function init() {
  await loadUser();
  highlightNav('materials');
  await Promise.all([loadMaterials(), loadBranches(), loadActiveCases(), loadActivity()]);
}

/* ── 膜料異動紀錄 ── */
let activityAll = [];
let activityExpanded = false;
const ACTIVITY_DEFAULT = 5;

const ACTION_ICON = {
  create:'➕', edit:'✏️', delete:'🗑️',
  purchase:'📦', store_sale:'🛒', academy:'🏫', ecommerce:'🌐', adjust:'🔧',
};
const ACTION_LABEL = {
  create:'新增', edit:'編輯', delete:'刪除',
  purchase:'進貨', store_sale:'門市銷售', academy:'學院使用', ecommerce:'電商訂單', adjust:'庫存調整',
};

async function loadActivity() {
  const res = await fetch('/api/materials/activity?limit=100');
  activityAll = res.ok ? await res.json() : [];
  renderActivity();
}

function toggleActivity() {
  activityExpanded = !activityExpanded;
  document.getElementById('activityToggleBtn').textContent = activityExpanded ? '收起' : '展開全部';
  renderActivity();
}

function renderActivity() {
  const list = document.getElementById('activityList');
  if (!activityAll.length) {
    list.innerHTML = '<p style="color:var(--gray-400);font-size:13px;padding:12px 0">尚無異動紀錄</p>';
    return;
  }
  const items = activityExpanded ? activityAll : activityAll.slice(0, ACTIVITY_DEFAULT);
  list.innerHTML = items.map(log => {
    const icon  = ACTION_ICON[log.action]  || '📋';
    const label = ACTION_LABEL[log.action] || log.action;
    const dt    = new Date(log.changed_at);
    const dateStr = `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    return `<div class="activity-item">
      <div class="activity-icon ${log.action}">${icon}</div>
      <div class="activity-body">
        <div class="activity-detail">${log.detail || `${label}膜料`}</div>
        <div class="activity-meta"><span class="activity-user">${log.user_name || '—'}</span> · ${dateStr}</div>
      </div>
    </div>`;
  }).join('');

  if (!activityExpanded && activityAll.length > ACTIVITY_DEFAULT) {
    list.innerHTML += `<p style="font-size:12px;color:var(--gray-400);padding:8px 0 4px">共 ${activityAll.length} 筆，點「展開全部」查看更多</p>`;
  }
}

async function loadActiveCases() {
  const res = await fetch('/api/cases?active=1');
  activeCases = res.ok ? await res.json() : [];
}

async function loadMaterials() {
  const res = await fetch('/api/materials');
  materials = res.ok ? await res.json() : [];
  buildFilters();
  renderStats();
  applyFilters();
}

async function loadBranches() {
  const res = await fetch('/api/orgs');
  const orgs = res.ok ? await res.json() : [];
  knownBranches = orgs.filter(o => o.active !== 0).map(o => o.name);
  if (!knownBranches.length) knownBranches = ['總部'];
  renderBranchTabs();
  // 更新進貨 modal 的店別下拉
  const sel = document.getElementById('r_branch');
  sel.innerHTML = knownBranches.map(b => `<option value="${b}">${b}</option>`).join('');
}

function renderBranchTabs() {
  const tabs = document.getElementById('branchTabs');
  tabs.innerHTML = [null, ...knownBranches].map(b => `
    <button class="branch-tab ${activeBranch === b ? 'active' : ''}"
      onclick="switchBranch(${b === null ? 'null' : `'${b}'`})">
      ${b === null ? '全部店別' : b}
    </button>`).join('');
}

function switchBranch(b) {
  activeBranch = b;
  renderBranchTabs();
  expandedRows.forEach(id => loadRolls(id));
}

function buildFilters() {
  const brands    = [...new Set(materials.map(m => m.brand))].sort();
  const specs     = [...new Set(materials.map(m => m.spec).filter(Boolean))].sort();
  const models    = [...new Set(materials.map(m => m.model))].sort();
  const locations = [...new Set(materials.map(m => m.location).filter(Boolean))].sort();

  const bSel = document.getElementById('filterBrand');
  const sSel = document.getElementById('filterSpec');
  bSel.innerHTML = '<option value="">全部品牌</option>' + brands.map(b => `<option>${b}</option>`).join('');
  sSel.innerHTML = '<option value="">全部材質</option>' + specs.map(s => `<option>${s}</option>`).join('');

  document.getElementById('dl_brand').innerHTML    = brands.map(b => `<option value="${b}">`).join('');
  document.getElementById('dl_model').innerHTML    = models.map(m => `<option value="${m}">`).join('');
  document.getElementById('dl_location').innerHTML = locations.map(l => `<option value="${l}">`).join('');
}

function renderStats() {
  const total      = materials.length;
  const lowStock   = materials.filter(m => m.stock_meters < 10).length;
  const totalMeters= materials.reduce((s,m) => s + (m.stock_meters||0), 0);
  const totalValue = materials.reduce((s,m) => s + (m.stock_meters||0)*(m.unit_cost||0), 0);
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="label">膜料種類</div><div class="value">${total}</div></div>
    <div class="stat-card"><div class="label">庫存偏低（&lt;10米）</div><div class="value ${lowStock?'warning':''}">${lowStock}</div></div>
    <div class="stat-card"><div class="label">總庫存米數</div><div class="value">${totalMeters.toFixed(1)} 米</div></div>
    <div class="stat-card"><div class="label">庫存成本價值</div><div class="value">$${Math.round(totalValue).toLocaleString()}</div></div>
  `;
}

function applyFilters() {
  const q     = document.getElementById('searchInput').value.toLowerCase();
  const brand = document.getElementById('filterBrand').value;
  const spec  = document.getElementById('filterSpec').value;
  const stock = document.getElementById('filterStock').value;
  let list = materials;
  if (q)     list = list.filter(m => (m.brand+m.model+(m.spec||'')+(m.location||'')).toLowerCase().includes(q));
  if (brand) list = list.filter(m => m.brand === brand);
  if (spec)  list = list.filter(m => m.spec === spec);
  if (stock === 'low') list = list.filter(m => m.stock_meters < 10);
  if (stock === 'ok')  list = list.filter(m => m.stock_meters >= 30);
  renderTable(list);
}

function brandTag(brand) {
  const key = ['BODAQ','LG','3M','Paroi','穩得','AICA'].includes(brand) ? brand : 'other';
  return `<span class="brand-tag brand-${key}">${brand}</span>`;
}
function stockClass(v) { return v < 10 ? 'stock-low' : v < 30 ? 'stock-mid' : 'stock-ok'; }

function renderTable(list) {
  const tbody = document.getElementById('matTbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:32px;color:var(--gray-500)">沒有符合條件的膜料</td></tr>`;
    return;
  }
  let html = '';
  list.forEach(m => {
    const isExpanded = expandedRows.has(m.id);
    html += `<tr class="mat-row ${isExpanded?'expanded':''}" id="row-${m.id}">
      <td style="text-align:center">
        <button class="expand-btn ${isExpanded?'open':''}" onclick="toggleRolls(${m.id})" title="展開捲料">▶</button>
      </td>
      <td>${brandTag(m.brand)}</td>
      <td><strong>${m.model}</strong>${m.color?`<br><span style="font-size:11px;color:var(--gray-500)">${m.color}</span>`:''}</td>
      <td style="color:var(--gray-500)">${m.spec||'—'}</td>
      <td style="font-family:monospace;font-size:12px">${m.location||'—'}</td>
      <td>${m.unit_cost?'$'+m.unit_cost:'—'}</td>
      <td>${m.unit_price?'$'+m.unit_price:'—'}</td>
      <td class="${stockClass(m.stock_meters||0)}">${(m.stock_meters||0).toFixed(1)}</td>
      <td style="font-size:12px;color:var(--gray-500)">${m.notes||''}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-primary btn-sm" onclick="openRollModal(${m.id},'${m.brand} ${m.model}');event.stopPropagation()">＋進貨</button>
        <button class="btn btn-sm" style="background:#f59e0b;color:#fff;border:none" onclick="openSellModal(${m.id},'${m.brand} ${m.model}');event.stopPropagation()">銷貨</button>
        <button class="btn btn-ghost btn-sm" onclick="openMatEdit(${m.id});event.stopPropagation()">編輯</button>
        <button class="btn btn-danger btn-sm" onclick="deleteMat(${m.id});event.stopPropagation()">刪除</button>
      </td>
    </tr>`;
    if (isExpanded) {
      html += `<tr class="rolls-panel" id="rolls-${m.id}">
        <td colspan="10"><div class="rolls-inner" id="rolls-content-${m.id}">載入中…</div></td>
      </tr>`;
    }
  });
  tbody.innerHTML = html;
  // 重新載入已展開的行
  expandedRows.forEach(id => loadRolls(id));
}

async function toggleRolls(matId) {
  if (expandedRows.has(matId)) {
    expandedRows.delete(matId);
  } else {
    expandedRows.add(matId);
  }
  applyFilters();
}

function toggleFinished(matId) {
  if (showFinishedSet.has(matId)) showFinishedSet.delete(matId);
  else showFinishedSet.add(matId);
  loadRolls(matId);
}

async function loadRolls(matId) {
  const el = document.getElementById(`rolls-content-${matId}`);
  if (!el) return;

  const branchQ = activeBranch ? `?branch=${encodeURIComponent(activeBranch)}` : '';
  const [rRes, lRes] = await Promise.all([
    fetch(`/api/materials/${matId}/rolls${branchQ}`),
    fetch(`/api/materials/${matId}/logs`),
  ]);
  const rolls = rRes.ok ? await rRes.json() : [];
  const logs  = lRes.ok ? await lRes.json() : [];

  const logsByRoll = {};
  logs.forEach(l => {
    if (!logsByRoll[l.roll_id]) logsByRoll[l.roll_id] = [];
    logsByRoll[l.roll_id].push(l);
  });

  const showFinished = showFinishedSet.has(matId);
  const activeRolls   = rolls.filter(r => r.status === 'active');
  const finishedRolls = rolls.filter(r => r.status !== 'active');
  const visibleRolls  = showFinished ? rolls : activeRolls;
  const branchLabel   = activeBranch ? ` — ${activeBranch}` : '';

  let html = `<div class="roll-header">
    <div class="roll-title">🎞️ 捲料明細（使用中 ${activeRolls.length} 支${branchLabel}）</div>
    <div style="display:flex;gap:8px;align-items:center">
      ${finishedRolls.length ? `
        <button class="btn btn-ghost btn-sm" onclick="toggleFinished(${matId})" style="font-size:12px">
          ${showFinished ? '隱藏已用完' : `顯示已用完（${finishedRolls.length} 支）`}
        </button>` : ''}
    </div>
  </div>`;

  if (!rolls.length) {
    html += `<div style="color:var(--gray-500);font-size:13px;padding:8px 0">尚無捲料紀錄。點「＋進貨」新增第一支。</div>`;
  } else if (!visibleRolls.length) {
    html += `<div style="color:var(--gray-500);font-size:13px;padding:8px 0">目前無使用中捲料。<button class="btn btn-ghost btn-sm" onclick="toggleFinished(${matId})">顯示已用完（${finishedRolls.length} 支）</button></div>`;
  } else {
    visibleRolls.forEach(r => {
      const rLogs = logsByRoll[r.id] || [];
      html += `<div style="margin-bottom:16px;background:#fff;border:1px solid var(--gray-200);border-radius:8px;overflow:hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--gray-50)">
          <div style="display:flex;align-items:center;gap:12px;font-size:13px">
            <span style="font-family:monospace;font-weight:700">${r.roll_no || `#${r.id}`}</span>
            <span class="status-pill ${r.status}">${{active:'使用中',finished:'用完',lost:'遺失'}[r.status]||r.status}</span>
            <span class="branch-badge">🏪 ${r.branch||'總部'}</span>
            <span style="color:var(--gray-500)">進貨 ${r.purchase_date||'—'}</span>
            <span>初始 <strong>${r.initial_meters}</strong> 米 → 剩餘 <strong class="${stockClass(r.remaining_meters)}">${(r.remaining_meters||0).toFixed(1)}</strong> 米</span>
            ${r.unit_cost ? `<span style="color:var(--gray-500)">$${r.unit_cost}/米</span>` : ''}
            ${r.location ? `<span style="font-size:11px;color:var(--gray-500)">📍${r.location}</span>` : ''}
            ${r.created_by_name ? `<span style="font-size:11px;color:var(--gray-400)">登錄：${r.created_by_name}</span>` : ''}
          </div>
          <button class="btn btn-ghost btn-sm" onclick="openLogModal(${r.id},'${r.roll_no||'#'+r.id}')">＋使用</button>
        </div>`;

      if (rLogs.length) {
        html += `<div style="overflow-x:auto">
          <table class="roll-table">
            <thead><tr><th>時間</th><th>用途</th><th>米數</th><th>案件</th><th>記錄人</th><th>備注</th></tr></thead>
            <tbody>`;
        rLogs.forEach(l => {
          const isIn = l.meters > 0;
          html += `<tr>
            <td style="color:var(--gray-500)">${l.logged_at ? l.logged_at.slice(0,16) : '—'}</td>
            <td><span class="log-type-badge log-${l.log_type}">${LOG_LABELS[l.log_type]||l.log_type}</span></td>
            <td style="font-weight:600;color:${isIn?'var(--success)':'var(--danger)'}">
              ${isIn?'+':''}${l.meters} 米
            </td>
            <td style="font-size:12px">${l.case_number?`<a href="/case-detail?id=${l.case_id}" style="color:var(--primary)">${l.case_number}</a>`:'—'}</td>
            <td style="font-size:12px">${l.logger_name||'—'}</td>
            <td style="font-size:12px;color:var(--gray-500)">${l.notes||''}</td>
          </tr>`;
        });
        html += `</tbody></table></div>`;
      }
      html += `</div>`;
    });
  }

  el.innerHTML = html;
}

// ── 銷貨／扣庫 ───────────────────────────────────────────────

async function openSellModal(matId, name) {
  sellTargetMatId = matId;
  document.getElementById('sellModalTitle').textContent = `銷貨／扣庫 — ${name}`;
  document.getElementById('s_meters').value = '';
  document.getElementById('s_notes').value = '';
  document.getElementById('s_case_search').value = '';
  document.getElementById('s_case_id').value = '';
  document.getElementById('s_preview').style.display = 'none';
  document.getElementById('s_type').value = 'case_cut';

  // 載入此膜料的可用捲料
  const res = await fetch(`/api/materials/${matId}/rolls`);
  sellRolls = res.ok ? await res.json() : [];
  const active = sellRolls.filter(r => r.status === 'active');
  const sel = document.getElementById('s_roll_id');
  if (!active.length) {
    sel.innerHTML = '<option value="">（無可用捲料，請先進貨）</option>';
  } else {
    sel.innerHTML = active.map(r =>
      `<option value="${r.id}">[${r.branch||'總部'}] ${r.roll_no||'#'+r.id} — 剩餘 ${(r.remaining_meters||0).toFixed(1)}米${r.location?' 📍'+r.location:''}</option>`
    ).join('');
  }
  updateRollRemaining();
  renderSellCaseList('');
  document.getElementById('sellModal').classList.add('open');
}

function closeSellModal() { document.getElementById('sellModal').classList.remove('open'); }

function updateRollRemaining() {
  const rid = document.getElementById('s_roll_id').value;
  const roll = sellRolls.find(r => r.id == rid);
  const el = document.getElementById('s_roll_remaining');
  if (roll) {
    el.textContent = `目前剩餘：${(roll.remaining_meters||0).toFixed(1)} 米`;
    el.style.color = roll.remaining_meters < 5 ? 'var(--danger)' : 'var(--gray-500)';
  } else { el.textContent = ''; }
  updateSellPreview();
}

function updateSellPreview() {
  const rid = document.getElementById('s_roll_id').value;
  const meters = parseFloat(document.getElementById('s_meters').value);
  const roll = sellRolls.find(r => r.id == rid);
  const el = document.getElementById('s_preview');
  if (roll && meters > 0) {
    const remaining = Math.max(0, (roll.remaining_meters||0) - meters);
    document.getElementById('s_preview_meters').textContent = meters + ' 米';
    const rem = document.getElementById('s_preview_remaining');
    rem.textContent = remaining.toFixed(1);
    rem.style.color = remaining < 5 ? 'var(--danger)' : 'var(--success)';
    el.style.display = 'block';
  } else { el.style.display = 'none'; }
}

function filterSellCases() {
  renderSellCaseList(document.getElementById('s_case_search').value.toLowerCase());
}

function renderSellCaseList(q) {
  const list = q
    ? activeCases.filter(c =>
        (c.case_number||'').toLowerCase().includes(q) ||
        (c.title||'').toLowerCase().includes(q) ||
        (c.client_name||'').toLowerCase().includes(q))
    : activeCases;
  const selectedId = String(document.getElementById('s_case_id').value);
  const el = document.getElementById('s_case_list');
  if (!list.length) {
    el.innerHTML = `<div style="padding:12px;color:var(--gray-500);font-size:13px;text-align:center">沒有符合的案件</div>`;
    return;
  }
  const shown = list.slice(0, 25);
  el.innerHTML = shown.map(c => `
    <div class="case-option ${selectedId == c.id ? 'selected' : ''}"
      onclick="selectSellCase(${c.id})">
      <span class="case-num">${c.case_number}</span>
      <span class="case-title">${c.title||''}</span>
      <span class="case-client">👤 ${c.client_name||'—'}</span>
    </div>`).join('') +
    (list.length > 25 ? `<div style="padding:8px;color:var(--gray-400);font-size:12px;text-align:center">還有 ${list.length-25} 筆，請搜尋縮小範圍</div>` : '');
}

function selectSellCase(id) {
  const prev = document.getElementById('s_case_id').value;
  document.getElementById('s_case_id').value = (prev == id) ? '' : id;  // 再次點擊取消選取
  renderSellCaseList(document.getElementById('s_case_search').value.toLowerCase());
}

async function saveSell() {
  const rid = document.getElementById('s_roll_id').value;
  const meters = parseFloat(document.getElementById('s_meters').value);
  if (!rid) { alert('請選擇捲料'); return; }
  if (!meters || meters <= 0) { alert('請填寫使用米數'); return; }
  const body = {
    log_type: document.getElementById('s_type').value,
    case_id:  document.getElementById('s_case_id').value || null,
    meters,
    notes:    document.getElementById('s_notes').value.trim() || null,
  };
  const res = await fetch(`/api/materials/rolls/${rid}/logs`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body),
  });
  if (res.ok) {
    closeSellModal();
    await loadMaterials();
    expandedRows.forEach(id => loadRolls(id));
  } else {
    const err = await res.json().catch(() => ({}));
    alert(err.error || '操作失敗');
  }
}

// ── 膜料 CRUD ────────────────────────────────────────────────

function openMatModal() {
  editMatId = null;
  document.getElementById('matModalTitle').textContent = '新增膜料型號';
  ['m_brand','m_model','m_notes','m_location'].forEach(id => document.getElementById(id).value = '');
  ['m_unit_cost','m_unit_price','m_stock_meters'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('m_spec').value = '';
  document.getElementById('matModal').classList.add('open');
}
function openMatEdit(id) {
  const m = materials.find(x => x.id === id);
  if (!m) return;
  editMatId = id;
  document.getElementById('matModalTitle').textContent = '編輯膜料型號';
  document.getElementById('m_brand').value     = m.brand || '';
  document.getElementById('m_model').value     = m.model || '';
  document.getElementById('m_spec').value      = m.spec  || '';
  document.getElementById('m_location').value  = m.location || '';
  document.getElementById('m_unit_cost').value    = m.unit_cost || '';
  document.getElementById('m_unit_price').value   = m.unit_price || '';
  document.getElementById('m_stock_meters').value = m.stock_meters || '';
  document.getElementById('m_notes').value        = m.notes || '';
  document.getElementById('matModal').classList.add('open');
}
function closeMatModal() { document.getElementById('matModal').classList.remove('open'); }

async function saveMat() {
  const body = {
    brand:        document.getElementById('m_brand').value.trim(),
    model:        document.getElementById('m_model').value.trim(),
    spec:         document.getElementById('m_spec').value  || null,
    location:     document.getElementById('m_location').value.trim() || null,
    unit_cost:    parseFloat(document.getElementById('m_unit_cost').value)    || 0,
    unit_price:   parseFloat(document.getElementById('m_unit_price').value)   || 0,
    stock_meters: parseFloat(document.getElementById('m_stock_meters').value) || 0,
    notes:        document.getElementById('m_notes').value.trim() || null,
  };
  if (!body.brand || !body.model) { alert('品牌和型號必填'); return; }
  const url = editMatId ? `/api/materials/${editMatId}` : '/api/materials';
  const res = await fetch(url, { method: editMatId ? 'PUT' : 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if (res.ok) {
    const data = await res.json();
    closeMatModal();
    await Promise.all([loadMaterials(), loadActivity()]);
    if (!editMatId && body.stock_meters > 0 && data.id) {
      expandedRows.add(data.id);
      applyFilters();
    }
  }
}

async function deleteMat(id) {
  if (!confirm('確定刪除此膜料型號？相關捲料和紀錄也會一併刪除。')) return;
  await fetch(`/api/materials/${id}`, { method:'DELETE' });
  expandedRows.delete(id);
  await Promise.all([loadMaterials(), loadActivity()]);
}

// ── 捲料 CRUD ────────────────────────────────────────────────

function genRollNoBase(brand, model, date) {
  return `${brand.trim()}-${model.trim()}-${date.replace(/-/g,'')}`;
}

async function nextRollNo(matId, brand, model, date) {
  const base = genRollNoBase(brand, model, date);
  const res  = await fetch(`/api/materials/${matId}/rolls`);
  const rolls = res.ok ? await res.json() : [];
  const count = rolls.filter(r => r.roll_no && r.roll_no.startsWith(base)).length;
  return `${base}-${String(count + 1).padStart(2, '0')}`;
}

async function updateRollNo() {
  const mat  = materials.find(m => m.id === rollTargetMatId);
  const date = document.getElementById('r_purchase_date').value;
  if (mat && date) {
    document.getElementById('r_roll_no').value = await nextRollNo(rollTargetMatId, mat.brand, mat.model, date);
  }
}

async function openRollModal(matId, name) {
  rollTargetMatId = matId;
  document.getElementById('rollModalTitle').textContent = `新增捲料 — ${name}`;
  ['r_notes','r_location'].forEach(id => document.getElementById(id).value = '');
  ['r_initial_meters','r_unit_cost'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('r_roll_no').value = '產生中…';
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('r_purchase_date').value = today;
  document.getElementById('r_branch').value = activeBranch || knownBranches[0] || '總部';
  const mat = materials.find(m => m.id === matId);
  if (mat) {
    if (mat.unit_cost) document.getElementById('r_unit_cost').value = mat.unit_cost;
    if (mat.location)  document.getElementById('r_location').value  = mat.location;
    document.getElementById('r_roll_no').value = await nextRollNo(matId, mat.brand, mat.model, today);
  }
  document.getElementById('rollModal').classList.add('open');
}
function closeRollModal() { document.getElementById('rollModal').classList.remove('open'); }

async function saveRoll() {
  const meters = parseFloat(document.getElementById('r_initial_meters').value);
  if (!meters) { alert('請填寫進貨米數'); return; }
  const body = {
    roll_no:       document.getElementById('r_roll_no').value.trim() || null,
    initial_meters: meters,
    purchase_date:  document.getElementById('r_purchase_date').value || null,
    unit_cost:      parseFloat(document.getElementById('r_unit_cost').value) || 0,
    branch:         document.getElementById('r_branch').value.trim() || '總部',
    location:       document.getElementById('r_location').value.trim() || null,
    notes:          document.getElementById('r_notes').value.trim() || null,
  };
  const res = await fetch(`/api/materials/${rollTargetMatId}/rolls`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body),
  });
  if (res.ok) {
    closeRollModal();
    expandedRows.add(rollTargetMatId);
    await Promise.all([loadMaterials(), loadActivity()]);
  }
}

// ── 使用紀錄 ─────────────────────────────────────────────────

function openLogModal(rollId, rollName) {
  logTargetRollId = rollId;
  document.getElementById('logModalTitle').textContent = `使用紀錄 — ${rollName}`;
  document.getElementById('l_type').value = 'case_cut';
  document.getElementById('l_meters').value = '';
  document.getElementById('l_notes').value = '';
  document.getElementById('l_case_search').value = '';
  document.getElementById('l_case_id').value = '';
  document.getElementById('l_case_selected').textContent = '';
  document.getElementById('l_case_results').style.display = 'none';
  document.getElementById('logModal').classList.add('open');
}
function closeLogModal() { document.getElementById('logModal').classList.remove('open'); }

let caseSearchTimer;
async function searchCase() {
  clearTimeout(caseSearchTimer);
  const q = document.getElementById('l_case_search').value.trim();
  const el = document.getElementById('l_case_results');
  if (!q) { el.style.display = 'none'; return; }
  caseSearchTimer = setTimeout(async () => {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&type=cases`);
    const items = res.ok ? await res.json() : [];
    if (!items.length) { el.style.display = 'none'; return; }
    el.innerHTML = items.slice(0,6).map(c =>
      `<div style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--gray-100)"
        onmousedown="selectCase(${c.id},'${c.case_number}','${(c.title||'').replace(/'/g,'')}')">
        <span style="font-family:monospace;color:var(--gray-500)">${c.case_number}</span> ${c.title||''}
      </div>`).join('');
    el.style.display = 'block';
  }, 300);
}

function selectCase(id, num, title) {
  document.getElementById('l_case_id').value = id;
  document.getElementById('l_case_search').value = '';
  document.getElementById('l_case_selected').textContent = `✓ ${num} ${title}`;
  document.getElementById('l_case_results').style.display = 'none';
}

async function saveLog() {
  const meters = parseFloat(document.getElementById('l_meters').value);
  if (!meters) { alert('請填寫使用米數'); return; }
  const body = {
    log_type: document.getElementById('l_type').value,
    case_id:  document.getElementById('l_case_id').value || null,
    meters,
    notes:    document.getElementById('l_notes').value.trim() || null,
  };
  const res = await fetch(`/api/materials/rolls/${logTargetRollId}/logs`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body),
  });
  if (res.ok) {
    closeLogModal();
    await Promise.all([loadMaterials(), loadActivity()]);
    expandedRows.forEach(id => loadRolls(id));
  }
}

init();
</script>
