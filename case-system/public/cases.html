<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件管理 — 繪新管理系統</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="icon" href="/logo.png" type="image/png">
<style>
.pipeline { display:flex; gap:0; margin-bottom:24px; overflow-x:auto; }
.pipeline-stage { flex:1; min-width:90px; padding:10px 8px; text-align:center; font-size:12px; font-weight:500; cursor:pointer; border-bottom:3px solid transparent; color:var(--gray-500); white-space:nowrap; transition:all .15s; }
.pipeline-stage:hover { color:var(--primary); }
.pipeline-stage.active { color:var(--primary); border-bottom-color:var(--primary); }
.pipeline-stage .count { display:block; font-size:20px; font-weight:700; color:var(--gray-900); margin-bottom:2px; }
.pipeline-stage.active .count { color:var(--primary); }
.case-type-tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.type-tab { padding:6px 14px; border-radius:20px; font-size:13px; cursor:pointer; border:1px solid var(--gray-300); background:#fff; color:var(--gray-700); }
.type-tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.margin-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; }
.margin-red    { background:#e02424; }
.margin-yellow { background:#c27803; }
.margin-green  { background:#057a55; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><h2><img src="/logo.png" style="height:28px;width:28px;object-fit:contain;filter:brightness(0) invert(1);margin-right:8px;flex-shrink:0"> 繪新管理系統</h2><p id="sidebarOrgName"></p></div>
    <nav class="sidebar-nav">
      <a class="nav-item" data-page="dashboard"      href="/dashboard">      <span class="icon">📊</span>總覽</a>
      <a class="nav-item" data-page="my-tasks"       href="/my-tasks">       <span class="icon">📌</span>我的任務</a>
      <a class="nav-item" data-page="my-calendar"    href="/my-calendar">    <span class="icon">🗓️</span>我的行事曆</a>
      <a class="nav-item" data-page="line-inquiries" href="/line-inquiries">  <span class="icon">💬</span>LINE 詢問</a>
      <a class="nav-item" data-page="cases-inquiry"  href="/cases-inquiry">   <span class="icon">📝</span>詢價管理</a>
      <a class="nav-item" data-page="cases-survey"   href="/cases-survey">    <span class="icon">🔍</span>場勘管理</a>
      <a class="nav-item" data-page="cases-deal"     href="/cases-deal">      <span class="icon">✅</span>成交案件管理</a>
      <a class="nav-item" data-page="dispatch-pool"  href="/dispatch-pool">   <span class="icon">🏊</span>派案池管理</a>
      <a class="nav-item" data-page="calendar"       href="/calendar">        <span class="icon">📅</span>派單行事曆</a>
      <a class="nav-item" data-page="clients"        href="/clients">         <span class="icon">👥</span>客戶管理</a>
      <a class="nav-item" data-page="materials"      href="/materials">       <span class="icon">🎞️</span>膜料管理</a>
      <a class="nav-item" data-page="material-calc"  href="/material-calc">  <span class="icon">🧮</span>快速報價</a>
        <a class="nav-item" data-page="payments"       href="/payments">        <span class="icon">💰</span>收款追蹤</a>
      <a class="nav-item" data-page="ledger"         href="/ledger">          <span class="icon">📒</span>收支流水帳</a>
      <a class="nav-item" data-page="performance"    href="/performance">     <span class="icon">🏆</span>業績報表</a>
      <a class="nav-item" data-page="reports"        href="/reports">         <span class="icon">📈</span>財務報表</a>
      <a class="nav-item" data-page="marketing"      href="/marketing">      <span class="icon">📣</span>行銷報表</a>
      <a class="nav-item" data-page="admin"          href="/admin" data-need="manage_users"><span class="icon">⚙️</span>人員管理</a>
    </nav>
    <div class="sidebar-user">
      <div class="user-name" id="sidebarUserName"></div>
      <div class="user-role" id="sidebarUserRole"></div>
      <button class="logout-btn" id="logoutBtn">登出</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <span class="page-title" id="pageTitle"></span>
      <div style="display:flex;gap:8px">
        <input type="text" id="searchInput" placeholder="🔍 搜尋案號、客戶、項目…"
               style="padding:7px 12px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px;width:220px">
        <button class="btn btn-primary btn-sm" id="newCaseBtn" style="display:none">＋ 新增案件</button>
        <button class="btn btn-ghost btn-sm" id="templateMgmtBtn" style="display:none" onclick="toggleTemplateMgmt()">⚙️ 模板管理</button>
      </div>
    </div>
    <div class="page-body">
      <div class="pipeline" id="pipeline"></div>
      <div class="case-type-tabs" id="caseTypeTabs" style="display:none">
        <span class="type-tab active" data-type="">全部類型</span>
        <span class="type-tab" data-type="home">居家</span>
        <span class="type-tab" data-type="commercial">商空</span>
        <span class="type-tab" data-type="elevator">電梯</span>
        <span class="type-tab" data-type="glass">玻璃</span>
        <span class="type-tab" data-type="extra">外快</span>
        <span class="type-tab" data-type="outsource">外包</span>
        <span class="type-tab" data-type="output">輸出</span>
        <span class="type-tab" data-type="other">其他</span>
      </div>
      <div class="card">
        <div class="card-body" style="padding:0">
          <div class="table-wrap">
            <table>
              <thead id="tableHead"></thead>
              <tbody id="casesBody"></tbody>
            </table>
          </div>
        </div>
      </div>
      <!-- 場勘模板管理（survey mode + owner only） -->
      <div id="surveyTemplateMgmt" style="display:none;margin-top:16px">
        <div class="card">
          <div class="card-header">
            <h3>場勘模板管理</h3>
          </div>
          <div class="card-body">
            <div style="display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:16px">
              <div class="stpl-tab stpl-active" data-stab="notes" style="padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid var(--primary);margin-bottom:-2px;color:var(--primary)">備註模板庫</div>
              <div class="stpl-tab" data-stab="checklist" style="padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--gray-500)">施作檢查清單模板</div>
            </div>
            <div id="stab-notes">
              <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
                <button class="btn btn-primary btn-sm" onclick="openNoteTemplateModal()">＋ 新增模板</button>
              </div>
              <div class="table-wrap">
                <table class="data-table">
                  <thead><tr><th>類別</th><th>關鍵字</th><th>備註內容</th><th></th></tr></thead>
                  <tbody id="noteTemplateBody">
                    <tr><td colspan="4" style="text-align:center;color:var(--gray-400);padding:20px">載入中...</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
            <div id="stab-checklist" style="display:none">
              <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
                <button class="btn btn-primary btn-sm" onclick="openChecklistTemplateModal()">＋ 新增項目</button>
              </div>
              <div id="checklistTemplateArea">
                <div style="text-align:center;color:var(--gray-400);padding:20px;font-size:13px">載入中...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 備註模板 Modal -->
<div class="modal-overlay" id="noteTemplateModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h3 id="ntModalTitle">新增備註模板</h3>
      <button class="modal-close" onclick="closeModal('noteTemplateModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="ntId">
      <div class="form-row">
        <div class="form-group">
          <label>類別 <span style="font-size:11px;color:var(--gray-400)">（如：除膜、貼膜、電梯）</span></label>
          <input type="text" id="ntCategory" placeholder="例：除膜">
        </div>
        <div class="form-group">
          <label>關鍵字 <span style="font-size:11px;color:var(--gray-400)">（搜尋用）</span></label>
          <input type="text" id="ntKeyword" placeholder="例：舊膜殘膠">
        </div>
      </div>
      <div class="form-group">
        <label>備註內容 *</label>
        <textarea id="ntContent" rows="5" placeholder="輸入場勘備註模板內容..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('noteTemplateModal')">取消</button>
      <button class="btn btn-primary" id="ntSaveBtn">儲存</button>
    </div>
  </div>
</div>

<!-- 施作清單項目 Modal -->
<div class="modal-overlay" id="checklistTemplateModal">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <h3 id="clModalTitle">新增清單項目</h3>
      <button class="modal-close" onclick="closeModal('checklistTemplateModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="clId">
      <div class="form-group">
        <label>類別 * <span style="font-size:11px;color:var(--gray-400)">（如：玻璃膜、門框、牆面、電梯、一般）</span></label>
        <input type="text" id="clCategory" placeholder="例：玻璃膜">
      </div>
      <div class="form-group">
        <label>項目名稱 *</label>
        <input type="text" id="clItem" placeholder="例：確認玻璃尺寸與規格">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('checklistTemplateModal')">取消</button>
      <button class="btn btn-primary" id="clSaveBtn">儲存</button>
    </div>
  </div>
</div>

<!-- 新增案件 Modal -->
<div class="modal-overlay" id="newCaseModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header"><h3 id="newCaseModalTitle">新增案件</h3><button class="modal-close" onclick="document.getElementById('newCaseModal').classList.remove('open')">×</button></div>
    <div class="modal-body">
      <div class="form-row" id="caseTypeRow">
        <div class="form-group">
          <label>案件類型</label>
          <select id="nc_type">
            <option value="home">居家</option>
            <option value="commercial">商空</option>
            <option value="elevator">電梯</option>
            <option value="glass">玻璃</option>
            <option value="extra">外快</option>
            <option value="outsource">外包</option>
            <option value="output">輸出</option>
            <option value="other">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label>優先度</label>
          <select id="nc_priority">
            <option value="normal">一般</option>
            <option value="high">優先</option>
            <option value="urgent">緊急</option>
            <option value="low">低優先</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>項目名稱 *</label><input type="text" id="nc_title" placeholder="例：台北信義區辦公室牆面翻新"></div>
      <div class="form-row">
        <div class="form-group" style="position:relative">
          <label>客戶 <button type="button" id="quickAddClientBtn" style="font-size:11px;margin-left:6px" class="btn btn-ghost btn-sm">＋新客戶</button></label>
          <input type="text" id="nc_client_input" placeholder="輸入姓名或電話篩選…" autocomplete="off"
                 style="width:100%;padding:10px 12px;border:1px solid var(--gray-300);border-radius:8px;font-size:14px;outline:none">
          <input type="hidden" id="nc_client">
          <div id="nc_client_dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--gray-300);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:200;max-height:200px;overflow-y:auto"></div>
        </div>
        <div class="form-group"><label>負責業務</label><select id="nc_sales"></select></div>
      </div>
      <div class="form-group"><label>施工地點</label><input type="text" id="nc_location" placeholder="地址或簡稱"></div>
      <div class="form-group"><label>說明（可留空）</label><textarea id="nc_desc" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('newCaseModal').classList.remove('open')">取消</button>
      <button class="btn btn-primary" id="createCaseBtn">建立並進入案件</button>
    </div>
  </div>
</div>

<!-- 案件池設定 Modal（僅 deal 模式） -->
<div class="modal-overlay" id="poolModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 id="poolModalTitle">案件池設定</h3>
      <button class="modal-close" onclick="document.getElementById('poolModal').classList.remove('open')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>可接受的申請類型（可複選）</label>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px">
          <label style="display:flex;align-items:center;gap:5px;font-weight:400;cursor:pointer"><input type="checkbox" id="pt_full" value="full"> 全案負責</label>
          <label style="display:flex;align-items:center;gap:5px;font-weight:400;cursor:pointer"><input type="checkbox" id="pt_survey" value="survey"> 僅場勘</label>
          <label style="display:flex;align-items:center;gap:5px;font-weight:400;cursor:pointer"><input type="checkbox" id="pt_install" value="install"> 僅施工</label>
        </div>
      </div>
      <div class="form-group">
        <label>指定區域（不選 = 全區開放）</label>
        <select id="pool_region"><option value="">全區開放</option></select>
      </div>
    </div>
    <div class="modal-footer" id="poolModalFooter">
      <button class="btn btn-ghost" onclick="document.getElementById('poolModal').classList.remove('open')">取消</button>
      <button class="btn btn-danger btn-sm" id="poolRemoveBtn" style="display:none" onclick="savePoolSetting(false)">從池中移除</button>
      <button class="btn btn-primary" onclick="savePoolSetting(true)">開放到案件池</button>
    </div>
  </div>
</div>

<!-- 快速新增客戶 Modal -->
<div class="modal-overlay" id="quickClientModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header"><h3>新增客戶</h3><button class="modal-close" onclick="document.getElementById('quickClientModal').classList.remove('open')">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label>姓名 *</label><input type="text" id="qc_name" placeholder="客戶姓名或公司名"></div>
      <div class="form-row">
        <div class="form-group"><label>電話</label><input type="tel" id="qc_phone" placeholder="0912-345-678"></div>
        <div class="form-group"><label>Email</label><input type="email" id="qc_email"></div>
      </div>
      <div class="form-group"><label>來源</label>
        <select id="qc_source">
          <option value="">不指定</option>
          <option value="line">Line@</option>
          <option value="ig">Instagram</option>
          <option value="fb">Facebook</option>
          <option value="referral">客戶介紹</option>
          <option value="bni">BNI</option>
          <option value="google">Google 搜尋</option>
          <option value="other">其他</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('quickClientModal').classList.remove('open')">取消</button>
      <button class="btn btn-primary" id="saveQuickClientBtn">建立客戶</button>
    </div>
  </div>
</div>

<!-- 無效案件 Modal -->
<div class="modal-overlay" id="invalidModal">
  <div class="modal" style="max-width:460px">
    <div class="modal-header"><h3>標記無效</h3></div>
    <div class="modal-body">
      <p style="font-size:13px;color:#6b7280;margin:0 0 12px">請選擇或填寫無效原因：</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px" id="invalidTagsWrap">
        <span class="invalid-tag" data-tag="報價太貴">報價太貴</span>
        <span class="invalid-tag" data-tag="已找到其他廠商">已找到其他廠商</span>
        <span class="invalid-tag" data-tag="等待太久">等待太久</span>
        <span class="invalid-tag" data-tag="客戶失聯">客戶失聯</span>
        <span class="invalid-tag" data-tag="需求改變">需求改變</span>
        <span class="invalid-tag" data-tag="暫緩施工">暫緩施工</span>
        <span class="invalid-tag" data-tag="預算不足">預算不足</span>
      </div>
      <textarea id="invalidReason" rows="3" placeholder="補充說明（選填）"
        style="width:100%;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;resize:vertical;box-sizing:border-box"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('invalidModal')">取消</button>
      <button class="btn btn-danger" onclick="doInvalidate()">確認無效</button>
    </div>
  </div>
</div>
<style>
.invalid-tag {
  padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
  background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; user-select: none;
}
.invalid-tag.active { background: #fee2e2; color: #991b1b; border-color: #fca5a5; font-weight: 600; }
</style>

<script src="/js/common.js"></script>
<script>
// ── 模式偵測 ─────────────────────────────────────────────────
const PATH = location.pathname;
const MODE = PATH === '/cases-deal' ? 'deal' : PATH === '/cases-inquiry' ? 'inquiry' : 'survey';

const CFG = {
  inquiry: {
    title: '詢價管理',
    nav: 'cases-inquiry',
    group: 'inquiry',
    stages: ['inquiry', 'initial_estimate', 'invalid'],
    stageNames: { inquiry: '詢價需初步估價', initial_estimate: '已初步估價', invalid: '已估價無效保存' },
    hiddenByDefault: new Set(['invalid']),
    showAmounts: false,
    showTypeTabs: false,
    defaultStatus: 'inquiry',
    showNewBtn: true,
  },
  survey: {
    title: '場勘管理',
    nav: 'cases-survey',
    group: 'survey',
    stages: ['survey_pending', 'survey_scheduled', 'surveyed', 'quote_draft', 'quoted', 'invalid'],
    stageNames: {
      survey_pending: '待排場勘', survey_scheduled: '已排場勘',
      surveyed: '已場勘', quote_draft: '已建報價資料',
      quoted: '已發報價單', invalid: '無效',
    },
    hiddenByDefault: new Set(['invalid']),
    showAmounts: false,
    showTypeTabs: true,
    defaultStatus: 'survey_pending',
    showNewBtn: true,
  },
  deal: {
    title: '成交案件管理',
    nav: 'cases-deal',
    group: 'deal',
    stages: ['contracted', 'payment', 'closed', 'invalid'],
    stageNames: { contracted: '成交派案', payment: '完工請款', closed: '結案保存', invalid: '無效' },
    hiddenByDefault: new Set(['closed', 'invalid']),
    showAmounts: true,
    showTypeTabs: true,
    defaultStatus: 'contracted',
    showNewBtn: false,
  },
};

const cfg = CFG[MODE];
const TYPE_NAMES = { home:'居家', commercial:'商空', elevator:'電梯', glass:'玻璃', extra:'外快', outsource:'外包', output:'輸出', other:'其他' };
const PRIORITY_COLORS = { urgent:'#e02424', high:'#c27803', normal:'', low:'#9ca3af' };

let allCases = [], clients = [], salesUsers = [];
let activeStatus = '', activeType = '';

async function init() {
  await loadUser();
  document.getElementById('pageTitle').textContent = cfg.title;
  document.title = cfg.title + ' — 繪新管理系統';
  highlightNav(cfg.nav);

  if (cfg.showNewBtn) document.getElementById('newCaseBtn').style.display = '';
  if (cfg.showTypeTabs) document.getElementById('caseTypeTabs').style.display = '';
  if (MODE === 'survey' && currentUser.manage_users) {
    document.getElementById('templateMgmtBtn').style.display = '';
  }

  if (MODE === 'deal' && currentUser.manage_users) {
    fetch('/api/marketplace/regions').then(r => r.json()).then(regs => {
      const sel = document.getElementById('pool_region');
      regs.forEach(r => sel.add(new Option(r.name, r.id)));
    });
  }

  [clients, salesUsers] = await Promise.all([fetchClients(), fetchUsers()]);
  initClientAC('nc_client_input', 'nc_client', 'nc_client_dropdown');
  const sales = salesUsers.filter(u => ['owner','hq_sales','hq_cs','branch_manager','branch_sales'].includes(u.role));
  populateSelect(document.getElementById('nc_sales'), sales, 'id', 'name', '選擇業務');
  renderTableHead();
  await loadCases();
}

function renderTableHead() {
  const h = document.getElementById('tableHead');
  if (MODE === 'inquiry') {
    h.innerHTML = `<tr><th>案號</th><th>建立日期</th><th>客戶</th><th>地點</th><th>項目</th><th>負責業務</th><th>負責客服</th><th>狀態</th><th>操作</th></tr>`;
  } else if (MODE === 'survey') {
    h.innerHTML = `<tr><th>案號</th><th>案件類型</th><th>客戶</th><th>項目</th><th>場勘日</th><th>負責業務</th><th>承辦人</th><th>狀態</th><th>估價</th><th>操作</th></tr>`;
  } else {

async function loadCases(params = {}) {
  const qs = new URLSearchParams({ group: cfg.group, ...params }).toString();
  const res = await fetch('/api/cases?' + qs);
  if (!res.ok) { allCases = []; renderPipeline([]); renderTable([]); return; }
  allCases = await res.json();
  renderPipeline(allCases);
  renderTable(allCases);
}

function renderPipeline(cases) {
  const counts = {};
  cfg.stages.forEach(s => counts[s] = 0);
  cases.forEach(c => { if (counts[c.status] !== undefined) counts[c.status]++; });
  document.getElementById('pipeline').innerHTML = cfg.stages.map(s => `
    <div class="pipeline-stage${activeStatus === s ? ' active' : ''}" onclick="filterByStatus('${s}')">
      <span class="count">${counts[s]}</span>${cfg.stageNames[s]}
    </div>
  `).join('');
}

function renderTable(cases) {
  const filtered = cases.filter(c => {
    if (activeType && c.case_type !== activeType) return false;
    if (activeStatus) return c.status === activeStatus;
    return !cfg.hiddenByDefault.has(c.status);
  });
  const tbody = document.getElementById('casesBody');
  if (MODE === 'inquiry') filtered.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
  if (!filtered.length) {
    const cols = MODE === 'inquiry' ? 9 : MODE === 'survey' ? 10 : 12;
    tbody.innerHTML = `<tr><td colspan="${cols}"><div class="empty-state"><div class="icon">📋</div>沒有符合的案件</div></td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(c => getCaseRow(c)).join('');
}

function getCaseRow(c) {
  const priorityStyle = PRIORITY_COLORS[c.priority] ? `color:${PRIORITY_COLORS[c.priority]}` : '';
  const link = `onclick="location.href='/case-detail?id=${c.id}'" style="cursor:pointer"`;

  if (MODE === 'inquiry') {
    return `<tr ${link}>
      <td><code style="font-size:12px;${priorityStyle}">${c.case_number}</code></td>
      <td style="white-space:nowrap">${fmtDate(c.created_at)}</td>
      <td>${c.client_name || '—'}</td>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--gray-500);font-size:13px">${c.location || '—'}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title}</td>
      <td>${c.sales_name || '—'}</td>
      <td>${c.cs_name || '—'}</td>
      <td>${statusBadge(c.status)}</td>
      <td onclick="event.stopPropagation()" style="white-space:nowrap">
        <button onclick="deleteCase(${c.id},'${escHtml(c.case_number)}')"
          style="display:${currentUser?.manage_users?'inline-block':'none'};padding:3px 8px;border-radius:12px;font-size:11px;background:#fee2e2;color:#991b1b;border:none;cursor:pointer">刪除</button>
      </td>
    </tr>`;
  }

  if (MODE === 'survey') {
    const handler = c.status === 'quoted' ? (c.quoted_name || c.cs_name || '—')
                  : c.status === 'quote_draft' ? (c.quote_drafted_name || c.cs_name || '—')
                  : (c.cs_name || '—');
    return `<tr ${link}>
      <td><code style="font-size:12px;${priorityStyle}">${c.case_number}</code></td>
      <td><span style="font-size:12px;color:#6b7280">${TYPE_NAMES[c.case_type] || c.case_type}</span></td>
      <td>${c.client_name || '—'}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title}</td>
      <td>${fmtDate(c.survey_date)}</td>
      <td>${c.sales_name || '—'}</td>
      <td style="font-size:13px;color:#6b7280">${handler}</td>
      <td>${statusBadge(c.status)}</td>
      <td>${c.quoted_price ? fmt(c.quoted_price) : '—'}</td>
      <td onclick="event.stopPropagation()" style="white-space:nowrap">${surveyActionBtns(c)}</td>
    </tr>`;
  }

  // deal mode
  const price = c.final_price || c.quoted_price;
  const margin = c.gross_margin_pct;
  const marginDot = margin == null ? '' : margin < 40
    ? `<span class="margin-dot margin-red"></span>`
    : margin < 60 ? `<span class="margin-dot margin-yellow"></span>`
    : `<span class="margin-dot margin-green"></span>`;
  return `<tr ${link}>
    <td><code style="font-size:12px;${priorityStyle}">${c.case_number}</code></td>
    <td><span style="font-size:12px;color:#6b7280">${TYPE_NAMES[c.case_type] || c.case_type}</span></td>
    <td>${c.client_name || '—'}</td>
    <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title}</td>
    <td>${fmtDate(c.scheduled_date)}</td>
    <td>${c.sales_name || '—'}</td>
    <td>${statusBadge(c.status)}</td>
    <td ${!currentUser.can_see_amounts ? 'style="display:none"' : ''}>${price ? fmt(price) : '—'}</td>
    <td>${marginDot}${margin != null ? margin + '%' : '—'}</td>
    <td>${paymentBadge(c.payment_status)}</td>
    <td style="${currentUser?.manage_users ? '' : 'display:none'}">
      ${c.outsource_open
        ? `<button onclick="event.stopPropagation();openPoolModal(${c.id},true)" style="padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:#dcfce7;color:#166534;border:none;cursor:pointer;white-space:nowrap">🟢 在池中</button>`
        : `<button onclick="event.stopPropagation();openPoolModal(${c.id},false)" style="padding:3px 10px;border-radius:12px;font-size:11px;background:#f3f4f6;color:#6b7280;border:none;cursor:pointer;white-space:nowrap">加入池</button>`
      }
    </td>
    <td onclick="event.stopPropagation()" style="white-space:nowrap">${dealActionBtns(c)}</td>
  </tr>`;
}

function filterByStatus(s) {
  activeStatus = activeStatus === s ? '' : s;
  document.querySelectorAll('.pipeline-stage').forEach((el, i) => {
    el.classList.toggle('active', cfg.stages[i] === activeStatus);

}

function initClientAC(inputId, hiddenId, dropdownId) {
  const input = document.getElementById(inputId);
  const hidden = document.getElementById(hiddenId);
  const dropdown = document.getElementById(dropdownId);
  if (!input) return;
  function showDropdown(q) {
    const kw = q.trim().toLowerCase();
    const matched = kw
      ? clients.filter(c => c.name.toLowerCase().includes(kw) || (c.contact_person||'').toLowerCase().includes(kw) || (c.phone||'').includes(kw)).slice(0,30)
      : clients.slice(0,20);
    if (!matched.length) { dropdown.style.display = 'none'; return; }
    dropdown.innerHTML = matched.map(c => `
      <div data-id="${c.id}" data-name="${c.name}"
           style="padding:9px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid #f3f4f6">
        <div style="font-weight:500">${c.name}</div>
        ${c.contact_person||c.phone ? `<div style="font-size:12px;color:#6b7280">${[c.contact_person,c.phone].filter(Boolean).join(' · ')}</div>` : ''}
      </div>`).join('');
    dropdown.style.display = 'block';
    dropdown.querySelectorAll('div[data-id]').forEach(el => {
      el.addEventListener('mousedown', e => { e.preventDefault(); hidden.value=el.dataset.id; input.value=el.dataset.name; dropdown.style.display='none'; });
      el.addEventListener('mouseover', () => el.style.background='#f0f4ff');
      el.addEventListener('mouseout',  () => el.style.background='');
    });
  }
  input.addEventListener('input',  () => showDropdown(input.value));
  input.addEventListener('focus',  () => showDropdown(input.value));
  input.addEventListener('blur',   () => setTimeout(() => { dropdown.style.display='none'; }, 150));
  input.addEventListener('keydown', e => { if (e.key==='Escape') dropdown.style.display='none'; });
}

// ── 狀態操作按鈕 ──────────────────────────────────────────────
function surveyActionBtns(c) {
  const ADV = { surveyed: '已建報價單', quote_draft: '已發報價單', quoted: '確認成交' };
  const INVALIDATABLE = new Set(['survey_pending','survey_scheduled','surveyed','quote_draft','quoted']);
  const parts = [];
  if (ADV[c.status]) {
    parts.push(`<button onclick="advanceCase(${c.id},'${c.status}')"
      style="padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:#dc2626;color:#fff;border:none;cursor:pointer;white-space:nowrap">${ADV[c.status]}</button>`);
  }
  if (INVALIDATABLE.has(c.status)) {
    parts.push(`<button onclick="openInvalidModal(${c.id})"
      style="padding:3px 8px;border-radius:12px;font-size:11px;background:#fee2e2;color:#991b1b;border:none;cursor:pointer;white-space:nowrap;margin-left:4px">無效</button>`);
  }
  if (currentUser?.manage_users && c.prev_status) {
    parts.push(`<button onclick="doStepBack(${c.id})"
      style="padding:3px 8px;border-radius:12px;font-size:11px;background:#f3f4f6;color:#6b7280;border:none;cursor:pointer;white-space:nowrap;margin-left:4px">↩ 退回</button>`);
  }
  if (currentUser?.manage_users) {
    parts.push(`<button onclick="deleteCase(${c.id},'${escHtml(c.case_number)}')"
      style="padding:3px 8px;border-radius:12px;font-size:11px;background:#f3f4f6;color:#6b7280;border:none;cursor:pointer;white-space:nowrap;margin-left:4px">刪除</button>`);
  }
  return parts.join('') || '—';
}

function dealActionBtns(c) {
  const parts = [];
  if (c.status === 'contracted') {
    parts.push(`<button onclick="advanceCase(${c.id},'contracted')"
      style="padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:#dc2626;color:#fff;border:none;cursor:pointer;white-space:nowrap">完工請款</button>`);
  } else if (c.status === 'payment') {
    const isPaid = c.payment_status === 'paid';
    parts.push(`<button onclick="advanceCase(${c.id},'payment')"
      style="padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;border:none;white-space:nowrap;${isPaid ? 'background:#dc2626;color:#fff;cursor:pointer' : 'background:#e5e7eb;color:#9ca3af;cursor:not-allowed'}"
      ${isPaid ? '' : 'disabled title="收款未完成，無法結案"'}>確認結案</button>`);
  }
  if (currentUser?.manage_users && c.prev_status) {
    parts.push(`<button onclick="doStepBack(${c.id})"
      style="padding:3px 8px;border-radius:12px;font-size:11px;background:#f3f4f6;color:#6b7280;border:none;cursor:pointer;white-space:nowrap;margin-left:4px">↩ 退回</button>`);
  }
  if (currentUser?.manage_users) {
    parts.push(`<button onclick="deleteCase(${c.id},'${escHtml(c.case_number)}')"
      style="padding:3px 8px;border-radius:12px;font-size:11px;background:#f3f4f6;color:#6b7280;border:none;cursor:pointer;white-space:nowrap;margin-left:4px">刪除</button>`);
  }
  return parts.join('') || '—';
}

async function advanceCase(id, status) {
  const r = await fetch(`/api/cases/${id}/advance`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({})
  });
  const d = await r.json();
  if (d.needConfirm) {
    if (!confirm(d.warning)) return;
    const r2 = await fetch(`/api/cases/${id}/advance`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ force: true })
    });
    const d2 = await r2.json();
    if (d2.ok) { showToast('狀態已更新'); loadCases(); }
    else showToast(d2.error || '操作失敗', 'error');
  } else if (d.ok) { showToast('狀態已更新'); loadCases(); }
  else showToast(d.error || '操作失敗', 'error');
}

let _invalidId = null;
function openInvalidModal(id) {
  _invalidId = id;
  document.getElementById('invalidReason').value = '';
  document.querySelectorAll('.invalid-tag').forEach(t => t.classList.remove('active'));
  document.getElementById('invalidModal').classList.add('open');
}
document.getElementById('invalidTagsWrap').addEventListener('click', e => {
  const tag = e.target.closest('.invalid-tag');
  if (tag) tag.classList.toggle('active');
});
async function doInvalidate() {
  const reason = document.getElementById('invalidReason').value.trim();
  const tags   = [...document.querySelectorAll('.invalid-tag.active')].map(t => t.dataset.tag);
  if (!reason && !tags.length) { showToast('請填寫無效原因', 'error'); return; }
  const r = await fetch(`/api/cases/${_invalidId}/invalidate`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ reason, tags })
  });
  const d = await r.json();
  if (d.ok) { closeModal('invalidModal'); showToast('案件已標記無效'); loadCases(); }
  else showToast(d.error || '操作失敗', 'error');
}

async function deleteCase(id, caseNumber) {
  if (!confirm(`確定要刪除案件「${caseNumber}」？\n\n此操作無法復原，相關派工、場勘單、報價單資料將一併刪除。`)) return;
  const r = await fetch(`/api/cases/${id}`, { method: 'DELETE' });
  const d = await r.json();
  if (d.ok) { showToast('案件已刪除'); loadCases(); }
  else showToast(d.error || '刪除失敗', 'error');
}

async function doStepBack(id) {
  if (!confirm('確定退回上一個步驟？此操作僅限管理者。')) return;
  const r = await fetch(`/api/cases/${id}/step-back`, { method: 'PATCH', headers: {'Content-Type':'application/json'} });
  const d = await r.json();
  if (d.ok) { showToast('已退回：' + (STATUS_LABELS[d.new_status] || d.new_status)); loadCases(); }
  else showToast(d.error || '操作失敗', 'error');
}

init();
</script>
