<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人員 & 分店管理 — 繪新管理系統</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="icon" href="/logo.png" type="image/png">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><h2><img src="/logo.png" style="height:28px;width:28px;object-fit:contain;filter:brightness(0) invert(1);margin-right:8px;flex-shrink:0"> 繪新管理系統</h2><p id="sidebarOrgName"></p></div>
    <nav class="sidebar-nav">
      <a class="nav-item" data-page="dashboard" href="/dashboard"><span class="icon">📊</span>總覽</a>
      <a class="nav-item" data-page="cases"     href="/cases">    <span class="icon">📋</span>案件管理</a>
      <a class="nav-item" data-page="clients"   href="/clients">  <span class="icon">👥</span>客戶管理</a>
      <a class="nav-item" data-page="calendar"  href="/calendar"> <span class="icon">📅</span>派單行事曆</a>
      <a class="nav-item" data-page="payments"  href="/payments"> <span class="icon">💰</span>收款追蹤</a>
      <a class="nav-item" data-page="materials"  href="/materials"> <span class="icon">🎞️</span>膜料管理</a>
      <a class="nav-item" data-page="reports"     href="/reports">  <span class="icon">📈</span>財務報表</a>
      <a class="nav-item" data-page="admin"      href="/admin" data-need="manage_users"><span class="icon">⚙️</span>人員管理</a>
    </nav>
    <div class="sidebar-user">
      <div class="user-name" id="sidebarUserName"></div>
      <div class="user-role" id="sidebarUserRole"></div>
      <button class="logout-btn" id="logoutBtn">登出</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <span class="page-title">人員 & 分店管理</span>
    </div>
    <div class="page-body">

      <!-- 分店管理（owner only） -->
      <div class="card" id="orgSection" data-need="owner" style="margin-bottom:24px">
        <div class="card-header">
          <h3>分店 / 組織</h3>
          <button class="btn btn-primary btn-sm" id="newOrgBtn">＋ 新增分店</button>
        </div>
        <div class="card-body" style="padding:0">
          <div class="table-wrap">
            <table>
              <thead><tr><th>名稱</th><th>類型</th><th>地址</th><th>狀態</th></tr></thead>
              <tbody id="orgBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 操作紀錄（owner only） -->
      <div class="card" id="auditSection" style="margin-bottom:24px;display:none">
        <div class="card-header">
          <h3>操作紀錄</h3>
          <div style="display:flex;gap:8px;align-items:center">
            <select id="auditEntity" style="font-size:13px;padding:4px 8px;border:1px solid var(--gray-300);border-radius:6px">
              <option value="">全部類型</option>
              <option value="cases">案件</option>
              <option value="clients">客戶</option>
              <option value="ledger">流水帳</option>
              <option value="users">帳號</option>
            </select>
            <select id="auditUser" style="font-size:13px;padding:4px 8px;border:1px solid var(--gray-300);border-radius:6px">
              <option value="">全部人員</option>
            </select>
            <button class="btn btn-ghost btn-sm" onclick="loadAuditLogs()">篩選</button>
          </div>
        </div>
        <div class="card-body" style="padding:0">
          <div class="table-wrap">
            <table>
              <thead><tr><th>時間</th><th>操作人</th><th>動作</th><th>對象</th><th>說明</th></tr></thead>
              <tbody id="auditBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 角色管理（owner only） -->
      <div class="card" id="roleSection" style="margin-bottom:24px;display:none">
        <div class="card-header">
          <h3>角色管理</h3>
          <button class="btn btn-primary btn-sm" id="newRoleBtn">＋ 新增自訂角色</button>
        </div>
        <div class="card-body" style="padding:0">
          <div class="table-wrap">
            <table>
              <thead><tr><th style="width:28px"></th><th>角色名稱</th><th>識別碼</th><th>預設頁面</th><th>類型</th><th></th></tr></thead>
              <tbody id="roleBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 人員管理 -->
      <div class="card">
        <div class="card-header">
          <h3>人員帳號</h3>
          <button class="btn btn-primary btn-sm" id="newUserBtn">＋ 新增人員</button>
        </div>
        <div class="card-body" style="padding:0">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width:28px"></th>
                  <th>姓名</th><th>帳號</th><th>角色</th><th>所屬</th>
                  <th>可看金額</th><th>狀態</th><th></th>
                </tr>
              </thead>
              <tbody id="userBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 新增 / 編輯分店 Modal -->
<div class="modal-overlay" id="orgModal">
  <div class="modal" style="max-width:440px">
    <div class="modal-header"><h3 id="orgModalTitle">新增分店</h3><button class="modal-close" onclick="closeModal('orgModal')">×</button></div>
    <div class="modal-body">
      <input type="hidden" id="orgId">
      <div class="form-group"><label>名稱 *</label><input type="text" id="orgName"></div>
      <div class="form-group">
        <label>類型</label>
        <select id="orgType"><option value="branch">分店</option><option value="hq">總部</option></select>
      </div>
      <div class="form-group"><label>地址</label><input type="text" id="orgAddress"></div>
      <div class="form-group"><label>電話</label><input type="text" id="orgPhone"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('orgModal')">取消</button>
      <button class="btn btn-primary" id="orgSaveBtn">儲存</button>
    </div>
  </div>
</div>

<!-- 新增 / 編輯自訂角色 Modal -->
<div class="modal-overlay" id="roleModal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header"><h3 id="roleModalTitle">新增自訂角色</h3><button class="modal-close" onclick="closeModal('roleModal')">×</button></div>
    <div class="modal-body">
      <input type="hidden" id="roleId">
      <div class="form-group"><label>角色名稱 *</label><input type="text" id="roleLabel" placeholder="例：倉管、學院講師、會計"></div>
      <div style="display:flex;gap:24px;margin:12px 0 16px">
        <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer">
          <input type="checkbox" id="rolePerm_is_manager"> 主管職
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer">
          <input type="checkbox" id="rolePerm_can_see_amounts"> 可查看案件金額
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer">
          <input type="checkbox" id="rolePerm_view_all_branches"> 可看全部分店
        </label>
      </div>
      <div style="background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:12px 16px">
        <div style="font-size:13px;font-weight:600;color:var(--gray-600);margin-bottom:10px">預設功能頁面</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="rolePerm_page_dashboard"> 📊 總覽
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="rolePerm_my_tasks"> 📌 我的任務
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="rolePerm_page_cases"> 📋 案件管理
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="rolePerm_page_clients"> 👥 客戶管理
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="rolePerm_page_calendar"> 📅 派單行事曆
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="rolePerm_page_payments"> 💰 收款追蹤
          </label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('roleModal')">取消</button>
      <button class="btn btn-primary" id="roleSaveBtn">儲存</button>
    </div>
  </div>
</div>

<!-- 新增 / 編輯人員 Modal -->
<div class="modal-overlay" id="userModal">
  <div class="modal">
    <div class="modal-header"><h3 id="userModalTitle">新增人員</h3><button class="modal-close" onclick="closeModal('userModal')">×</button></div>
    <div class="modal-body">
      <input type="hidden" id="userId">
      <div class="form-row">
        <div class="form-group"><label>姓名 *</label><input type="text" id="userName"></div>
        <div class="form-group"><label>帳號 *</label><input type="text" id="userUsername"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>密碼 <span id="pwdHint" style="font-size:11px;color:#6b7280">（留空=不修改）</span></label><input type="password" id="userPassword" placeholder="至少 6 個字元"></div>
        <div class="form-group"><label>所屬組織</label><select id="userOrgId"></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>角色 *</label><select id="userRole"></select></div>
        <div class="form-group"><label>部門</label><input type="text" id="userDept" placeholder="例：業務部、技術部"></div>
      </div>
      <div style="display:flex;gap:24px;margin-top:4px;margin-bottom:16px">
        <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer">
          <input type="checkbox" id="userIsManager"> 主管職
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer">
          <input type="checkbox" id="userCanSeeAmounts"> 可查看案件金額
        </label>
      </div>

      <!-- 功能頁面權限 -->
      <div style="background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:12px 16px">
        <div style="font-size:13px;font-weight:600;color:var(--gray-600);margin-bottom:10px">功能頁面權限（owner 永遠全開）</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="perm_page_dashboard"> 📊 總覽（全體統計）
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="perm_my_tasks"> 📌 我的任務（員工個人頁）
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="perm_page_cases"> 📋 案件管理
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="perm_page_clients"> 👥 客戶管理
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="perm_page_calendar"> 📅 派單行事曆
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="perm_page_payments"> 💰 收款追蹤
          </label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('userModal')">取消</button>
      <button class="btn btn-primary" id="userSaveBtn">儲存</button>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
let orgs = [], roles = [], allUsers = [], customRoles = [];
let editingUserId = null, editingRoleId = null;
let roleLabelsMap = {};

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function init() {
  await loadUser();
  if (!currentUser.manage_users) { location.href = '/dashboard'; return; }
  highlightNav('admin');
  [orgs, roles] = await Promise.all([fetchOrgs(), fetchRoles()]);
  roleLabelsMap = Object.fromEntries(roles.map(r => [r.value, r.label]));
  populateSelect(document.getElementById('userOrgId'), orgs, 'id', 'name', '請選擇組織');
  populateSelect(document.getElementById('userRole'), roles, 'value', 'label', '請選擇角色');

  if (currentUser.role === 'owner') {
    document.getElementById('auditSection').style.display = '';
    document.getElementById('roleSection').style.display = '';
    await loadCustomRoles();
    await loadAuditLogs();
  } else {
    document.getElementById('orgSection').style.display = 'none';
  }

  await loadOrgs();
  await loadUsers();
}

// ── 分店 ───────────────────────────────────────────────────
async function loadOrgs() {
  const tbody = document.getElementById('orgBody');
  if (!tbody) return;
  const typeMap = { hq:'🏢 總部', branch:'🏪 分店' };
  tbody.innerHTML = orgs.map(o => `
    <tr>
      <td style="font-weight:500">${o.name}</td>
      <td>${typeMap[o.type] || o.type}</td>
      <td style="color:#6b7280;font-size:13px">${o.address || '—'}</td>
      <td><span class="badge ${o.active ? 'badge-completed':'badge-closed'}">${o.active ? '啟用':'停用'}</span></td>
    </tr>
  `).join('') || '<tr><td colspan="4" class="empty-state">尚無資料</td></tr>';
}

document.getElementById('newOrgBtn')?.addEventListener('click', () => {
  document.getElementById('orgId').value = '';
  document.getElementById('orgName').value = '';
  document.getElementById('orgAddress').value = '';
  document.getElementById('orgPhone').value = '';
  document.getElementById('orgModal').classList.add('open');
});

document.getElementById('orgSaveBtn').addEventListener('click', async () => {
  const id = document.getElementById('orgId').value;
  const body = { name: document.getElementById('orgName').value, type: document.getElementById('orgType').value, address: document.getElementById('orgAddress').value, phone: document.getElementById('orgPhone').value };
  if (!body.name) { showToast('請填入名稱', 'error'); return; }
  const res = await fetch(id ? `/api/orgs/${id}` : '/api/orgs', { method: id ? 'PUT' : 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if (res.ok) { closeModal('orgModal'); orgs = await fetchOrgs(); loadOrgs(); showToast('分店已儲存'); }
  else { const e = await res.json(); showToast(e.error || '儲存失敗', 'error'); }
});

// ── 角色管理 ───────────────────────────────────────────────
const PAGE_NAMES = { page_dashboard:'總覽', page_cases:'案件', page_clients:'客戶', page_calendar:'行事曆', page_payments:'收款', my_tasks:'我的任務' };

async function loadCustomRoles() {
  const res = await fetch('/api/users/custom-roles');
  customRoles = res.ok ? await res.json() : [];
  const tbody = document.getElementById('roleBody');

  // 系統角色（唯讀）
  const builtinRows = roles.filter(r => r.type === 'builtin').map(r =>
    `<tr><td></td><td style="font-weight:500">${r.label}</td><td><code style="font-size:11px">${r.value}</code></td>
     <td style="color:#6b7280;font-size:12px">（依個別帳號設定）</td>
     <td><span class="badge badge-completed" style="font-size:11px">系統</span></td><td></td></tr>`
  );

  const customRows = customRoles.map(r => {
    const p = JSON.parse(r.default_perms || '{}');
    const pages = Object.entries(PAGE_NAMES).filter(([k]) => p[k]).map(([,v]) => v).join('、') || '—';
    return `<tr draggable="true" data-id="${r.id}">
      <td style="width:28px;cursor:grab;color:#9ca3af;font-size:16px;text-align:center;padding:0 4px" title="拖曳排序">⠿</td>
      <td style="font-weight:500">${r.label}${r.active ? '' : ' <span style="color:#9ca3af">(停用)</span>'}</td>
      <td><code style="font-size:11px">${r.code}</code></td>
      <td style="font-size:12px;color:#374151">${pages}</td>
      <td><span class="badge badge-closed" style="font-size:11px">自訂</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-ghost btn-sm" onclick="openEditRole(${r.id})">編輯</button>
        <button class="btn btn-ghost btn-sm" style="color:#e02424" onclick="deleteRole(${r.id},'${r.label}')">刪除</button>
      </td></tr>`;
  });

  const builtinHeader = `<tr><td></td><td colspan="4" style="font-size:11px;color:#9ca3af;padding:6px 12px;background:var(--gray-50)">系統內建角色（不可刪除）</td><td></td></tr>`;
  const customHeader  = customRoles.length ? `<tr><td></td><td colspan="4" style="font-size:11px;color:#9ca3af;padding:6px 12px;background:var(--gray-50)">自訂角色（可拖曳排序）</td><td></td></tr>` : '';
  tbody.innerHTML = builtinHeader + builtinRows.join('') + customHeader + customRows.join('') || '<tr><td colspan="6" class="empty-state">尚無角色</td></tr>';
  initDrag(tbody, '/api/users/custom-roles/reorder');
}

document.getElementById('newRoleBtn')?.addEventListener('click', () => {
  editingRoleId = null;
  document.getElementById('roleModalTitle').textContent = '新增自訂角色';
  document.getElementById('roleId').value = '';
  document.getElementById('roleLabel').value = '';
  ['rolePerm_is_manager','rolePerm_can_see_amounts','rolePerm_view_all_branches',
   'rolePerm_page_dashboard','rolePerm_my_tasks','rolePerm_page_cases',
   'rolePerm_page_clients','rolePerm_page_calendar','rolePerm_page_payments']
    .forEach(id => document.getElementById(id).checked = id.includes('page_cases') || id.includes('page_clients') || id.includes('page_calendar') || id.includes('my_tasks'));
  document.getElementById('roleModal').classList.add('open');
});

function openEditRole(id) {
  const r = customRoles.find(x => x.id === id);
  if (!r) return;
  editingRoleId = id;
  const p = JSON.parse(r.default_perms || '{}');
  document.getElementById('roleModalTitle').textContent = `編輯角色：${r.label}`;
  document.getElementById('roleId').value = r.id;
  document.getElementById('roleLabel').value = r.label;
  document.getElementById('rolePerm_is_manager').checked = !!p.is_manager;
  document.getElementById('rolePerm_can_see_amounts').checked = !!p.can_see_amounts;
  document.getElementById('rolePerm_view_all_branches').checked = r.view_all_branches === 1;
  document.getElementById('rolePerm_page_dashboard').checked = !!p.page_dashboard;
  document.getElementById('rolePerm_my_tasks').checked = !!p.my_tasks;
  document.getElementById('rolePerm_page_cases').checked = !!(p.page_cases ?? true);
  document.getElementById('rolePerm_page_clients').checked = !!(p.page_clients ?? true);
  document.getElementById('rolePerm_page_calendar').checked = !!(p.page_calendar ?? true);
  document.getElementById('rolePerm_page_payments').checked = !!p.page_payments;
  document.getElementById('roleModal').classList.add('open');
}

document.getElementById('roleSaveBtn').addEventListener('click', async () => {
  const id = document.getElementById('roleId').value;
  const label = document.getElementById('roleLabel').value.trim();
  if (!label) { showToast('請填入角色名稱', 'error'); return; }
  const default_perms = {
    is_manager:       document.getElementById('rolePerm_is_manager').checked,
    can_see_amounts:  document.getElementById('rolePerm_can_see_amounts').checked,
    page_dashboard:   document.getElementById('rolePerm_page_dashboard').checked,
    my_tasks:         document.getElementById('rolePerm_my_tasks').checked,
    page_cases:       document.getElementById('rolePerm_page_cases').checked,
    page_clients:     document.getElementById('rolePerm_page_clients').checked,
    page_calendar:    document.getElementById('rolePerm_page_calendar').checked,
    page_payments:    document.getElementById('rolePerm_page_payments').checked,
  };
  const view_all_branches = document.getElementById('rolePerm_view_all_branches').checked;
  const url = id ? `/api/users/custom-roles/${id}` : '/api/users/custom-roles';
  const res = await fetch(url, { method: id ? 'PUT' : 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ label, default_perms, view_all_branches }) });
  if (res.ok) {
    closeModal('roleModal');
    [roles] = await Promise.all([fetchRoles()]);
    roleLabelsMap = Object.fromEntries(roles.map(r => [r.value, r.label]));
    populateSelect(document.getElementById('userRole'), roles, 'value', 'label', '請選擇角色');
    await loadCustomRoles();
    showToast('角色已儲存');
    // 若是修改既有角色，提示是否更新受影響帳號
    if (id) {
      const cr = customRoles.find(r => r.id === Number(id));
      if (cr) await promptUpdateRoleUsers(cr.code, label, default_perms);
    }
  } else {
    const e = await res.json(); showToast(e.error || '儲存失敗', 'error');
  }
});

async function deleteRole(id, label) {
  if (!confirm(`確定刪除角色「${label}」？`)) return;
  const res = await fetch(`/api/users/custom-roles/${id}`, { method: 'DELETE' });
  if (res.ok) {
    [roles] = await Promise.all([fetchRoles()]);
    roleLabelsMap = Object.fromEntries(roles.map(r => [r.value, r.label]));
    populateSelect(document.getElementById('userRole'), roles, 'value', 'label', '請選擇角色');
    await loadCustomRoles();
    showToast('角色已刪除');
  } else {
    const e = await res.json(); showToast(e.error || '刪除失敗', 'error');
  }
}

// ── 拖排共用 ──────────────────────────────────────────────
let _dragSrc = null;
function initDrag(tbody, reorderUrl) {
  tbody.addEventListener('dragstart', e => {
    _dragSrc = e.target.closest('tr[draggable]');
    if (!_dragSrc) return;
    _dragSrc.style.opacity = '0.4';
    e.dataTransfer.effectAllowed = 'move';
  });
  tbody.addEventListener('dragover', e => {
    e.preventDefault();
    const row = e.target.closest('tr[draggable]');
    if (!row || row === _dragSrc) return;
    const rows = [...tbody.querySelectorAll('tr[draggable]')];
    const si = rows.indexOf(_dragSrc), ti = rows.indexOf(row);
    if (si < ti) tbody.insertBefore(_dragSrc, row.nextSibling);
    else tbody.insertBefore(_dragSrc, row);
  });
  tbody.addEventListener('dragend', async () => {
    if (_dragSrc) { _dragSrc.style.opacity = ''; _dragSrc = null; }
    const ids = [...tbody.querySelectorAll('tr[draggable]')].map(r => Number(r.dataset.id));
    await fetch(reorderUrl, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ ids }) });
  });
}

// ── 人員 ───────────────────────────────────────────────────
async function loadUsers() {
  allUsers = await fetchUsers();
  const tbody = document.getElementById('userBody');
  tbody.innerHTML = allUsers.map(u => `
    <tr draggable="true" data-id="${u.id}" style="cursor:default">
      <td style="width:28px;cursor:grab;color:#9ca3af;font-size:16px;text-align:center;padding:0 4px" title="拖曳排序">⠿</td>
      <td style="font-weight:500">${u.name}</td>
      <td><code style="font-size:12px">${u.username}</code></td>
      <td>${roleLabelsMap[u.role] || ROLE_LABELS[u.role] || u.role}</td>
      <td style="font-size:13px;color:#6b7280">${u.org_name || '—'}</td>
      <td style="text-align:center">${u.can_see_amounts ? '✅' : '—'}</td>
      <td><span class="badge ${u.active ? 'badge-completed':'badge-closed'}">${u.active ? '啟用':'停用'}</span></td>
      <td><button class="btn btn-ghost btn-sm" onclick="openEditUser(${u.id})">編輯</button></td>
    </tr>
  `).join('') || '<tr><td colspan="8"><div class="empty-state">尚無人員</div></td></tr>';
  initDrag(tbody, '/api/users/reorder');
}

document.getElementById('newUserBtn').addEventListener('click', () => {
  editingUserId = null;
  document.getElementById('userModalTitle').textContent = '新增人員';
  document.getElementById('userId').value = '';
  document.getElementById('userName').value = '';
  document.getElementById('userUsername').value = '';
  document.getElementById('userPassword').value = '';
  document.getElementById('userDept').value = '';
  document.getElementById('userIsManager').checked = false;
  document.getElementById('userCanSeeAmounts').checked = false;
  document.getElementById('userUsername').disabled = false;
  document.getElementById('pwdHint').style.display = 'none';
  document.getElementById('userOrgId').value = currentUser.org_id;
  // 新增人員預設全開
  ['perm_page_dashboard','perm_page_cases','perm_page_clients','perm_page_calendar','perm_page_payments'].forEach(id => document.getElementById(id).checked = true);
  document.getElementById('perm_my_tasks').checked = false;
  document.getElementById('userModal').classList.add('open');
});

// 選角色時自動帶入預設權限（僅自訂角色）
document.getElementById('userRole').addEventListener('change', function() {
  const roleDef = roles.find(r => r.value === this.value);
  if (!roleDef || !roleDef.default_perms) return;
  const p = JSON.parse(roleDef.default_perms);
  document.getElementById('userIsManager').checked      = !!p.is_manager;
  document.getElementById('userCanSeeAmounts').checked  = !!p.can_see_amounts;
  document.getElementById('perm_page_dashboard').checked = !!p.page_dashboard;
  document.getElementById('perm_my_tasks').checked       = !!p.my_tasks;
  document.getElementById('perm_page_cases').checked     = !!(p.page_cases ?? true);
  document.getElementById('perm_page_clients').checked   = !!(p.page_clients ?? true);
  document.getElementById('perm_page_calendar').checked  = !!(p.page_calendar ?? true);
  document.getElementById('perm_page_payments').checked  = !!p.page_payments;
});

function openEditUser(id) {
  const u = allUsers.find(x => x.id === id);
  if (!u) return;
  editingUserId = id;
  document.getElementById('userModalTitle').textContent = `編輯：${u.name}`;
  document.getElementById('userId').value = u.id;
  document.getElementById('userName').value = u.name;
  document.getElementById('userUsername').value = u.username;
  document.getElementById('userUsername').disabled = true;
  document.getElementById('userPassword').value = '';
  document.getElementById('pwdHint').style.display = 'inline';
  document.getElementById('userRole').value = u.role;
  document.getElementById('userOrgId').value = u.org_id;
  document.getElementById('userDept').value = u.department || '';
  document.getElementById('userIsManager').checked = !!u.is_manager;
  document.getElementById('userCanSeeAmounts').checked = !!u.can_see_amounts;
  const perms = u.permissions ? JSON.parse(u.permissions) : {};
  const isOwner = u.role === 'owner';
  document.getElementById('perm_page_dashboard').checked = isOwner || (perms.page_dashboard ?? true);
  document.getElementById('perm_page_cases').checked     = isOwner || (perms.page_cases ?? true);
  document.getElementById('perm_page_clients').checked   = isOwner || (perms.page_clients ?? true);
  document.getElementById('perm_page_calendar').checked  = isOwner || (perms.page_calendar ?? true);
  document.getElementById('perm_page_payments').checked  = isOwner || (perms.page_payments ?? true);
  document.getElementById('perm_my_tasks').checked       = isOwner || (perms.my_tasks ?? false);
  document.getElementById('userModal').classList.add('open');
}

document.getElementById('userSaveBtn').addEventListener('click', async () => {
  const id = document.getElementById('userId').value;
  const password = document.getElementById('userPassword').value;
  const body = {
    name: document.getElementById('userName').value,
    username: document.getElementById('userUsername').value,
    role: document.getElementById('userRole').value,
    org_id: document.getElementById('userOrgId').value,
    department: document.getElementById('userDept').value,
    is_manager: document.getElementById('userIsManager').checked,
    can_see_amounts: document.getElementById('userCanSeeAmounts').checked,
    active: 1,
    permissions: {
      page_dashboard: document.getElementById('perm_page_dashboard').checked,
      page_cases:     document.getElementById('perm_page_cases').checked,
      page_clients:   document.getElementById('perm_page_clients').checked,
      page_calendar:  document.getElementById('perm_page_calendar').checked,
      page_payments:  document.getElementById('perm_page_payments').checked,
      my_tasks:       document.getElementById('perm_my_tasks').checked,
    },
  };
  if (!id) body.password = password;
  if (!body.name || !body.role) { showToast('請填入必要欄位', 'error'); return; }
  if (!id && !body.password) { showToast('新增人員請填入密碼', 'error'); return; }

  const url = id ? `/api/users/${id}` : '/api/users';
  const method = id ? 'PUT' : 'POST';
  const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });

  if (res.ok) {
    // 有填密碼就額外更新密碼
    if (id && password) {
      await fetch(`/api/users/${id}/password`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password }) });
    }
    closeModal('userModal');
    await loadUsers();
    showToast('人員資料已儲存');
  } else {
    const e = await res.json();
    showToast(e.error || '儲存失敗', 'error');
  }
});

// ── 操作紀錄 ──────────────────────────────────────────────
const ACTION_LABELS = {
  create:'新增', update:'修改', delete:'刪除',
  login:'登入', logout:'登出',
  create_user:'新增帳號', update_user:'修改帳號', create_org:'新增分店',
};
const ENTITY_LABELS = { cases:'案件', clients:'客戶', ledger:'流水帳', users:'帳號', orgs:'分店' };

async function loadAuditLogs() {
  const entity = document.getElementById('auditEntity')?.value || '';
  const uid    = document.getElementById('auditUser')?.value || '';
  const params = new URLSearchParams({ limit: 200 });
  if (entity) params.set('entity', entity);
  if (uid)    params.set('uid', uid);
  const res = await fetch('/api/users/audit-logs?' + params);
  if (!res.ok) return;
  const logs = await res.json();

  // Populate user filter (first load only)
  const sel = document.getElementById('auditUser');
  if (sel && sel.options.length === 1) {
    const seen = new Set();
    logs.forEach(l => { if (l.user_id && !seen.has(l.user_id)) { seen.add(l.user_id); sel.add(new Option(l.user_name || l.username || l.user_id, l.user_id)); } });
  }

  const tbody = document.getElementById('auditBody');
  if (!logs.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty-state">暫無紀錄</td></tr>'; return; }
  const PREVIEW = 5;
  const rows = logs.map((l, i) => {
    const action = ACTION_LABELS[l.action] || l.action;
    const entity = ENTITY_LABELS[l.entity] || l.entity || '';
    const dt = new Date(l.created_at + (l.created_at.includes('+') ? '' : 'Z')).toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    const hidden = i >= PREVIEW ? ' class="audit-extra" style="display:none"' : '';
    return `<tr${hidden}>
      <td style="font-size:12px;color:#6b7280;white-space:nowrap">${dt}</td>
      <td style="font-weight:500">${l.user_name || '—'}</td>
      <td><span class="badge ${l.action==='delete'?'badge-closed':l.action==='login'||l.action==='logout'?'badge-completed':'badge-active'}" style="font-size:11px">${action}</span></td>
      <td style="font-size:12px;color:#6b7280">${entity}</td>
      <td style="font-size:12px;color:#374151;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.detail || '—'}</td>
    </tr>`;
  });
  if (logs.length > PREVIEW) {
    rows.push(`<tr id="auditToggleRow">
      <td colspan="5" style="text-align:center;padding:8px 0">
        <button class="btn btn-ghost btn-sm" id="auditToggleBtn" onclick="toggleAuditExpand(${logs.length})">
          展開顯示更多（共 ${logs.length} 筆）▾
        </button>
      </td>
    </tr>`);
  }
  tbody.innerHTML = rows.join('');
}
function toggleAuditExpand(total) {
  const extras = document.querySelectorAll('.audit-extra');
  const btn = document.getElementById('auditToggleBtn');
  const expanded = extras[0]?.style.display !== 'none';
  extras.forEach(r => r.style.display = expanded ? 'none' : '');
  btn.textContent = expanded ? `展開顯示更多（共 ${total} 筆）▾` : `收合 ▴`;
}
document.getElementById('auditEntity')?.addEventListener('change', loadAuditLogs);
document.getElementById('auditUser')?.addEventListener('change', loadAuditLogs);

// ── 儲存角色後提示更新受影響帳號 ─────────────────────────
async function promptUpdateRoleUsers(roleCode, label, default_perms) {
  if (!allUsers.length) return;
  const affected = allUsers.filter(u => u.role === roleCode);
  if (!affected.length) return;

  const names = affected.map(u => `• ${u.name}（${u.username}）`).join('\n');
  const ok = confirm(`角色「${label}」有 ${affected.length} 位帳號，要一起套用新的預設功能頁面設定嗎？\n\n${names}`);
  if (!ok) return;

  const p = typeof default_perms === 'string' ? JSON.parse(default_perms) : default_perms;
  for (const u of affected) {
    const perms = u.permissions ? JSON.parse(u.permissions) : {};
    const newPerms = {
      page_dashboard: !!(p.page_dashboard),
      page_cases:     !!(p.page_cases ?? true),
      page_clients:   !!(p.page_clients ?? true),
      page_calendar:  !!(p.page_calendar ?? true),
      page_payments:  !!(p.page_payments),
      my_tasks:       !!(p.my_tasks),
    };
    await fetch(`/api/users/${u.id}`, { method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name: u.name, role: u.role, department: u.department,
        is_manager: !!(p.is_manager ?? u.is_manager), can_see_amounts: !!(p.can_see_amounts ?? u.can_see_amounts),
        service_areas: JSON.parse(u.service_areas || '[]'), active: u.active, permissions: newPerms }) });
  }
  await loadUsers();
  showToast(`已更新 ${affected.length} 位帳號的權限設定`);
}
