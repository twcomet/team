<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的任務 — 繪新管理系統</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="icon" href="/logo.png" type="image/png">
<style>
.task-card {
  background:#fff; border:1px solid var(--gray-200); border-radius:10px;
  padding:14px 16px; margin-bottom:10px; transition:box-shadow .15s;
  position:relative;
}
.task-card:hover { box-shadow:0 2px 8px rgba(26,86,219,.12); border-color:var(--primary); }
.task-card.overdue { border-left:3px solid #ef4444; background:#fff8f8; }
.task-card.today   { border-left:3px solid #f59e0b; background:#fffbeb; }

.task-card-top {
  display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:4px;
}
.task-date-row { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--gray-500); }
.task-date-tag {
  font-size:11px; font-weight:700; padding:1px 7px; border-radius:999px;
}
.tag-overdue { background:#fee2e2; color:#dc2626; }
.tag-today   { background:#fef3c7; color:#b45309; }
.tag-days    { background:#ede9fe; color:#6d28d9; }

.task-title { font-size:15px; font-weight:600; margin-bottom:4px; cursor:pointer; }
.task-title:hover { text-decoration:underline; color:var(--primary); }
.task-client { font-size:13px; color:var(--gray-600); margin-bottom:8px; }
.task-badges { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.task-role-badge {
  font-size:11px; padding:2px 8px; border-radius:999px; font-weight:600;
}
.role-dispatch  { background:#dbeafe; color:#1d4ed8; }
.role-surveyor  { background:#d1fae5; color:#065f46; }
.role-sales     { background:#ede9fe; color:#6d28d9; }
.role-cs        { background:#fee2e2; color:#991b1b; }

.dismiss-btn {
  flex-shrink:0; font-size:12px; padding:4px 12px;
  background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0;
  border-radius:6px; cursor:pointer; font-weight:600; white-space:nowrap;
  transition:background .15s;
}
.dismiss-btn:hover { background:#dcfce7; }
.dismiss-btn:disabled { opacity:.5; cursor:default; }

.section-label {
  font-size:12px; font-weight:700; color:var(--gray-500); text-transform:uppercase;
  letter-spacing:.5px; margin:24px 0 10px; display:flex; align-items:center; gap:6px;
}
.section-label.overdue-label { color:#dc2626; }
.section-label.today-label   { color:#b45309; }
.section-label.future-label  { color:#6d28d9; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><h2><img src="/logo.png" style="height:28px;width:28px;object-fit:contain;filter:brightness(0) invert(1);margin-right:8px;flex-shrink:0"> 繪新管理系統</h2><p id="sidebarOrgName"></p></div>
    <nav class="sidebar-nav">
      <a class="nav-item" data-page="dashboard"      href="/dashboard">      <span class="icon">📊</span>總覽</a>
      <a class="nav-item" data-page="my-tasks"       href="/my-tasks">       <span class="icon">📌</span>我的任務</a>
      <a class="nav-item" data-page="my-calendar"    href="/my-calendar">   <span class="icon">🗓️</span>我的行事曆</a>
      <a class="nav-item" data-page="line-inquiries" href="/line-inquiries"> <span class="icon">💬</span>LINE 詢問</a>
      <a class="nav-item" data-page="cases-inquiry"  href="/cases-inquiry">   <span class="icon">📝</span>詢價管理</a>
      <a class="nav-item" data-page="cases-survey"   href="/cases-survey">    <span class="icon">🔍</span>場勘案件管理</a>
      <a class="nav-item" data-page="cases-deal"     href="/cases-deal">      <span class="icon">✅</span>成交案件管理</a>
      <a class="nav-item" data-page="dispatch-pool"  href="/dispatch-pool">  <span class="icon">🏊</span>派案池管理</a>
      <a class="nav-item" data-page="calendar"       href="/calendar">       <span class="icon">📅</span>派單行事曆</a>
      <a class="nav-item" data-page="clients"        href="/clients">        <span class="icon">👥</span>客戶管理</a>
      <a class="nav-item" data-page="materials"      href="/materials">      <span class="icon">🎞️</span>膜料管理</a>
      <a class="nav-item" data-page="material-calc"  href="/material-calc">  <span class="icon">🧮</span>快速報價</a>
      <a class="nav-item" data-page="payments"       href="/payments">       <span class="icon">💰</span>收款追蹤</a>
      <a class="nav-item" data-page="ledger"         href="/ledger">         <span class="icon">📒</span>收支流水帳</a>
      <a class="nav-item" data-page="performance"    href="/performance">    <span class="icon">🏆</span>業績報表</a>
      <a class="nav-item" data-page="reports"        href="/reports">        <span class="icon">📈</span>財務報表</a>
      <a class="nav-item" data-page="marketing"      href="/marketing">      <span class="icon">📣</span>行銷報表</a>
      <a class="nav-item" data-page="admin"          href="/admin" data-need="manage_users"><span class="icon">⚙️</span>人員管理</a>
    </nav>
    <div class="sidebar-user">
      <div class="user-name" id="sidebarUserName"></div>
      <div class="user-role" id="sidebarUserRole"></div>
      <button class="logout-btn" id="logoutBtn">登出</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <span class="page-title" id="pageTitle">我的任務</span>
    </div>
    <div class="page-body">
      <div id="taskContent"></div>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
const DISPATCH_LABELS = { survey:'場勘', install:'施工', aftersales:'維修' };

function dayDiff(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T00:00:00');
  const t = new Date(new Date().toISOString().slice(0, 10) + 'T00:00:00');
  return Math.round((d - t) / 86400000);
}

function dateTag(diff) {
  if (diff === null) return '';
  if (diff < 0)  return `<span class="task-date-tag tag-overdue">逾期${Math.abs(diff)}天</span>`;
  if (diff === 0) return `<span class="task-date-tag tag-today">當天任務</span>`;
  if (diff <= 10) {
    const md = new Date(new Date().getTime() + diff * 86400000);
    const mmdd = `${md.getMonth()+1}/${md.getDate()}`;
    return `<span class="task-date-tag tag-days">${diff}天後 (${mmdd})</span>`;
  }
  return '';
}

function roleBadges(t) {
  const parts = [];
  if (t.next_dispatch) {
    const [dtype] = t.next_dispatch.split('|');
    parts.push(`<span class="task-role-badge role-dispatch">${DISPATCH_LABELS[dtype] || dtype}</span>`);
  } else if (t.dispatch_count > 0) {
    parts.push(`<span class="task-role-badge role-dispatch">已派工</span>`);
  }
  if (t.is_surveyor) parts.push(`<span class="task-role-badge role-surveyor">場勘員</span>`);
  if (t.was_assigned) parts.push(`<span class="task-role-badge role-sales">業務指派</span>`);
  return parts.join('');
}

function taskDetailUrl(t) {
  const useFull = currentUser.permissions && currentUser.permissions.page_cases !== false;
  return `${useFull ? '/case-detail' : '/dispatch-detail'}?id=${t.id}`;
}

function renderCard(t) {
  const diff = dayDiff(t.scheduled_date);
  const isOverdue = diff !== null && diff < 0;
  const isToday   = diff === 0;
  const dateDisplay = t.scheduled_date
    ? `📅 ${t.scheduled_date}　${dateTag(diff)}`
    : '📅 未排日期';

  return `
    <div class="task-card${isOverdue ? ' overdue' : isToday ? ' today' : ''}" id="tc-${t.id}">
      <div class="task-card-top">
        <div style="flex:1;min-width:0">
          <div class="task-date-row">${dateDisplay}</div>
          <div class="task-title" onclick="location.href='${taskDetailUrl(t)}'">
            ${t.title}
          </div>
          <div class="task-client">
            👤 ${t.client_name || '—'}${t.client_phone ? `　📞 ${t.client_phone}` : ''}
            ${t.location ? `　📍 ${t.location}` : ''}
          </div>
        </div>
        <button class="dismiss-btn" onclick="dismissTask(${t.id}, this)">已完成</button>
      </div>
      <div class="task-badges">
        ${statusBadge(t.status)}
        ${currentUser.can_see_amounts && t.final_price ? `<span style="font-weight:600;color:var(--primary)">${fmt(t.final_price)}</span>` : ''}
        ${paymentBadge(t.payment_status)}
        ${roleBadges(t)}
      </div>
    </div>`;
}

function renderSection(label, cls, list) {
  if (!list.length) return '';
  return `<div class="section-label ${cls}">${label}</div>` + list.map(renderCard).join('');
}

async function dismissTask(caseId, btn) {
  btn.disabled = true;
  btn.textContent = '處理中…';
  const r = await fetch(`/api/my-tasks/${caseId}/dismiss`, { method: 'POST' });
  if (r.ok) {
    const card = document.getElementById(`tc-${caseId}`);
    if (card) {
      card.style.transition = 'opacity .3s';
      card.style.opacity = '0';
      setTimeout(() => card.remove(), 320);
    }
  } else {
    btn.disabled = false;
    btn.textContent = '已完成';
    showToast('操作失敗', 'error');
  }
}

async function init() {
  await loadUser();
  document.getElementById('pageTitle').textContent = `${currentUser.name} 的任務`;
  highlightNav('my-tasks');

  const res = await fetch('/api/my-tasks');
  const tasks = res.ok ? await res.json() : [];

  const el = document.getElementById('taskContent');
  if (!tasks.length) {
    el.innerHTML = `<div class="empty-state" style="padding:64px"><div class="icon">📌</div>目前沒有進行中的任務</div>`;
    return;
  }

  const today10 = new Date(Date.now() + 10 * 86400000).toISOString().slice(0, 10);
  const today30 = new Date(Date.now() + 30 * 86400000).toISOString().slice(0, 10);
  const todayStr = new Date().toISOString().slice(0, 10);

  const overdue  = tasks.filter(t => t.scheduled_date && t.scheduled_date < todayStr);
  const near10   = tasks.filter(t => t.scheduled_date && t.scheduled_date >= todayStr && t.scheduled_date <= today10);
  const near30   = tasks.filter(t => t.scheduled_date && t.scheduled_date > today10 && t.scheduled_date <= today30);
  const noDate   = tasks.filter(t => !t.scheduled_date);

  el.innerHTML =
    renderSection('🔴 已逾期任務', 'overdue-label', overdue) +
    renderSection('📌 本週任務（近10天）', 'today-label', near10) +
    renderSection('🟡 本月任務', 'future-label', near30) +
    renderSection('⚪ 未排日期', '', noDate);
}

init();
</script>
</body>
</html>
