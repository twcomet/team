<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的任務 — 繪新管理系統</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="icon" href="/logo.png" type="image/png">
<style>
.task-card {
  background:#fff; border:1px solid var(--gray-200); border-radius:10px;
  padding:16px 20px; margin-bottom:10px; transition:box-shadow .15s;
  cursor:pointer;
}
.task-card:hover { box-shadow:0 2px 8px rgba(26,86,219,.12); border-color:var(--primary); }
.task-date { font-size:12px; color:var(--gray-500); margin-bottom:4px; }
.task-title { font-size:15px; font-weight:600; margin-bottom:4px; }
.task-client { font-size:13px; color:var(--gray-600); }
.section-label { font-size:12px; font-weight:600; color:var(--gray-500); text-transform:uppercase;
                  letter-spacing:.5px; margin:20px 0 8px; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><h2><img src="/logo.png" style="height:28px;width:28px;object-fit:contain;filter:brightness(0) invert(1);margin-right:8px;flex-shrink:0"> 繪新管理系統</h2><p id="sidebarOrgName"></p></div>
            <nav class="sidebar-nav">
        <a class="nav-item" data-page="dashboard"      href="/dashboard">      <span class="icon">📊</span>總覽</a>
        <a class="nav-item" data-page="my-tasks"       href="/my-tasks">       <span class="icon">📌</span>我的任務</a>
        <a class="nav-item" data-page="my-calendar"    href="/my-calendar">   <span class="icon">🗓️</span>我的行事曆</a>
        <a class="nav-item" data-page="line-inquiries" href="/line-inquiries"> <span class="icon">💬</span>LINE 詢問</a>
        <a class="nav-item" data-page="cases-inquiry"  href="/cases-inquiry">   <span class="icon">📝</span>詢價管理</a>
        <a class="nav-item" data-page="cases-survey"   href="/cases-survey">    <span class="icon">🔍</span>場勘案件管理</a>
        <a class="nav-item" data-page="cases-deal"     href="/cases-deal">      <span class="icon">✅</span>成交案件管理</a>
        <a class="nav-item" data-page="dispatch-pool"  href="/dispatch-pool">  <span class="icon">🏊</span>派案池管理</a>
        <a class="nav-item" data-page="calendar"       href="/calendar">       <span class="icon">📅</span>派單行事曆</a>
        <a class="nav-item" data-page="clients"        href="/clients">        <span class="icon">👥</span>客戶管理</a>
        <a class="nav-item" data-page="materials"      href="/materials">      <span class="icon">🎞️</span>膜料管理</a>
        <a class="nav-item" data-page="payments"       href="/payments">       <span class="icon">💰</span>收款追蹤</a>
        <a class="nav-item" data-page="ledger"         href="/ledger">         <span class="icon">📒</span>收支流水帳</a>
        <a class="nav-item" data-page="performance"    href="/performance">    <span class="icon">🏆</span>業績報表</a>
        <a class="nav-item" data-page="reports"        href="/reports">        <span class="icon">📈</span>財務報表</a>
        <a class="nav-item" data-page="marketing"      href="/marketing">      <span class="icon">📣</span>行銷報表</a>
        <a class="nav-item" data-page="admin"          href="/admin" data-need="manage_users"><span class="icon">⚙️</span>人員管理</a>
    </nav>
    <div class="sidebar-user">
      <div class="user-name" id="sidebarUserName"></div>
      <div class="user-role" id="sidebarUserRole"></div>
      <button class="logout-btn" id="logoutBtn">登出</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <span class="page-title" id="pageTitle">我的任務</span>
    </div>
    <div class="page-body">
      <div id="taskContent"></div>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
const today = new Date().toISOString().slice(0, 10);
const nextWeek = new Date(Date.now() + 7*86400000).toISOString().slice(0,10);
const nextMonth = new Date(Date.now() + 30*86400000).toISOString().slice(0,10);

async function init() {
  await loadUser();
  document.getElementById('pageTitle').textContent = `${currentUser.name} 的任務`;
  highlightNav('my-tasks');

  const res = await fetch('/api/my-tasks');
  const tasks = res.ok ? await res.json() : [];

  const el = document.getElementById('taskContent');
  if (!tasks.length) {
    el.innerHTML = `<div class="empty-state" style="padding:64px"><div class="icon">📌</div>目前沒有進行中的任務</div>`;
    return;
  }

  const urgent   = tasks.filter(t => t.scheduled_date && t.scheduled_date <= nextWeek);
  const upcoming = tasks.filter(t => t.scheduled_date && t.scheduled_date > nextWeek && t.scheduled_date <= nextMonth);
  const noDate   = tasks.filter(t => !t.scheduled_date);

  function renderSection(label, list) {
    if (!list.length) return '';
    return `<div class="section-label">${label}</div>` +
      list.map(t => `
        <div class="task-card" onclick="location.href='${currentUser.permissions && currentUser.permissions.page_cases !== false ? '/case-detail' : '/dispatch-detail'}?id=${t.id}'">
          <div class="task-date">${t.scheduled_date ? `📅 ${t.scheduled_date}` : '未排日期'}</div>
          <div class="task-title">${t.title}</div>
          <div class="task-client">👤 ${t.client_name || '—'}${t.client_phone ? `　📞 ${t.client_phone}` : ''}</div>
          <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
            ${statusBadge(t.status)}
            ${currentUser.can_see_amounts && t.final_price ? `<span style="font-weight:600;color:var(--primary)">${fmt(t.final_price)}</span>` : ''}
            ${paymentBadge(t.payment_status)}
          </div>
        </div>
      `).join('');
  }

  el.innerHTML =
    renderSection('🔴 本週任務', urgent) +
    renderSection('🟡 近一個月', upcoming) +
    renderSection('⚪ 未排日期', noDate);
}

init();
</script>
</body>
</html>
