<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>繪新管理系統 — 登入</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <h1>🎨 繪新管理系統</h1>
      <p>繪新國際有限公司 內部使用</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label>帳號</label>
        <input type="text" id="username" placeholder="請輸入帳號" autofocus>
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="password" placeholder="請輸入密碼">
      </div>
      <button type="submit" class="btn btn-primary btn-full">登入</button>
      <p id="errMsg" class="error-msg" style="display:none"></p>
    </form>
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.disabled = true; btn.textContent = '登入中…';
  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value }),
    credentials: 'same-origin'
  });
  if (res.ok) { location.href = '/dashboard'; }
  else {
    const err = await res.json();
    const msg = document.getElementById('errMsg');
    msg.textContent = err.error; msg.style.display = 'block';
    btn.disabled = false; btn.textContent = '登入';
  }
});
</script>
</body>
</html>
