<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>繪新國際 · 花色推薦</title>
<link rel="icon" href="/logo.png" type="image/png">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f6f4f7;font-family:'Noto Sans TC',-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;color:#1f2937}
  .hd{background:linear-gradient(120deg,#7a1f5c,#D40069);color:#fff;padding:22px 20px;text-align:center}
  .hd img{height:34px;vertical-align:middle;margin-right:8px;filter:brightness(0) invert(1)}
  .hd .t{font-size:19px;font-weight:800;letter-spacing:1px}
  .hd .s{font-size:13px;opacity:.9;margin-top:4px}
  .wrap{max-width:960px;margin:20px auto;padding:0 14px 40px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.06)}
  .thumb{width:100%;height:180px;object-fit:cover;background:#eee;display:block}
  .thumb-empty{width:100%;height:180px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:14px}
  .body{padding:12px 14px}
  .brand{font-size:11px;color:#9ca3af;font-weight:700}
  .model{font-size:15px;font-weight:800;margin-top:1px}
  .color{font-size:13px;color:#4b5563;margin-top:3px}
  .meta{font-size:13px;color:#374151;margin-top:8px;line-height:1.8}
  .meta b{color:#111827}
  .empty{text-align:center;color:#9ca3af;padding:60px 20px}
  .foot{text-align:center;color:#9ca3af;font-size:12px;margin-top:26px;line-height:1.7}
</style>
</head>
<body>
  <div class="hd">
    <div class="t"><img src="/logo.png" alt="">繪新國際 · 花色推薦</div>
    <div class="s">以下為為您挑選的相似花色，歡迎參考挑選</div>
  </div>
  <div class="wrap"><div id="list"><div class="empty">載入中…</div></div>
    <div class="foot">本頁由繪新國際提供 · 實際供貨與價格以專人報價為準</div>
  </div>
<script>
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function nt(n){ return '$'+(Number(n)||0).toLocaleString(); }
  function fmtM(n){ const v=Number(n)||0; return (Math.round(v*10)/10)+' 米'; }
  (async () => {
    const token = location.pathname.split('/').filter(Boolean).pop();
    const el = document.getElementById('list');
    let d; try { const r = await fetch('/api/material-match/shared/' + encodeURIComponent(token)); if(!r.ok){ const e=await r.json().catch(()=>({})); el.innerHTML='<div class="empty">'+esc(e.error||'連結不存在或已失效')+'</div>'; return; } d = await r.json(); }
    catch(e){ el.innerHTML='<div class="empty">載入失敗</div>'; return; }
    const f = d.fields||{}; const items = d.items||[];
    if (!items.length){ el.innerHTML='<div class="empty">此連結目前沒有可顯示的花色。</div>'; return; }
    el.innerHTML = '<div class="grid">' + items.map(m => {
      const img = m.image_url ? `<img class="thumb" src="${esc(m.image_url)}" loading="lazy" alt="">` : `<div class="thumb-empty">（花色圖）</div>`;
      const meta = [];
      if (f.price    && m.unit_price   != null) meta.push('每米 <b>'+nt(m.unit_price)+'</b>');
      if (f.stock    && m.stock_meters != null) meta.push('現有庫存 <b>'+fmtM(m.stock_meters)+'</b>');
      if (f.location && m.location)             meta.push('貨架 '+esc(m.location));
      if (f.branch   && m.branch)               meta.push('分店 '+esc(m.branch));
      return `<div class="card">${img}<div class="body">
        <div class="brand">${esc(m.brand||'')}</div>
        <div class="model">${esc(m.model||'—')}</div>
        ${m.color?`<div class="color">${esc(m.color)}</div>`:''}
        ${meta.length?`<div class="meta">${meta.join('<br>')}</div>`:''}
      </div></div>`;
    }).join('') + '</div>';
  })();
</script>
</body>
</html>
