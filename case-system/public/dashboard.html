<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>總覽 — 繪新管理系統</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="icon" href="/logo.png" type="image/png">
</head>
<body>
<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand"><h2><img src="/logo.png" style="height:28px;width:28px;object-fit:contain;filter:brightness(0) invert(1);margin-right:8px;flex-shrink:0"> 繪新管理系統</h2><p id="sidebarOrgName"></p></div>
            <nav class="sidebar-nav">
        <a class="nav-item" data-page="dashboard"      href="/dashboard">      <span class="icon">📊</span>總覽</a>
        <a class="nav-item" data-page="my-tasks"       href="/my-tasks">       <span class="icon">📌</span>我的任務</a>
        <a class="nav-item" data-page="my-calendar"    href="/my-calendar">   <span class="icon">🗓️</span>我的行事曆</a>
        <a class="nav-item" data-page="line-inquiries" href="/line-inquiries"> <span class="icon">💬</span>LINE 詢問</a>
        <a class="nav-item" data-page="cases-inquiry"  href="/cases-inquiry">   <span class="icon">📝</span>詢價管理</a>
        <a class="nav-item" data-page="cases-survey"   href="/cases-survey">    <span class="icon">🔍</span>場勘管理</a>
        <a class="nav-item" data-page="cases-deal"     href="/cases-deal">      <span class="icon">✅</span>成交案件管理</a>
        <a class="nav-item" data-page="dispatch-pool"  href="/dispatch-pool">  <span class="icon">🏊</span>派案池管理</a>
        <a class="nav-item" data-page="calendar"       href="/calendar">       <span class="icon">📅</span>派單行事曆</a>
        <a class="nav-item" data-page="clients"        href="/clients">        <span class="icon">👥</span>客戶管理</a>
        <a class="nav-item" data-page="materials"      href="/materials">      <span class="icon">🎞️</span>膜料管理</a>
        <a class="nav-item" data-page="material-calc"  href="/material-calc">  <span class="icon">🧮</span>快速報價</a>
        <a class="nav-item" data-page="payments"       href="/payments">       <span class="icon">💰</span>收款追蹤</a>
        <a class="nav-item" data-page="ledger"         href="/ledger">         <span class="icon">📒</span>收支流水帳</a>
        <a class="nav-item" data-page="performance"    href="/performance">    <span class="icon">🏆</span>業績報表</a>
        <a class="nav-item" data-page="reports"        href="/reports">        <span class="icon">📈</span>財務報表</a>
        <a class="nav-item" data-page="marketing"      href="/marketing">      <span class="icon">📣</span>行銷報表</a>
        <a class="nav-item" data-page="hr" href="/hr"><span class="icon">👤</span>人事資料管理</a>
        <a class="nav-item" data-page="profile"        href="/profile">        <span class="icon">🪪</span>我的個人資料</a>
      <a class="nav-item" data-page="admin"          href="/admin" data-need="manage_users"><span class="icon">⚙️</span>人員管理</a>
    </nav>
    <div class="sidebar-user">
      <div class="user-name" id="sidebarUserName"></div>
      <div class="user-role" id="sidebarUserRole"></div>
      <button class="logout-btn" id="logoutBtn">登出</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <span class="page-title">總覽</span>
      <span id="todayDate" style="font-size:13px;color:#6b7280"></span>
    </div>
    <div class="page-body">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="label">全部案件</div><div class="value" id="s-total">—</div></div>
        <div class="stat-card"><div class="label">進行中</div><div class="value" id="s-active">—</div></div>
        <div class="stat-card"><div class="label">今日施工</div><div class="value" id="s-today">—</div></div>
        <div class="stat-card"><div class="label">待排工</div><div class="value warning" id="s-unscheduled">—</div></div>
        <div class="stat-card"><div class="label">本月已收</div><div class="value success" id="s-revenue">—</div></div>
        <div class="stat-card"><div class="label">待收款總額</div><div class="value danger" id="s-unpaid">—</div></div>
      </div>

      <!-- 財務摘要：老闆專屬 -->
      <div id="financeSection" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:13px;font-weight:600;color:var(--gray-700)">📈 本月財務摘要</span>
          <span id="finMonth" style="font-size:12px;color:var(--gray-500)"></span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
          <!-- 損益 -->
          <div class="card" style="margin:0">
            <div class="card-header" style="padding:12px 16px 8px">
              <h3 style="font-size:13px">損益表</h3>
              <a href="/reports" style="font-size:11px;color:var(--primary)">詳細 →</a>
            </div>
            <div class="card-body" style="padding:8px 16px 14px">
              <div id="plRows"></div>
            </div>
          </div>
          <!-- 現金流量 -->
          <div class="card" style="margin:0">
            <div class="card-header" style="padding:12px 16px 8px">
              <h3 style="font-size:13px">現金流量</h3>
              <a href="/reports" style="font-size:11px;color:var(--primary)">詳細 →</a>
            </div>
            <div class="card-body" style="padding:8px 16px 14px">
              <div id="cfRows"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>最新案件</h3>
          <a href="/cases" class="btn btn-ghost btn-sm">查看全部</a>
        </div>
        <div class="card-body" style="padding:0">
          <div class="table-wrap">
            <table>
              <thead><tr><th>案號</th><th>客戶</th><th>項目</th><th>施工日</th><th>業務</th><th>狀態</th><th>收款</th></tr></thead>
              <tbody id="recentCases"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
document.getElementById('todayDate').textContent = new Date().toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

async function init() {
  const user = await loadUser();
  highlightNav('dashboard');

  // 本月起訖
  const now = new Date();
  const ym  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const fromDate = `${ym}-01`, toDate = `${ym}-${String(lastDay).padStart(2,'0')}`;

  const fetches = [fetch('/api/cases/stats/summary'), fetch('/api/cases')];
  if (user?.manage_users) {
    fetches.push(fetch(`/api/reports/pl-monthly?from=${ym}&to=${ym}`));
    fetches.push(fetch(`/api/reports/cashflow?from=${fromDate}&to=${toDate}`));
  }
  const results = await Promise.all(fetches);
  const stats = await results[0].json();
  const cases = await results[1].json();

  document.getElementById('s-total').textContent = stats.total ?? 0;
  document.getElementById('s-active').textContent = stats.active ?? 0;
  document.getElementById('s-today').textContent = stats.today_jobs ?? 0;
  document.getElementById('s-unscheduled').textContent = stats.unscheduled ?? 0;
  document.getElementById('s-revenue').textContent = fmt(stats.month_income ?? 0);
  document.getElementById('s-unpaid').textContent = fmt(stats.unpaid ?? 0);

  // 財務摘要（老闆）
  if (user?.manage_users && results[2] && results[3]) {
    const pl = await results[2].json();
    const cf = await results[3].json();
    renderFinance(pl, cf, ym);
  }

  const tbody = document.getElementById('recentCases');
  const recent = cases.slice(0, 10);
  if (!recent.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">目前沒有案件</td></tr>';
    return;
  }
  tbody.innerHTML = recent.map(c => `
    <tr onclick="location.href='/case-detail?id=${c.id}'" style="cursor:pointer">
      <td><code style="font-size:12px">${c.case_number}</code></td>
      <td>${c.client_name || '—'}</td>
      <td>${c.title}</td>
      <td>${fmtDate(c.scheduled_date)}</td>
      <td>${c.sales_name || '—'}</td>
      <td>${statusBadge(c.status)}</td>
      <td>${paymentBadge(c.payment_status)}</td>
    </tr>
  `).join('');
}
function renderFinance(pl, cf, ym) {
  document.getElementById('financeSection').style.display = '';
  document.getElementById('finMonth').textContent = `${ym.slice(0,4)} 年 ${ym.slice(5)} 月`;

  const { totals } = pl;
  const plColor = (v) => v >= 0 ? '#057a55' : '#e02424';
  const row = (label, value, color, bold) =>
    `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--gray-100);font-size:13px${bold?';font-weight:700':''}">
      <span style="color:var(--gray-600)">${label}</span>
      <span style="color:${color}">${fmt(value)}</span>
    </div>`;
  const pctRow = (label, pct) =>
    `<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:12px;color:var(--gray-500)">
      <span>${label}</span><span>${pct.toFixed(1)}%</span>
    </div>`;

  document.getElementById('plRows').innerHTML =
    row('收入', totals.incomeTotal, '#057a55') +
    row('成本', totals.costTotal,   '#e02424') +
    row('毛利', totals.grossProfit, plColor(totals.grossProfit), true) +
    pctRow('毛利率', totals.grossMargin) +
    row('費用', totals.expTotal, '#92400e') +
    row('營業淨利', totals.opIncome, plColor(totals.opIncome), true) +
    pctRow('淨利率', totals.netMargin);

  const net = cf.net;
  document.getElementById('cfRows').innerHTML =
    row('現金流入', cf.totalIn,  '#057a55') +
    row('現金流出', cf.totalOut, '#e02424') +
    row('本月淨現金流', net, plColor(net), true) +
    `<div style="padding:8px 0 2px;font-size:12px;color:var(--gray-500)">交易 ${cf.daily.length} 天</div>` +
    (net < 0 ? `<div style="background:#fef2f2;color:#991b1b;padding:6px 10px;border-radius:6px;font-size:12px;margin-top:6px">⚠️ 本月現金淨流出</div>` : '');
}

init();
</script>
</body>
</html>
