<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快速報價 — 繪新管理系統</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="icon" href="/logo.png" type="image/png">
<style>
/* ── 隱藏 number 輸入的上下箭頭 ── */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }

/* ── 內容最大寬度，水平置中 ── */
.calc-body { max-width: 680px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

/* ── 膜料類型選擇 ── */
.film-type-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.film-btn {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 10px 16px;
  border: 2px solid var(--gray-200);
  border-radius: 10px;
  background: #fff;
  cursor: pointer;
  transition: all .15s;
  flex: 1;
  min-width: 140px;
}
.film-btn:hover { border-color: var(--primary-light); background: var(--primary-bg); }
.film-btn.active { border-color: var(--primary); background: var(--primary-bg); }
.film-btn .film-name { font-size: 14px; font-weight: 600; color: var(--gray-700); }
.film-btn.active .film-name { color: var(--primary-dark); }
.film-btn .film-width { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
.film-btn.active .film-width { color: var(--primary); font-weight: 600; }

/* ── 區塊標題 ── */
.block-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--gray-500);
  margin-bottom: 10px;
}

/* ── 輸入明細表 ── */
.table-card {
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: 10px;
  overflow: hidden;
}
.table-head {
  display: grid;
  grid-template-columns: 2fr 1.2fr 1.5fr 36px;
  gap: 0;
  background: var(--gray-100);
  border-bottom: 1px solid var(--gray-200);
  padding: 0 12px;
}
.table-head span {
  padding: 11px 10px;
  font-size: 12px;
  font-weight: 700;
  color: var(--gray-500);
  letter-spacing: .04em;
}
.table-head span:not(:first-child) { text-align: right; }

.rows-list { display: flex; flex-direction: column; }

.row-item {
  display: grid;
  grid-template-columns: 2fr 1.2fr 1.5fr 40px;
  align-items: center;
  padding: 8px 14px;
  gap: 0;
  border-bottom: 1px solid var(--gray-100);
}
.row-item:last-child { border-bottom: none; }

.row-item input {
  width: 100%;
  padding: 11px 10px;
  border: 1px solid transparent;
  border-radius: 8px;
  font-size: 18px;
  font-weight: 600;
  color: var(--gray-900);
  outline: none;
  background: transparent;
  transition: border-color .12s, background .12s;
  text-align: right;
}
.row-item input:hover { border-color: var(--gray-200); background: var(--gray-50); }
.row-item input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(255,0,128,.1); }
.row-item input.sub-input {
  color: var(--primary-dark);
  font-weight: 700;
  cursor: default;
}
.row-item input.sub-input:hover,
.row-item input.sub-input:focus { border-color: transparent; background: transparent; box-shadow: none; }

.row-item .cell { display: flex; align-items: center; gap: 4px; justify-content: flex-end; }
.row-item .cell:first-child { justify-content: flex-start; }
.row-item .cell-unit { font-size: 13px; color: var(--gray-400); white-space: nowrap; flex-shrink: 0; }

.del-btn {
  width: 32px;
  height: 32px;
  border: 1px solid #fca5a5;
  border-radius: 6px;
  background: transparent;
  color: #ef4444;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .12s;
  margin: auto;
}
.del-btn:hover { background: #fef2f2; }
.del-btn:disabled { opacity: .2; cursor: default; }

.add-row-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 10px;
  border: none;
  border-top: 1px dashed var(--gray-200);
  background: var(--gray-50);
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background .12s;
}
.add-row-btn:hover { background: var(--primary-bg); }

/* ── 合計欄 ── */
.summary-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.sum-box {
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: 10px;
  padding: 14px 18px;
}
.sum-box .s-label { font-size: 12px; color: var(--gray-500); margin-bottom: 6px; }
.sum-box .s-val { font-size: 26px; font-weight: 700; color: var(--primary-dark); line-height: 1; }
.sum-box .s-unit { font-size: 13px; color: var(--gray-500); margin-left: 4px; }

/* ── 報價輸入 ── */
.price-field {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: 10px;
  padding: 12px 18px;
}
.price-field label { font-size: 14px; color: var(--gray-700); font-weight: 500; flex: 0 0 130px; }
.price-field .price-iw { flex: 1; position: relative; display: flex; align-items: center; }
.price-field input {
  width: 100%;
  padding: 9px 46px 9px 12px;
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  color: var(--gray-900);
  outline: none;
  transition: border-color .12s;
  text-align: right;
}
.price-field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,0,128,.1); }
.price-field .p-unit { position: absolute; right: 12px; font-size: 12px; color: var(--gray-400); pointer-events: none; }

/* ── 結果卡片 ── */
.result-card {
  border-radius: 12px;
  padding: 18px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.result-card.pink { background: var(--primary); }
.result-card.purple { background: #7c3aed; }
.result-card .rc-label { font-size: 14px; font-weight: 600; color: rgba(255,255,255,.8); }
.result-card .rc-val { font-size: 2rem; font-weight: 700; color: #fff; letter-spacing: -.02em; }

/* ── 折扣區 ── */
.discount-wrap {
  background: #faf5ff;
  border: 1px solid #e9d5ff;
  border-radius: 12px;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.discount-wrap .block-label { color: #7c3aed; margin-bottom: 0; }

/* ── 模式 B 五欄表格 ── */
.table-card.mode-b .table-head,
.table-card.mode-b .row-item {
  grid-template-columns: 1.2fr 1.2fr 0.9fr 1.3fr 40px;
}

/* ── 計算方式選擇器 ── */
.calc-mode-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.calc-mode-btn {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 10px 14px;
  border: 2px solid var(--gray-200);
  border-radius: 10px;
  background: #fff;
  cursor: pointer;
  transition: all .15s;
  flex: 1;
  min-width: 110px;
  font-weight: 600;
  font-size: 13px;
  color: var(--gray-600);
  gap: 3px;
}
.calc-mode-btn input { display: none; }
.calc-mode-btn small { font-size: 11px; font-weight: 400; color: var(--gray-400); }
.calc-mode-btn:hover { border-color: var(--primary-light); background: var(--primary-bg); }
.calc-mode-btn.active { border-color: var(--primary); background: var(--primary-bg); color: var(--primary-dark); }
.calc-mode-btn.active small { color: var(--primary); }

/* ── 排料分析結果 ── */
.splice-result {
  background: #f0fdf4;
  border: 1.5px solid #86efac;
  border-radius: 12px;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.splice-result.warn { background: #fff7ed; border-color: #fed7aa; }
.splice-result .sr-title { font-size: 13px; font-weight: 700; color: #15803d; display: flex; align-items: center; gap: 6px; }
.splice-result.warn .sr-title { color: #c2410c; }
.splice-result .sr-strip { font-size: 12px; color: #374151; background: rgba(0,0,0,.04); border-radius: 6px; padding: 6px 10px; display: flex; justify-content: space-between; }
.splice-result .sr-strip span { color: var(--gray-500); }

/* ── 重置按鈕 ── */
.reset-btn {
  width: 100%;
  padding: 11px;
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  background: #fff;
  color: var(--gray-500);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background .12s;
}
.reset-btn:hover { background: var(--gray-100); color: var(--gray-700); }

.formula-note {
  font-size: 11px;
  color: var(--gray-400);
  text-align: center;
  line-height: 1.9;
}
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><h2><img src="/logo.png" style="height:28px;width:28px;object-fit:contain;filter:brightness(0) invert(1);margin-right:8px;flex-shrink:0"> 繪新管理系統</h2><p id="sidebarOrgName"></p></div>
    <nav class="sidebar-nav">
      <a class="nav-item" data-page="dashboard"      href="/dashboard">      <span class="icon">📊</span>總覽</a>
      <a class="nav-item" data-page="my-tasks"       href="/my-tasks">       <span class="icon">📌</span>我的任務</a>
      <a class="nav-item" data-page="my-calendar"    href="/my-calendar">   <span class="icon">🗓️</span>我的行事曆</a>
      <a class="nav-item" data-page="line-inquiries" href="/line-inquiries"> <span class="icon">💬</span>LINE 詢問</a>
      <a class="nav-item" data-page="cases-inquiry"  href="/cases-inquiry">   <span class="icon">📝</span>詢價管理</a>
      <a class="nav-item" data-page="cases-survey"   href="/cases-survey">    <span class="icon">🔍</span>場勘管理</a>
      <a class="nav-item" data-page="cases-deal"     href="/cases-deal">      <span class="icon">✅</span>成交案件管理</a>
      <a class="nav-item" data-page="dispatch-pool"  href="/dispatch-pool">  <span class="icon">🏊</span>派案池管理</a>
      <a class="nav-item" data-page="calendar"       href="/calendar">       <span class="icon">📅</span>派單行事曆</a>
      <a class="nav-item" data-page="clients"        href="/clients">        <span class="icon">👥</span>客戶管理</a>
      <a class="nav-item" data-page="materials"      href="/materials">      <span class="icon">🎞️</span>膜料管理</a>
      <a class="nav-item" data-page="material-calc"  href="/material-calc">  <span class="icon">🧮</span>快速報價</a>
      <a class="nav-item" data-page="payments"       href="/payments">       <span class="icon">💰</span>收款追蹤</a>
      <a class="nav-item" data-page="ledger"         href="/ledger">         <span class="icon">📒</span>收支流水帳</a>
      <a class="nav-item" data-page="performance"    href="/performance">    <span class="icon">🏆</span>業績報表</a>
      <a class="nav-item" data-page="reports"        href="/reports">        <span class="icon">📈</span>財務報表</a>
      <a class="nav-item" data-page="marketing"      href="/marketing">      <span class="icon">📣</span>行銷報表</a>
      <a class="nav-item" data-page="admin"          href="/admin" data-need="manage_users"><span class="icon">⚙️</span>人員管理</a>
    </nav>
    <div class="sidebar-user">
      <div class="user-name" id="sidebarUserName"></div>
      <div class="user-role" id="sidebarUserRole"></div>
      <button class="logout-btn" onclick="logout()">登出</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <span class="page-title">🧮 快速報價</span>
    </div>
    <div class="page-body">
      <div class="calc-body">

        <!-- 1. 膜料類型 -->
        <div>
          <div class="block-label">膜料類型</div>
          <div class="film-type-group">
            <button class="film-btn active" data-width="122" onclick="selectFilm(this)">
              <span class="film-name">裝潢膜</span>
              <span class="film-width">寬度 122 公分</span>
            </button>
            <button class="film-btn" data-width="150" onclick="selectFilm(this)">
              <span class="film-name">防爆玻璃膜</span>
              <span class="film-width">寬度 150 公分</span>
            </button>
            <button class="film-btn" data-width="152" onclick="selectFilm(this)">
              <span class="film-name">隔熱紙</span>
              <span class="film-width">寬度 152 公分</span>
            </button>
          </div>
        </div>

        <!-- 2. 計算方式（模式 B 限定） -->
        <div id="modeBOptions" style="display:none">
          <div class="block-label">計算方式</div>
          <div class="calc-mode-group">
            <label class="calc-mode-btn active" onclick="setCalcMode('no_loss',this)">
              <input type="radio" name="calcMode" value="no_loss" checked>
              不含損料
              <small>以實際尺寸計算</small>
            </label>
            <label class="calc-mode-btn" onclick="setCalcMode('with_loss',this)">
              <input type="radio" name="calcMode" value="with_loss">
              含損料
              <small>膜寬 × 高計算</small>
            </label>
            <label class="calc-mode-btn" onclick="setCalcMode('splice',this)">
              <input type="radio" name="calcMode" value="splice">
              拼料計算
              <small>自動最佳化排料</small>
            </label>
          </div>
        </div>

        <!-- 3. 材料明細 -->
        <div>
          <div class="block-label">材料明細</div>
          <div class="table-card" id="tableCard">
            <div class="table-head" id="tableHead">
              <span>長度</span>
              <span>數量</span>
              <span>小計</span>
              <span></span>
            </div>
            <div class="rows-list" id="rowsList"></div>
            <button class="add-row-btn" onclick="addRow()">＋ 新增一筆</button>
          </div>
        </div>

        <!-- 4. 排料分析（拼料模式限定） -->
        <div id="splicePanel" style="display:none"></div>

        <!-- 5. 合計 -->
        <div class="summary-row">
          <div class="sum-box" id="metersBox">
            <div class="s-label">總米數</div>
            <div><span class="s-val" id="totalMeters">—</span><span class="s-unit" id="totalMetersUnit"></span></div>
          </div>
          <div class="sum-box">
            <div class="s-label">總才數</div>
            <div><span class="s-val" id="totalCai">—</span><span class="s-unit" id="totalCaiUnit"></span></div>
          </div>
        </div>

        <!-- 4. 報價 -->
        <div class="price-field">
          <label>連工帶料單價</label>
          <div class="price-iw">
            <input type="number" id="unitPrice" placeholder="0" min="0" step="1" oninput="calculate()" />
            <span class="p-unit">元／才</span>
          </div>
        </div>

        <!-- 5. 總價 -->
        <div class="result-card pink">
          <span class="rc-label">總價</span>
          <span class="rc-val" id="totalPrice">—</span>
        </div>

        <!-- 6. 折扣 -->
        <div class="discount-wrap">
          <div class="block-label">行銷優惠折扣</div>
          <div class="price-field" style="border:none;padding:0;background:transparent;">
            <label style="color:#7c3aed">折數</label>
            <div class="price-iw">
              <input type="number" id="discount" placeholder="例：8" min="0" max="10" step="0.1" oninput="calculate()" />
              <span class="p-unit">折</span>
            </div>
          </div>
          <div class="result-card purple">
            <span class="rc-label">優惠價</span>
            <span class="rc-val" id="discountPrice">—</span>
          </div>
        </div>

        <button class="reset-btn" onclick="resetAll()">清除全部</button>

        <p class="formula-note" id="formulaNote">
          才數 = 寬度(cm) × 總米數(cm) ÷ 900 &nbsp;｜&nbsp; 總價 = 才數 × 單價
        </p>

      </div>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
  /* ── 狀態 ── */
  let rowCount  = 0;
  let filmWidth = 122;
  let filmMode  = 'A';       // 'A' 裝潢膜  'B' 防爆/隔熱紙
  let calcMode  = 'no_loss'; // 'no_loss' | 'with_loss' | 'splice'

  const FILMS = {
    122: { name: '裝潢膜',    defaultPrice: 200, mode: 'A' },
    150: { name: '防爆玻璃膜', defaultPrice: 400, mode: 'B' },
    152: { name: '隔熱紙',   defaultPrice: 180, mode: 'B' },
  };

  /* ── 切換膜料 ── */
  function selectFilm(btn) {
    document.querySelectorAll('.film-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filmWidth = parseInt(btn.dataset.width);
    const film = FILMS[filmWidth];
    filmMode = film.mode;
    document.getElementById('unitPrice').value = film.defaultPrice;

    const isModeB = filmMode === 'B';
    document.getElementById('modeBOptions').style.display = isModeB ? '' : 'none';
    document.getElementById('metersBox').style.display    = isModeB ? 'none' : '';

    // 重置計算方式
    if (!isModeB) { calcMode = 'no_loss'; }
    document.getElementById('splicePanel').style.display = 'none';

    // 更新表頭並重建列
    updateTableHeaders();
    document.getElementById('rowsList').innerHTML = '';
    rowCount = 0;
    addRow();
  }

  /* ── 切換計算方式（模式 B） ── */
  function setCalcMode(mode, label) {
    calcMode = mode;
    document.querySelectorAll('.calc-mode-btn').forEach(b => b.classList.remove('active'));
    label.classList.add('active');
    document.getElementById('splicePanel').style.display = mode === 'splice' ? '' : 'none';
    calculate();
  }

  /* ── 表頭 ── */
  function updateTableHeaders() {
    const tc = document.getElementById('tableCard');
    const th = document.getElementById('tableHead');
    if (filmMode === 'A') {
      tc.classList.remove('mode-b');
      th.innerHTML = '<span>長度</span><span>數量</span><span>小計</span><span></span>';
    } else {
      tc.classList.add('mode-b');
      th.innerHTML = '<span>寬 (cm)</span><span>高 (cm)</span><span>數量 (片)</span><span>才數</span><span></span>';
    }
  }

  /* ── 新增列 ── */
  function addRow() {
    rowCount++;
    const id = rowCount;
    const row = document.createElement('div');
    row.className = 'row-item';
    row.dataset.id = id;

    if (filmMode === 'A') {
      row.innerHTML = `
        <div class="cell">
          <input type="number" class="length-input" placeholder="公尺" min="0" step="any" oninput="onRowInput(${id})" />
          <span class="cell-unit">m</span>
        </div>
        <div class="cell">
          <input type="number" class="qty-input" placeholder="條" min="0" step="1" oninput="onRowInput(${id})" />
          <span class="cell-unit">條</span>
        </div>
        <div class="cell">
          <input type="text" class="sub-input" readonly placeholder="—" />
          <span class="cell-unit">m</span>
        </div>
        <button class="del-btn" onclick="deleteRow(${id})" title="刪除">×</button>`;
    } else {
      row.innerHTML = `
        <div class="cell">
          <input type="number" class="w-input" placeholder="寬" min="0" step="any" oninput="onRowInputB(${id})" />
          <span class="cell-unit">cm</span>
        </div>
        <div class="cell">
          <input type="number" class="h-input" placeholder="高" min="0" step="any" oninput="onRowInputB(${id})" />
          <span class="cell-unit">cm</span>
        </div>
        <div class="cell">
          <input type="number" class="qty-input" placeholder="片" min="1" step="1" value="1" oninput="onRowInputB(${id})" />
          <span class="cell-unit">片</span>
        </div>
        <div class="cell">
          <input type="text" class="sub-input" readonly placeholder="—" />
          <span class="cell-unit">才</span>
        </div>
        <button class="del-btn" onclick="deleteRow(${id})" title="刪除">×</button>`;
    }

    document.getElementById('rowsList').appendChild(row);
    updateDelBtns();
    row.querySelector('input:not(.sub-input)').focus();
  }

  function deleteRow(id) {
    document.querySelector(`.row-item[data-id="${id}"]`)?.remove();
    updateDelBtns();
    calculate();
  }

  function updateDelBtns() {
    const rows = document.querySelectorAll('.row-item');
    rows.forEach(r => { r.querySelector('.del-btn').disabled = rows.length === 1; });
  }

  /* ── 模式 A 列計算 ── */
  function onRowInput(id) {
    const row = document.querySelector(`.row-item[data-id="${id}"]`);
    const len = parseFloat(row.querySelector('.length-input').value) || 0;
    const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
    row.querySelector('.sub-input').value = (len || qty) ? fmt(len * qty, 2) : '';
    calculate();
  }

  /* ── 模式 B 列計算 ── */
  function onRowInputB(id) {
    const row  = document.querySelector(`.row-item[data-id="${id}"]`);
    const w    = parseFloat(row.querySelector('.w-input').value) || 0;
    const h    = parseFloat(row.querySelector('.h-input').value) || 0;
    const qty  = parseFloat(row.querySelector('.qty-input').value) || 1;
    const cai  = calcRowCaiB(w, h, qty);
    row.querySelector('.sub-input').value = (w && h) ? fmt(cai, 3) : '';
    calculate();
  }

  function calcRowCaiB(w, h, qty) {
    if (calcMode === 'no_loss')   return (w * h) / 900 * qty;
    if (calcMode === 'with_loss') return (filmWidth * h) / 900 * qty;
    // splice 模式：顯示實際面積（參考值），總才數由演算法決定
    return (w * h) / 900 * qty;
  }

  /* ── 主計算 ── */
  function calculate() {
    if (filmMode === 'A') calcModeA();
    else                  calcModeB();
  }

  function calcModeA() {
    let totalMeters = 0, hasAny = false;
    document.querySelectorAll('.row-item').forEach(row => {
      const len = parseFloat(row.querySelector('.length-input')?.value) || 0;
      const qty = parseFloat(row.querySelector('.qty-input')?.value) || 0;
      if (len || qty) hasAny = true;
      totalMeters += len * qty;
    });
    const totalCai = filmWidth * (totalMeters * 100) / 900;

    document.getElementById('totalMeters').textContent    = hasAny ? fmt(totalMeters, 2) : '—';
    document.getElementById('totalMetersUnit').textContent = hasAny ? ' 公尺' : '';
    setTotalCai(hasAny ? totalCai : null);
    setPrice(hasAny ? totalCai : null);
    document.getElementById('formulaNote').textContent =
      `才數 = ${filmWidth}cm × 總米數(cm) ÷ 900　｜　總價 = 才數 × 單價`;
  }

  function calcModeB() {
    const rowEls = [...document.querySelectorAll('.row-item')];
    let pieces = [], hasAny = false;
    rowEls.forEach(row => {
      const w   = parseFloat(row.querySelector('.w-input')?.value) || 0;
      const h   = parseFloat(row.querySelector('.h-input')?.value) || 0;
      const qty = parseFloat(row.querySelector('.qty-input')?.value) || 1;
      if (w && h) { hasAny = true; pieces.push({ w, h, qty }); }
      // 更新每列顯示
      const cai = (w && h) ? calcRowCaiB(w, h, qty) : 0;
      const sub = row.querySelector('.sub-input');
      if (sub) sub.value = (w && h) ? fmt(cai, 3) : '';
    });

    if (!hasAny) {
      setTotalCai(null);
      setPrice(null);
      document.getElementById('splicePanel').innerHTML = '';
      return;
    }

    let totalCai;
    if (calcMode === 'splice') {
      const result = runSpliceAlgorithm(pieces, filmWidth);
      totalCai = result.totalCai;
      renderSplicePanel(result, pieces);
    } else {
      totalCai = pieces.reduce((sum, p) => sum + calcRowCaiB(p.w, p.h, p.qty), 0);
      document.getElementById('splicePanel').innerHTML = '';
    }

    setTotalCai(totalCai);
    setPrice(totalCai);

    const modeLabel = calcMode === 'no_loss' ? '不含損料' : calcMode === 'with_loss' ? `含損料（膜寬${filmWidth}cm）` : '拼料計算';
    document.getElementById('formulaNote').textContent =
      `【${modeLabel}】才數 = 各片材數加總　｜　總價 = 才數 × 單價`;
  }

  /* ── 共用：設定合計才數 ── */
  function setTotalCai(cai) {
    document.getElementById('totalCai').textContent     = cai != null ? fmt(cai, 2) : '—';
    document.getElementById('totalCaiUnit').textContent = cai != null ? ' 才' : '';
  }

  /* ── 共用：設定價格 ── */
  function setPrice(cai) {
    const unitPrice  = parseFloat(document.getElementById('unitPrice').value) || 0;
    const totalPrice = (cai || 0) * unitPrice;
    const pEl = document.getElementById('totalPrice');
    if (totalPrice > 0)           pEl.textContent = 'NT$ ' + fmt(Math.round(totalPrice), 0);
    else if (cai && !unitPrice)    pEl.textContent = '請輸入單價';
    else                           pEl.textContent = '—';

    const disc = parseFloat(document.getElementById('discount').value);
    const dpEl = document.getElementById('discountPrice');
    dpEl.textContent = (totalPrice > 0 && disc > 0)
      ? 'NT$ ' + fmt(Math.round(totalPrice * disc / 10), 0)
      : '—';
  }

  /* ── 拼料演算法（寬度精確排列） ── */
  const PIECE_COLORS  = ['#bfdbfe','#bbf7d0','#fde68a','#fecaca','#e9d5ff','#fed7aa','#a5f3fc','#d9f99d'];
  const PIECE_BORDERS = ['#2563eb','#16a34a','#d97706','#dc2626','#9333ea','#ea580c','#0891b2','#65a30d'];

  function runSpliceAlgorithm(rows, fw) {
    let items = [];
    rows.forEach((p, ri) => {
      const label = String.fromCharCode(65 + (ri % 26));
      for (let i = 0; i < p.qty; i++) {
        items.push({
          w: p.w, h: p.h, area: p.w * p.h, label, rowIdx: ri,
          color: PIECE_COLORS[ri % PIECE_COLORS.length],
          border: PIECE_BORDERS[ri % PIECE_BORDERS.length],
        });
      }
    });
    items.sort((a, b) => b.h - a.h || b.area - a.area);

    const strips = [];
    for (const item of items) {
      let placed = false;
      for (const s of strips) {
        const usedW = s.pieces.reduce((sum, p) => sum + p.w, 0);
        if (item.h <= s.height && usedW + item.w <= fw) {
          item.x = usedW;
          s.pieces.push(item);
          placed = true;
          break;
        }
      }
      if (!placed) {
        item.x = 0;
        strips.push({ height: item.h, fw, total: item.h * fw, pieces: [item] });
      }
    }
    strips.forEach(s => {
      s.usedArea  = s.pieces.reduce((sum, p) => sum + p.w * p.h, 0);
      s.usedWidth = s.pieces.reduce((sum, p) => sum + p.w, 0);
    });
    const totalCai = strips.reduce((sum, s) => sum + s.total / 900, 0);
    return { strips, totalCai, fw };
  }

  /* ── Canvas 排料圖 ── */
  function renderDiagram(result) {
    const { strips, fw } = result;
    if (!strips.length) return null;

    const SCALE   = Math.min(1.8, 200 / fw);
    const SW      = Math.round(fw * SCALE);   // strip display width (px)
    const GAP     = 18;
    const ML      = 8;
    const MT      = 28;
    const MB      = 22;

    const maxH    = Math.max(...strips.map(s => s.height));
    const cW      = ML + strips.length * (SW + GAP) - GAP + ML;
    const cH      = MT + Math.round(maxH * SCALE) + MB;

    const canvas  = document.createElement('canvas');
    const dpr     = window.devicePixelRatio || 1;
    canvas.width  = cW * dpr;
    canvas.height = cH * dpr;
    canvas.style.width  = cW + 'px';
    canvas.style.height = cH + 'px';
    canvas.style.display = 'block';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.fillStyle = '#f9fafb';
    ctx.fillRect(0, 0, cW, cH);

    strips.forEach((strip, si) => {
      const sx = ML + si * (SW + GAP);
      const sy = MT;
      const sH = Math.round(strip.height * SCALE);

      // 條號標籤
      ctx.fillStyle = '#6b7280';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`第 ${si + 1} 條`, sx + SW / 2, sy - 10);

      // 廢料底色（灰）
      ctx.fillStyle = '#d1d5db';
      ctx.fillRect(sx, sy, SW, sH);

      // 每一片
      strip.pieces.forEach(piece => {
        const px = sx + Math.round(piece.x * SCALE);
        const py = sy;
        const pw = Math.round(piece.w * SCALE);
        const ph = Math.round(piece.h * SCALE);

        ctx.fillStyle = piece.color;
        ctx.fillRect(px, py, pw, ph);

        ctx.strokeStyle = piece.border;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(px + 0.75, py + 0.75, pw - 1.5, ph - 1.5);

        if (pw >= 18 && ph >= 20) {
          ctx.fillStyle = '#1e3a5f';
          ctx.textAlign = 'center';
          if (ph >= 44) {
            ctx.font = `bold ${Math.min(13, Math.floor(pw / 2.2))}px sans-serif`;
            ctx.fillText(piece.label, px + pw / 2, py + ph / 2 - 5);
            ctx.font = `${Math.min(10, Math.floor(pw / 2.8))}px sans-serif`;
            ctx.fillStyle = '#374151';
            ctx.fillText(`${piece.w}×${piece.h}`, px + pw / 2, py + ph / 2 + 8);
          } else {
            ctx.font = `bold ${Math.min(11, Math.floor(pw / 2))}px sans-serif`;
            ctx.fillText(piece.label, px + pw / 2, py + ph / 2 + 4);
          }
        }
      });

      // 條框
      ctx.strokeStyle = '#9ca3af';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx + 0.5, sy + 0.5, SW - 1, sH - 1);

      // 尺寸標註
      ctx.fillStyle = '#9ca3af';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`${fw}×${strip.height}cm`, sx + SW / 2, sy + sH + 14);
    });

    return canvas;
  }

  /* ── 渲染排料分析 ── */
  function renderSplicePanel(result, rows) {
    const { strips, totalCai, fw } = result;
    const withLossCai = rows.reduce((sum, p) => sum + (fw * p.h / 900) * p.qty, 0);
    const savedPct = withLossCai > 0 ? Math.round((1 - totalCai / withLossCai) * 100) : 0;
    const canFitAll = strips.length === 1;
    const cls = canFitAll ? '' : ' warn';
    const icon = canFitAll ? '✅' : '⚠️';

    // 圖例
    const legendItems = rows.map((p, ri) => {
      const label = String.fromCharCode(65 + (ri % 26));
      const col   = PIECE_COLORS[ri % PIECE_COLORS.length];
      const bdr   = PIECE_BORDERS[ri % PIECE_BORDERS.length];
      return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px">
        <span style="width:14px;height:14px;background:${col};border:1.5px solid ${bdr};border-radius:3px;flex-shrink:0"></span>
        ${label}：${p.w}×${p.h}cm × ${p.qty}片
      </span>`;
    }).join('');

    let html = `<div class="splice-result${cls}">
      <div class="sr-title">${icon} 排料分析：共需 <strong>&nbsp;${strips.length}&nbsp;</strong> 條膜料
        ${savedPct > 0 ? `<span style="font-size:11px;font-weight:400;color:#15803d;margin-left:auto">較含損料節省 ${savedPct}%</span>` : ''}
      </div>`;

    strips.forEach((s, i) => {
      const usePct = Math.round(s.usedArea / s.total * 100);
      const pDesc  = s.pieces.map(p => `${p.label}(${p.w}×${p.h})`).join('、');
      html += `<div class="sr-strip">
        <span>第 ${i+1} 條：${s.height} × ${fw} cm（${fmt(s.total/900,2)} 才）</span>
        <span>使用率 ${usePct}%｜${pDesc}</span>
      </div>`;
    });

    html += `
      <div id="diagramWrap" style="overflow-x:auto;padding:4px 0"></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">${legendItems}</div>
      <button onclick="downloadDiagram()" style="align-self:flex-end;font-size:12px;color:#6b7280;background:#fff;border:1px solid #d1d5db;border-radius:6px;padding:5px 14px;cursor:pointer;margin-top:2px">⬇ 下載排料圖</button>
    </div>`;

    document.getElementById('splicePanel').innerHTML = html;
    document.getElementById('splicePanel').style.display = '';

    const canvas = renderDiagram(result);
    if (canvas) {
      canvas.id = 'layoutCanvas';
      document.getElementById('diagramWrap').appendChild(canvas);
    }
  }

  function downloadDiagram() {
    const canvas = document.getElementById('layoutCanvas');
    if (!canvas) return;
    const a = document.createElement('a');
    a.download = '排料圖.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }

  function fmt(n, dec) {
    return n.toLocaleString('zh-TW', { minimumFractionDigits: 0, maximumFractionDigits: dec ?? 2 });
  }

  function resetAll() {
    document.getElementById('rowsList').innerHTML = '';
    document.getElementById('unitPrice').value = FILMS[filmWidth].defaultPrice;
    document.getElementById('discount').value = '';
    document.getElementById('splicePanel').innerHTML = '';
    rowCount = 0;
    calculate();
    addRow();
  }

  highlightNav('material-calc');
  document.getElementById('unitPrice').value = 200;
  addRow();
</script>
</body>
</html>
