<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>場勘確認單 — 繪新國際</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif; background:#f8fafc; color:#1f2937; }
.container { max-width:680px; margin:0 auto; padding:16px; }
.brand { text-align:center; padding:20px 0 16px; border-bottom:3px solid #1a56db; margin-bottom:20px; }
.brand h1 { font-size:22px; font-weight:700; color:#1a56db; }
.brand p  { font-size:13px; color:#6b7280; margin-top:4px; }
.card { background:#fff; border-radius:12px; border:1px solid #e5e7eb; padding:18px; margin-bottom:14px; }
.card h3 { font-size:14px; font-weight:600; color:#374151; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #f3f4f6; }
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.info-item .label { font-size:11px; color:#9ca3af; margin-bottom:3px; }
.info-item .value { font-size:14px; font-weight:500; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:#f9fafb; padding:8px 10px; text-align:left; font-size:11px; color:#6b7280; border-bottom:2px solid #e5e7eb; }
td { padding:10px; border-bottom:1px solid #f3f4f6; }
tr:last-child td { border-bottom:none; }
.sig-section { background:#fff; border-radius:12px; border:2px solid #1a56db; padding:20px; margin-bottom:14px; }
.sig-section h3 { font-size:15px; font-weight:600; color:#1a56db; margin-bottom:8px; }
.sig-desc { font-size:13px; color:#4b5563; margin-bottom:14px; line-height:1.6; }
#sigCanvas { width:100%; height:200px; border:2px dashed #d1d5db; border-radius:8px; background:#fafafa; cursor:crosshair; touch-action:none; display:block; }
@media (min-width:500px) { #sigCanvas { height:240px; } }
#sigCanvas.has-sig { border-color:#1a56db; border-style:solid; background:#fff; }
.sig-controls { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
.btn { padding:10px 20px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; }
.btn-primary { background:#1a56db; color:#fff; width:100%; padding:14px; font-size:15px; margin-top:16px; border-radius:10px; }
.btn-ghost   { background:#f3f4f6; color:#374151; font-size:13px; padding:8px 14px; }
.signed-box  { background:#d1fae5; border:2px solid #6ee7b7; border-radius:12px; padding:24px; text-align:center; margin-bottom:14px; }
.signed-box h2 { color:#065f46; font-size:20px; margin-bottom:8px; }
.signed-box p  { color:#047857; font-size:14px; }
.print-only { display:none; }
@media print {
  .sig-section, .btn-primary, .sig-controls { display:none !important; }
  .print-only { display:block !important; }
  body { background:#fff; }
  .card, .brand { border:none; box-shadow:none; }
}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="brand">
    <h1>🎨 繪新國際有限公司</h1>
    <p>場勘確認單</p>
  </div>
  <div id="content">
    <p style="text-align:center;color:#6b7280;padding:40px">載入中…</p>
  </div>
</div>

<script>
const token = location.pathname.split('/sign/')[1]?.split('?')[0];
const printMode = new URLSearchParams(location.search).get('print') === '1';

async function load() {
  const res = await fetch(`/api/survey/sign/${token}`);
  if (!res.ok) {
    document.getElementById('content').innerHTML = '<p style="text-align:center;color:#e02424;padding:40px">找不到此場勘單，連結可能已失效。</p>';
    return;
  }
  const f = await res.json();
  render(f);
  if (printMode) setTimeout(() => window.print(), 800);
}

function render(f) {
  const signed = f.status === 'signed';
  const findings = f.findings || [];

  document.getElementById('content').innerHTML = `
    ${signed ? `
    <div class="signed-box">
      <h2>✅ 場勘單已確認簽名</h2>
      <p>簽名時間：${f.client_signed_at ? f.client_signed_at.slice(0,16).replace('T',' ') : ''}</p>
    </div>` : ''}

    <div class="card">
      <h3>案件資訊</h3>
      <div class="info-grid">
        <div class="info-item"><div class="label">案號</div><div class="value" style="font-family:monospace">${f.case_number}</div></div>
        <div class="info-item"><div class="label">場勘日期</div><div class="value">${f.survey_date || '—'}</div></div>
        <div class="info-item"><div class="label">客戶</div><div class="value">${f.client_name || '—'}</div></div>
        <div class="info-item"><div class="label">場勘人員</div><div class="value">${f.surveyor_name || '—'}</div></div>
        <div class="info-item" style="grid-column:1/-1"><div class="label">施工地址</div><div class="value">${f.site_address || f.location || '—'}</div></div>
        ${f.site_contact ? `<div class="info-item"><div class="label">現場聯絡人</div><div class="value">${f.site_contact}</div></div>` : ''}
        ${f.site_phone   ? `<div class="info-item"><div class="label">聯絡電話</div><div class="value">${f.site_phone}</div></div>` : ''}
      </div>
    </div>

    ${findings.length ? `
    <div class="card">
      <h3>場勘項目</h3>
      <table>
        <thead><tr><th>施作位置</th><th>材料 / 說明</th><th>寬(cm)</th><th>高(cm)</th></tr></thead>
        <tbody>
          ${findings.map(it => `<tr>
            <td>${it.location || ''}</td>
            <td>${it.material || ''}</td>
            <td>${it.width || '—'}</td>
            <td>${it.height || '—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}

    ${f.extra_notes ? `
    <div class="card">
      <h3>備註 / 注意事項</h3>
      <p style="font-size:14px;color:#374151;line-height:1.7">${f.extra_notes.replace(/\n/g,'<br>')}</p>
    </div>` : ''}

    ${!signed ? `
    <div class="sig-section">
      <h3>客戶確認簽名</h3>
      <p class="sig-desc">請確認以上場勘資料無誤後，在下方空白處以手指或滑鼠進行簽名，完成後點擊「確認並送出」。</p>
      <canvas id="sigCanvas" width="640" height="180"></canvas>
      <div class="sig-controls">
        <span style="font-size:12px;color:#9ca3af">請在上方框內簽名</span>
        <button class="btn btn-ghost" onclick="clearSig()">清除重寫</button>
      </div>
      <button class="btn btn-primary" onclick="submitSig()">確認並送出簽名</button>
    </div>

    <div class="print-only card" style="text-align:center;padding:30px">
      <p style="font-size:13px;color:#6b7280">客戶簽名欄</p>
      <div style="border-bottom:1px solid #000;height:60px;margin:20px 40px"></div>
      <p style="font-size:12px;color:#6b7280">日期：_______ 年 _____ 月 _____ 日</p>
    </div>` : `
    ${f.client_signature ? `
    <div class="card print-only" style="text-align:center">
      <h3>客戶簽名</h3>
      <img src="${f.client_signature}" style="max-width:300px;border:1px solid #e5e7eb;border-radius:8px">
      <p style="font-size:12px;color:#6b7280;margin-top:8px">簽名時間：${f.client_signed_at?.slice(0,16).replace('T',' ')}</p>
    </div>` : ''}
    `}

    <div style="text-align:center;padding:20px 0;font-size:12px;color:#9ca3af">
      此場勘單由 繪新國際有限公司 提供<br>
      如有問題請聯繫業務人員
    </div>
  `;

  if (!signed) setupCanvas();
}

// ── Canvas 簽名 ─────────────────────────────────────────
function setupCanvas() {
  const canvas = document.getElementById('sigCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  // 修正 canvas 實際大小
  const rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.strokeStyle = '#1f2937';
  ctx.lineWidth   = 2.5;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  let drawing = false, hasSig = false;

  const getPos = e => {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  };

  canvas.addEventListener('pointerdown', e => {
    drawing = true; hasSig = true;
    canvas.classList.add('has-sig');
    const {x,y} = getPos(e);
    ctx.beginPath(); ctx.moveTo(x, y);
  });
  canvas.addEventListener('pointermove', e => {
    if (!drawing) return;
    e.preventDefault();
    const {x,y} = getPos(e);
    ctx.lineTo(x, y); ctx.stroke();
  });
  canvas.addEventListener('pointerup', () => { drawing = false; });
  canvas.addEventListener('pointerleave', () => { drawing = false; });
}

function clearSig() {
  const canvas = document.getElementById('sigCanvas');
  if (!canvas) return;
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  canvas.classList.remove('has-sig');
}

async function submitSig() {
  const canvas = document.getElementById('sigCanvas');
  if (!canvas || !canvas.classList.contains('has-sig')) {
    alert('請先在上方框內簽名'); return;
  }
  const sig = canvas.toDataURL('image/png');
  const res = await fetch(`/api/survey/sign/${token}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ signature: sig })
  });
  if (res.ok) {
    load(); // 重新渲染顯示簽名完成畫面
  } else {
    const err = await res.json();
    alert(err.error || '送出失敗，請重試');
  }
}

load();
</script>
</body>
</html>
