<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE OA 詢問管理 — 繪新管理系統</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/logo.png" type="image/png">
  <style>
    /* ── 整頁佈局 ── */
    .inq-layout  { display:flex; gap:0; height:calc(100vh - 52px); overflow:hidden; }
    .inq-list    { width:320px; min-width:260px; border-right:1px solid var(--gray-200); display:flex; flex-direction:column; flex-shrink:0; background:#fff; }
    .inq-detail  { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#f9fafb; }

    /* ── 左側工具列 ── */
    .inq-toolbar { padding:10px 12px; border-bottom:1px solid var(--gray-200); display:flex; flex-direction:column; gap:8px; }
    .inq-search  { width:100%; padding:7px 10px; border:1px solid var(--gray-300); border-radius:8px; font-size:13px; box-sizing:border-box; }
    .inq-search:focus { outline:none; border-color:var(--primary); }
    .status-tabs { display:flex; gap:4px; flex-wrap:wrap; }
    .status-tab  { padding:4px 9px; border-radius:20px; border:1px solid var(--gray-300); font-size:12px; cursor:pointer; background:#fff; color:var(--gray-600); transition:all .15s; }
    .status-tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .status-tab .cnt { margin-left:2px; font-size:11px; opacity:.75; }

    /* ── 詢問卡片 ── */
    .inq-scroll  { flex:1; overflow-y:auto; }
    .inq-card    { padding:11px 14px; border-bottom:1px solid var(--gray-100); cursor:pointer; transition:background .1s; }
    .inq-card:hover    { background:var(--gray-50); }
    .inq-card.selected { background:#eff6ff; border-left:3px solid var(--primary); padding-left:11px; }
    .inq-card .ic-name    { font-size:13px; font-weight:600; color:var(--gray-900); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .inq-card .ic-snippet { font-size:12px; color:var(--gray-500); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .inq-card .ic-meta    { font-size:11px; color:var(--gray-400); margin-top:4px; display:flex; justify-content:space-between; }

    .s-badge { padding:2px 7px; border-radius:10px; font-size:11px; font-weight:500; }
    .s-new         { background:#dcfce7; color:#166534; }
    .s-in_progress { background:#dbeafe; color:#1e40af; }
    .s-converted   { background:var(--gray-100); color:var(--gray-600); }
    .s-invalid     { background:#fee2e2; color:#991b1b; }
    .s-hidden      { background:#fef9c3; color:#713f12; }
    .s-case_closed { background:#e0e7ff; color:#3730a3; }
    .s-case_invalid{ background:#fce7f3; color:#9d174d; }

    /* ── 右側空狀態 ── */
    .inq-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--gray-400); gap:12px; }

    /* ── 詳情 header ── */
    .det-header  { padding:14px 20px; border-bottom:1px solid var(--gray-200); background:#fff; display:flex; align-items:flex-start; gap:12px; flex-wrap:wrap; flex-shrink:0; }
    .det-actions { margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; }

    /* ── 客戶資料區 ── */
    .det-client { padding:10px 20px; background:#fff; border-bottom:1px solid var(--gray-200); flex-shrink:0; }
    .client-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px; }
    .cf { display:flex; flex-direction:column; gap:2px; }
    .cf label { font-size:11px; color:var(--gray-500); font-weight:500; }
    .cf input  { padding:5px 8px; border:1px solid var(--gray-300); border-radius:6px; font-size:13px; }
    .cf input:focus { outline:none; border-color:var(--primary); }

    /* ── 對話區 ── */
    .chat-area { flex:1; overflow-y:auto; padding:14px 20px; display:flex; flex-direction:column; gap:10px; background:#f3f4f6; }
    .msg-row   { display:flex; align-items:flex-end; gap:8px; }
    .msg-row.out { flex-direction:row-reverse; }
    .msg-bubble { max-width:68%; padding:9px 13px; border-radius:12px; font-size:13px; line-height:1.5; word-break:break-word; white-space:pre-wrap; }
    .msg-row.in  .msg-bubble { background:#fff; color:var(--gray-900); border-radius:4px 12px 12px 12px; box-shadow:0 1px 3px rgba(0,0,0,.07); }
    .msg-row.out .msg-bubble { background:var(--primary); color:#fff; border-radius:12px 4px 12px 12px; }
    .msg-time   { font-size:11px; color:var(--gray-400); flex-shrink:0; }
    .msg-sender { font-size:11px; color:var(--gray-500); margin-bottom:2px; }

    /* ── 回覆框 ── */
    .reply-box { padding:10px 14px; background:#fff; border-top:1px solid var(--gray-200); display:flex; gap:8px; align-items:flex-end; flex-shrink:0; }
    .reply-ta  { flex:1; padding:8px 12px; border:1px solid var(--gray-300); border-radius:8px; font-size:13px; resize:none; min-height:38px; max-height:110px; font-family:inherit; }
    .reply-ta:focus { outline:none; border-color:var(--primary); }

    /* ── 備註區 ── */
    .note-section { padding:10px 20px; background:#fff; border-top:1px solid var(--gray-200); flex-shrink:0; }

    /* ── 轉案 Modal（用系統 .modal-overlay 標準）── */
    .modal-overlay.open { display:flex; }
  </style>
</head>
<body>

<!-- 轉案 Modal -->

        <label>案件類型</label>

          <option value="home">居家</option>
          <option value="commercial">商空</option>

          <option value="other" selected>其他</option>
        </select>

      <div class="form-group">
        <label>案件標題（選填，空白自動產生）</label>
        <input id="convertTitle" type="text" placeholder="LINE詢問｜客戶姓名">

<script src="/js/common.js"></script>
<script>
let currentStatus = 'all';
let currentId     = null;
let searchTimer   = null;
let inquiries     = [];
let allUsers      = [];
let sortDateDir   = 'desc';

function toggleInqSort() {
  sortDateDir = sortDateDir === 'desc' ? 'asc' : 'desc';
  const icon = document.getElementById('inqSortIcon');
  if (icon) icon.textContent = sortDateDir === 'desc' ? '↓' : '↑';
  renderList();
}

async function init() {
  await loadUser();
  highlightNav('line-inquiries');
  allUsers = await fetchUsers();
  loadStats();
  loadList();

  document.getElementById('statusTabs').addEventListener('click', e => {
    const tab = e.target.closest('.status-tab');
    if (!tab) return;
    document.querySelectorAll('.status-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentStatus = tab.dataset.status;
    loadList();
  });

  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadList, 280);
  });
}

// ── 統計 ──────────────────────────────────────────────────
async function loadStats() {
  const s = await fetch('/api/line-inquiries/stats').then(r => r.json()).catch(() => ({}));
  const total = (s.new || 0) + (s.in_progress || 0);
  document.getElementById('cnt-all').textContent         = total     ? ` ${total}` : '';
  document.getElementById('cnt-new').textContent         = s.new     ? ` ${s.new}` : '';
  document.getElementById('cnt-in_progress').textContent = s.in_progress ? ` ${s.in_progress}` : '';
  document.getElementById('cnt-converted').textContent   = s.converted   ? ` ${s.converted}` : '';
  document.getElementById('cnt-invalid').textContent     = s.invalid     ? ` ${s.invalid}` : '';
  document.getElementById('cnt-case_closed').textContent = s.case_closed ? ` ${s.case_closed}` : '';
  document.getElementById('cnt-hidden').textContent      = s.hidden      ? ` ${s.hidden}` : '';
}

// ── 清單 ──────────────────────────────────────────────────
async function loadList() {
  const q = document.getElementById('searchInput').value.trim();
  const p = new URLSearchParams({ limit: 100, page: 1 });
  if (currentStatus !== 'all') p.set('status', currentStatus);
  if (q) p.set('q', q);
  const data = await fetch(`/api/line-inquiries?${p}`).then(r => r.json()).catch(() => ({ rows: [] }));
  inquiries = data.rows || [];
  renderList();
}

function renderList() {
  const el = document.getElementById('inqScroll');
  const sorted = [...inquiries].sort((a, b) => {
    const va = a.last_message_at || '', vb = b.last_message_at || '';
    return vb.localeCompare(va); // 固定最新訊息優先
  });
  if (!sorted.length) {
    el.innerHTML = `<div style="padding:32px;text-align:center;color:var(--gray-400);font-size:13px">沒有符合的詢問</div>`;
    return;
  }
  el.innerHTML = sorted.map(i => {
    // 根據案件狀態計算顯示用的 status
    const dispStatus = i.status === 'converted' && i.converted_case_status === 'closed'   ? 'case_closed' :
                       i.status === 'converted' && i.converted_case_status === 'invalid'  ? 'case_invalid' :
                       i.status;
    const salesBadge  = i.sales_name  ? `<span style="padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600;background:#ede9fe;color:#6d28d9">${escHtml(i.sales_name)}</span>` : '';
    const csBadge     = i.cs_name     ? `<span style="padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600;background:#fee2e2;color:#991b1b">${escHtml(i.cs_name)}</span>` : '';
    const sourceBadge = i.add_source  ? `<span style="padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600;background:#d1fae5;color:#065f46">${escHtml(i.add_source)}</span>` : '';
    const branchBadge = i.org_type === 'branch' && i.org_name ? `<span style="padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa">${escHtml(i.org_name)}</span>` : '';
    return `
    <div class="inq-card${i.id === currentId ? ' selected' : ''}" onclick="openInquiry(${i.id})">
      <div class="ic-name">
        ${escHtml(i.display_name || 'LINE用戶')}
        <span class="s-badge s-${dispStatus}">${sLabel(dispStatus)}</span>
        ${branchBadge}
        ${i.message_count > 1 ? `<span style="font-size:11px;color:var(--gray-400)">${i.message_count} 則</span>` : ''}
      </div>
      <div class="ic-snippet">${escHtml(i.last_message || '')}</div>
      <div class="ic-meta">
        <span>${escHtml(i.phone || '')}</span>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
          ${sourceBadge ? `<div>${sourceBadge}</div>` : ''}
          ${salesBadge || csBadge ? `<div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end">${salesBadge}${csBadge}</div>` : ''}
          <span>${fmtTime(i.last_message_at)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── 詳情 ──────────────────────────────────────────────────
async function openInquiry(id) {
  currentId = id;
  renderList();

  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--gray-400)">載入中…</div>`;

  let data = null, httpStatus = null;
  try {
    const r = await fetch(`/api/line-inquiries/${id}`);
    httpStatus = r.status;
    if (r.ok) data = await r.json().catch(() => null);
  } catch (e) { /* network error */ }
  if (!data) {
    panel.innerHTML = `<div style="padding:24px;color:#dc2626">
      載入失敗${httpStatus ? `（HTTP ${httpStatus}）` : '（網路錯誤）'}
      <button class="btn btn-ghost btn-sm" style="margin-left:10px" onclick="openInquiry(${id})">重試</button>
    </div>`;
    return;
  }

  const salesOpts = allUsers
    .filter(u => !['hq_tech','branch_tech','contractor_install'].includes(u.role))
    .map(u => `<option value="${u.id}"${data.sales_id == u.id ? ' selected' : ''}>${escHtml(u.name)}</option>`).join('');
  const csOpts = allUsers
    .filter(u => ['hq_cs','hq_cs_manager','hq_accounting','owner','vp'].includes(u.role))
    .map(u => `<option value="${u.id}"${data.cs_id == u.id ? ' selected' : ''}>${escHtml(u.name)}</option>`).join('');

  panel.innerHTML = `
    <div class="det-header">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:16px;font-weight:700;color:var(--gray-900)">${escHtml(data.display_name || 'LINE用戶')}</span>
          ${data.org_type === 'branch' && data.org_name ? `<span style="padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa">${escHtml(data.org_name)}</span>` : ''}
          ${data.add_source ? `<span style="padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:#dbeafe;color:#1e40af">${escHtml(data.add_source)}</span>` : ''}
        </div>
        <div style="font-size:12px;color:var(--gray-500);margin-top:2px">
          建立：${fmtTime(data.created_at)}　共 ${data.message_count} 則訊息
          <span class="s-badge s-${data.status}" style="margin-left:6px">${sLabel(data.status)}</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:11px;color:var(--gray-500);white-space:nowrap">負責業務</span>
            <select id="inq-sales" onchange="saveSalesCs(${id})" style="padding:3px 6px;border:1px solid #c4b5fd;border-radius:6px;font-size:12px;background:#faf5ff;color:#6d28d9">
              <option value="">（未指定）</option>${salesOpts}
            </select>
          </div>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:11px;color:var(--gray-500);white-space:nowrap">負責客服</span>
            <select id="inq-cs" onchange="saveSalesCs(${id})" style="padding:3px 6px;border:1px solid #fca5a5;border-radius:6px;font-size:12px;background:#fff5f5;color:#991b1b">
              <option value="">（未指定）</option>${csOpts}
            </select>
          </div>
        </div>
      </div>
      <div class="det-actions">
        ${data.status !== 'in_progress' && data.status !== 'converted'
          ? `<button class="btn btn-ghost btn-sm" onclick="setStatus(${id},'in_progress')">標記進行中</button>` : ''}
        ${data.status !== 'converted'
          ? `<button class="btn btn-primary btn-sm" onclick="openConvert(${id})">轉為案件</button>`
          : `<a href="/case-detail?id=${data.converted_case_id}" target="_blank" class="btn btn-ghost btn-sm">查看案件 ${escHtml(data.converted_case_number||'')} ↗</a>`}
        ${data.status !== 'invalid' && data.status !== 'converted'
          ? `<button class="btn btn-sm" style="background:#fee2e2;color:#991b1b;border:none;cursor:pointer" onclick="setStatus(${id},'invalid')">標記無效</button>` : ''}
        ${data.status === 'hidden'
          ? `<button class="btn btn-ghost btn-sm" onclick="setStatus(${id},'new')">取消隱藏</button>`
          : data.status !== 'converted' && data.status !== 'invalid'
            ? `<button class="btn btn-ghost btn-sm" onclick="setStatus(${id},'hidden')">隱藏</button>` : ''}
        ${data.status === 'converted' || data.status === 'invalid'
          ? `<button class="btn btn-sm" style="background:#fee2e2;color:#991b1b;border:none;cursor:pointer" onclick="deleteInquiry(${id})">刪除</button>` : ''}
      </div>
    </div>

    <div class="det-client">
      <div style="font-size:12px;font-weight:600;color:var(--gray-700)">客戶資料</div>
      <div class="client-grid">
        <div class="cf"><label>官方 LINE 顯示名稱（手動輸入）</label><input id="cf-name" value="${escHtml(data.display_name||'')}" placeholder="LINE 顯示名稱"></div>
        <div class="cf"><label>電話</label><input id="cf-phone"   value="${escHtml(data.phone||'')}"        placeholder="聯絡電話"></div>
        <div class="cf"><label>LINE 客戶顯示名稱</label><input value="${escHtml(data.line_original_name||data.display_name||'')}" readonly style="background:var(--gray-50);color:var(--gray-500);cursor:default"></div>
        <div class="cf"><label>Email</label><input id="cf-email"  value="${escHtml(data.email||'')}"        placeholder="電子信箱"></div>
        <div class="cf"><label>地址</label><input id="cf-address" value="${escHtml(data.address||'')}"      placeholder="施工地址"></div>
      </div>
      <button class="btn btn-sm btn-primary" style="margin-top:8px" onclick="saveClient(${id})">儲存資料</button>
    </div>

    <div class="chat-area" id="chatArea">
      ${renderMessages(data.messages)}
    </div>

    ${data.status !== 'converted' && data.status !== 'invalid' ? `
    <div class="reply-box">
      <textarea class="reply-ta" id="replyInput" placeholder="輸入訊息，Enter 傳送，Shift+Enter 換行…" rows="1"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply(${id})}"
      ></textarea>
      <button class="btn btn-primary btn-sm" onclick="sendReply(${id})">傳送</button>
    </div>` : `
    <div style="padding:9px 16px;font-size:12px;color:var(--gray-400);border-top:1px solid var(--gray-200);text-align:center;background:#fff">
      此詢問已${sLabel(data.status)}，不可回覆
    </div>`}

    <div class="note-section">
      <div style="font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:4px">內部備註</div>
      <textarea class="form-control" id="noteInput" rows="2" style="width:100%;font-size:13px;resize:vertical;box-sizing:border-box">${escHtml(data.staff_note||'')}</textarea>
      <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="saveNote(${id})">儲存備註</button>
    </div>
  `;
  scrollChat();
}

function renderMessages(msgs) {
  if (!msgs?.length)
    return `<div style="text-align:center;color:var(--gray-400);font-size:13px;padding:20px">尚無訊息記錄</div>`;
  return msgs.map(m => `
    <div class="msg-row ${m.direction}">
      <div style="display:flex;flex-direction:column;${m.direction==='out'?'align-items:flex-end':''}">
        ${m.direction === 'out' ? `<div class="msg-sender">${escHtml(m.sender_name||'客服')}</div>` : ''}
        <div class="msg-bubble">${escHtml(m.content||'')}</div>
        <div class="msg-time">${fmtTime(m.created_at)}</div>
      </div>
    </div>
  `).join('');
}

function scrollChat() {
  const el = document.getElementById('chatArea');
  if (el) setTimeout(() => el.scrollTop = el.scrollHeight, 50);
}

// ── 動作 ──────────────────────────────────────────────────
async function setStatus(id, status) {
  await fetch(`/api/line-inquiries/${id}/status`, {
    method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ status })
  });
  loadStats(); loadList(); openInquiry(id);
}

async function deleteInquiry(id) {
  if (!confirm('確定要刪除這筆詢問記錄？此操作無法還原。')) return;
  const res = await fetch(`/api/line-inquiries/${id}`, { method: 'DELETE' });
  if (res.ok) {
    showToast('詢問記錄已刪除');
    document.getElementById('detailPanel').innerHTML = `<div class="inq-empty"><span style="font-size:14px">已刪除</span></div>`;
    currentId = null;
    loadStats(); loadList();
  } else {
    const d = await res.json().catch(() => ({}));
    showToast(d.error || '刪除失敗', 'error');
  }
}

async function saveClient(id) {
  await fetch(`/api/line-inquiries/${id}/client`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      name:    document.getElementById('cf-name')?.value,
      phone:   document.getElementById('cf-phone')?.value,
      email:   document.getElementById('cf-email')?.value,
      address: document.getElementById('cf-address')?.value,
    })
  });
  showToast('客戶資料已儲存');
  loadList();
}

async function saveNote(id) {
  await fetch(`/api/line-inquiries/${id}/note`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ note: document.getElementById('noteInput')?.value || '' })
  });
  showToast('備註已儲存');
}

async function sendReply(id) {
  const input = document.getElementById('replyInput');
  const message = input?.value?.trim();
  if (!message) return;

  const btn = document.querySelector('.reply-box .btn');
  if (btn) { btn.disabled = true; btn.textContent = '傳送中…'; }

  const r = await fetch(`/api/line-inquiries/${id}/reply`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ message })
  });
  if (btn) { btn.disabled = false; btn.textContent = '傳送'; }

  if (r.ok) {
    if (input) { input.value = ''; input.style.height = 'auto'; }
    openInquiry(id);
  } else {
    const err = await r.json().catch(() => ({}));
    showToast(err.error || '傳送失敗', 'error');
  }
}

// ── 指派負責業務 / 負責客服 ───────────────────────────────
async function saveSalesCs(id) {
  const sales_id = document.getElementById('inq-sales')?.value || null;
  const cs_id    = document.getElementById('inq-cs')?.value    || null;
  await fetch(`/api/line-inquiries/${id}/assign`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sales_id: sales_id || null, cs_id: cs_id || null })
  });
  loadList();
}

// ── 轉案 ──────────────────────────────────────────────────
let convertTargetId = null;
function openConvert(id) {
  convertTargetId = id;
  document.getElementById('convertTitle').value = '';
  document.getElementById('convertNotes').value = '';
  document.getElementById('convertModal').classList.add('open');
}
function closeConvert() {
  document.getElementById('convertModal').classList.remove('open');
}
async function doConvert() {
  const id = convertTargetId;
  if (!id) return;
  const r = await fetch(`/api/line-inquiries/${id}/convert`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      case_type: document.getElementById('convertType').value,
      title:     document.getElementById('convertTitle').value.trim(),
      notes:     document.getElementById('convertNotes').value.trim(),
    })
  });
  if (r.ok) {
    const d = await r.json();
    closeConvert();
    showToast(`已轉為案件 ${d.case_number}`);
    loadStats(); loadList(); openInquiry(id);
  } else {
    const err = await r.json().catch(() => ({}));
    showToast(err.error || '轉案失敗', 'error');
  }
}

// ── 工具 ──────────────────────────────────────────────────
function sLabel(s) {
  return { new:'新詢問', in_progress:'進行中', converted:'已轉案', invalid:'無效', hidden:'已隱藏', case_closed:'結案', case_invalid:'已轉案(無效)' }[s] || s;
}
function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts.replace(' ','T') + (ts.includes('T') && ts.includes('Z') ? '' : 'Z'));
  if (isNaN(d)) return ts;
  const diff = Date.now() - d;
  if (diff < 60000)    return '剛剛';
  if (diff < 3600000)  return `${Math.floor(diff/60000)} 分鐘前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)} 小時前`;
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

init();

// 每 30 秒自動刷新清單 + badge（多人協作跨裝置同步）
setInterval(() => { loadStats(); loadList(); }, 30000);
</script>
