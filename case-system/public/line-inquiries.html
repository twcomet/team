<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE OA 詢問管理 — 繪新管理系統</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .inq-layout   { display:flex; gap:0; height:calc(100vh - 56px); overflow:hidden; }
    .inq-list     { width:340px; min-width:280px; border-right:1px solid #e5e7eb; display:flex; flex-direction:column; flex-shrink:0; }
    .inq-detail   { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    /* ── 左側工具列 ── */
    .inq-toolbar  { padding:12px; border-bottom:1px solid #e5e7eb; display:flex; flex-direction:column; gap:8px; background:#fff; }
    .inq-search   { width:100%; padding:7px 10px; border:1px solid #d1d5db; border-radius:8px; font-size:13px; }
    .status-tabs  { display:flex; gap:4px; flex-wrap:wrap; }
    .status-tab   { padding:4px 10px; border-radius:20px; border:1px solid #d1d5db; font-size:12px; cursor:pointer; background:#fff; color:#374151; transition:all .15s; }
    .status-tab.active { background:#1a56db; color:#fff; border-color:#1a56db; }
    .status-tab .cnt  { margin-left:3px; font-size:11px; opacity:.7; }

    /* ── 詢問卡片 ── */
    .inq-scroll   { flex:1; overflow-y:auto; }
    .inq-card     { padding:12px 14px; border-bottom:1px solid #f3f4f6; cursor:pointer; transition:background .12s; }
    .inq-card:hover { background:#f9fafb; }
    .inq-card.selected { background:#eff6ff; border-left:3px solid #1a56db; }
    .inq-card .name    { font-size:13px; font-weight:600; color:#111827; display:flex; align-items:center; gap:6px; }
    .inq-card .snippet { font-size:12px; color:#6b7280; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .inq-card .meta    { font-size:11px; color:#9ca3af; margin-top:4px; display:flex; align-items:center; gap:8px; }
    .badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:500; }
    .badge-new        { background:#dcfce7; color:#166534; }
    .badge-in_progress{ background:#dbeafe; color:#1e40af; }
    .badge-converted  { background:#f3f4f6; color:#374151; }
    .badge-invalid    { background:#fee2e2; color:#991b1b; }
    .badge-hidden     { background:#fef9c3; color:#713f12; }

    /* ── 右側：空狀態 ── */
    .inq-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#9ca3af; gap:12px; }
    .inq-empty svg { width:56px; height:56px; opacity:.4; }

    /* ── 右側：詳情標題列 ── */
    .detail-header { padding:14px 20px; border-bottom:1px solid #e5e7eb; background:#fff; display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .detail-header .dh-name  { font-size:16px; font-weight:700; color:#111827; }
    .detail-header .dh-meta  { font-size:12px; color:#6b7280; margin-top:2px; }
    .detail-actions { margin-left:auto; display:flex; gap:8px; }
    .btn-sm { padding:6px 14px; border-radius:8px; font-size:13px; cursor:pointer; border:1px solid transparent; }
    .btn-primary  { background:#1a56db; color:#fff; }
    .btn-primary:hover { background:#1e429f; }
    .btn-success  { background:#16a34a; color:#fff; }
    .btn-success:hover { background:#15803d; }
    .btn-danger   { background:#dc2626; color:#fff; }
    .btn-danger:hover  { background:#b91c1c; }
    .btn-outline  { background:#fff; color:#374151; border-color:#d1d5db; }
    .btn-outline:hover { background:#f9fafb; }
    .btn-yellow   { background:#f59e0b; color:#fff; }
    .btn-yellow:hover  { background:#d97706; }

    /* ── 右側：客戶資訊 ── */
    .detail-client { padding:12px 20px; background:#f9fafb; border-bottom:1px solid #e5e7eb; flex-shrink:0; }
    .client-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .client-field { display:flex; flex-direction:column; gap:2px; }
    .client-field label { font-size:11px; color:#6b7280; font-weight:500; }
    .client-field input { padding:5px 8px; border:1px solid #d1d5db; border-radius:6px; font-size:13px; background:#fff; }
    .client-field input:focus { outline:none; border-color:#1a56db; }
    .save-client-btn { margin-top:8px; padding:5px 14px; border-radius:6px; font-size:12px; background:#1a56db; color:#fff; border:none; cursor:pointer; }

    /* ── 對話區域 ── */
    .chat-area { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:10px; background:#f3f4f6; }
    .msg-row   { display:flex; align-items:flex-end; gap:8px; }
    .msg-row.out { flex-direction:row-reverse; }
    .msg-bubble { max-width:65%; padding:10px 14px; border-radius:12px; font-size:13px; line-height:1.5; word-break:break-word; }
    .msg-row.in  .msg-bubble { background:#fff; color:#111827; border-radius:4px 12px 12px 12px; box-shadow:0 1px 2px rgba(0,0,0,.06); }
    .msg-row.out .msg-bubble { background:#1a56db; color:#fff; border-radius:12px 4px 12px 12px; }
    .msg-time { font-size:11px; color:#9ca3af; flex-shrink:0; }
    .msg-sender { font-size:11px; color:#6b7280; margin-bottom:2px; }

    /* ── 回覆框 ── */
    .reply-box { padding:12px 16px; background:#fff; border-top:1px solid #e5e7eb; display:flex; gap:8px; align-items:flex-end; flex-shrink:0; }
    .reply-textarea { flex:1; padding:8px 12px; border:1px solid #d1d5db; border-radius:8px; font-size:13px; resize:none; min-height:40px; max-height:120px; font-family:inherit; }
    .reply-textarea:focus { outline:none; border-color:#1a56db; }
    .reply-send { padding:8px 16px; background:#1a56db; color:#fff; border:none; border-radius:8px; font-size:13px; cursor:pointer; flex-shrink:0; }
    .reply-send:hover { background:#1e429f; }

    /* ── 備註 ── */
    .note-section { padding:12px 20px; background:#fff; border-top:1px solid #e5e7eb; flex-shrink:0; }
    .note-label { font-size:12px; font-weight:600; color:#374151; margin-bottom:4px; }
    .note-textarea { width:100%; padding:8px 10px; border:1px solid #d1d5db; border-radius:8px; font-size:13px; resize:vertical; min-height:56px; font-family:inherit; box-sizing:border-box; }
    .note-textarea:focus { outline:none; border-color:#1a56db; }
    .note-save { margin-top:6px; padding:5px 14px; border-radius:6px; font-size:12px; background:#374151; color:#fff; border:none; cursor:pointer; }

    /* ── 轉案 Modal ── */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; display:flex; align-items:center; justify-content:center; }
    .modal    { background:#fff; border-radius:12px; padding:28px; width:420px; max-width:95vw; box-shadow:0 20px 60px rgba(0,0,0,.2); }
    .modal h3 { margin:0 0 16px; font-size:16px; font-weight:700; }
    .modal label { display:block; font-size:13px; font-weight:500; color:#374151; margin-bottom:4px; }
    .modal select, .modal input, .modal textarea { width:100%; padding:8px 10px; border:1px solid #d1d5db; border-radius:8px; font-size:13px; margin-bottom:12px; font-family:inherit; box-sizing:border-box; }
    .modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }

    .loading-dots { display:inline-flex; gap:3px; }
    .loading-dots span { width:6px; height:6px; border-radius:50%; background:#9ca3af; animation:dot 1.2s infinite; }
    .loading-dots span:nth-child(2) { animation-delay:.2s; }
    .loading-dots span:nth-child(3) { animation-delay:.4s; }
    @keyframes dot { 0%,80%,100% { opacity:.2; } 40% { opacity:1; } }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2><img src="/logo.png" style="height:28px;width:28px;object-fit:contain;filter:brightness(0) invert(1);margin-right:8px;flex-shrink:0"> 繪新管理系統</h2>
      <p id="sidebarOrgName"></p>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" data-page="dashboard"      href="/dashboard">  <span class="icon">📊</span>總覽</a>
      <a class="nav-item" data-page="cases"          href="/cases">      <span class="icon">📋</span>案件管理</a>
      <a class="nav-item active" data-page="line-inquiries" href="/line-inquiries"><span class="icon">💬</span>LINE 詢問</a>
      <a class="nav-item" data-page="clients"        href="/clients">    <span class="icon">👥</span>客戶管理</a>
      <a class="nav-item" data-page="calendar"       href="/calendar">   <span class="icon">📅</span>派單行事曆</a>
      <a class="nav-item" data-page="payments"       href="/payments">   <span class="icon">💰</span>收款追蹤</a>
      <a class="nav-item" data-page="materials"      href="/materials">  <span class="icon">🎞️</span>膜料管理</a>
      <a class="nav-item" data-page="reports"        href="/reports">    <span class="icon">📈</span>財務報表</a>
      <a class="nav-item" data-page="admin"          href="/admin" data-admin-only><span class="icon">⚙️</span>人員管理</a>
    </nav>
    <div style="padding:16px;margin-top:auto">
      <div style="font-size:13px;font-weight:600;color:#fff;margin-bottom:2px" id="sidebarUserName"></div>
      <div style="font-size:12px;color:rgba(255,255,255,.6)" id="sidebarUserRole"></div>
      <button id="logoutBtn" style="margin-top:12px;padding:6px 14px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:none;color:#fff;font-size:12px;cursor:pointer;width:100%">登出</button>
    </div>
  </aside>

  <div class="main-area" style="overflow:hidden;display:flex;flex-direction:column;">
    <div class="top-bar">
      <div class="top-bar-title">LINE OA 詢問管理</div>
    </div>

    <div class="inq-layout">
      <!-- ── 左側：詢問清單 ── -->
      <div class="inq-list">
        <div class="inq-toolbar">
          <input class="inq-search" id="searchInput" type="text" placeholder="搜尋姓名、訊息…">
          <div class="status-tabs" id="statusTabs">
            <button class="status-tab active" data-status="all">全部 <span class="cnt" id="cnt-all"></span></button>
            <button class="status-tab" data-status="new">新詢問 <span class="cnt" id="cnt-new"></span></button>
            <button class="status-tab" data-status="in_progress">進行中 <span class="cnt" id="cnt-in_progress"></span></button>
            <button class="status-tab" data-status="converted">已轉案 <span class="cnt" id="cnt-converted"></span></button>
            <button class="status-tab" data-status="invalid">無效 <span class="cnt" id="cnt-invalid"></span></button>
            <button class="status-tab" data-status="hidden">已隱藏 <span class="cnt" id="cnt-hidden"></span></button>
          </div>
        </div>
        <div class="inq-scroll" id="inqScroll">
          <div style="padding:24px;text-align:center;color:#9ca3af;font-size:13px">載入中…</div>
        </div>
      </div>

      <!-- ── 右側：詳情 ── -->
      <div class="inq-detail" id="detailPanel">
        <div class="inq-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z" />
          </svg>
          <span>點選左側詢問查看詳情</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 轉案 Modal -->
<div class="modal-bg" id="convertModal" style="display:none">
  <div class="modal">
    <h3>轉換為案件</h3>
    <label>案件類型</label>
    <select id="convertType">
      <option value="home">居家</option>
      <option value="commercial">商空</option>
      <option value="elevator">電梯</option>
      <option value="glass">玻璃</option>
      <option value="extra">外快</option>
      <option value="other" selected>其他</option>
    </select>
    <label>案件標題（選填，空白自動產生）</label>
    <input id="convertTitle" type="text" placeholder="LINE詢問｜客戶姓名">
    <label>說明（選填）</label>
    <textarea id="convertNotes" rows="3" placeholder="從詢問訊息帶入"></textarea>
    <div class="modal-footer">
      <button class="btn-sm btn-outline" onclick="closeConvert()">取消</button>
      <button class="btn-sm btn-success" onclick="doConvert()">確認轉案</button>
    </div>
  </div>
</div>

<script src="/auth-check.js"></script>
<script>
let currentStatus = 'all';
let currentId     = null;
let searchTimer   = null;
let inquiries     = [];

// ── 初始化 ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadStats();
  loadList();

  document.getElementById('statusTabs').addEventListener('click', e => {
    const tab = e.target.closest('.status-tab');
    if (!tab) return;
    document.querySelectorAll('.status-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentStatus = tab.dataset.status;
    loadList();
  });

  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadList, 280);
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    location.href = '/';
  });
});

// ── 載入統計 ───────────────────────────────────────────────
async function loadStats() {
  const s = await fetch('/api/line-inquiries/stats').then(r => r.json()).catch(() => ({}));
  const total = Object.values(s).reduce((a, b) => a + b, 0);
  const el = id => document.getElementById(id);
  el('cnt-all').textContent       = total || '';
  el('cnt-new').textContent       = s.new || '';
  el('cnt-in_progress').textContent = s.in_progress || '';
  el('cnt-converted').textContent = s.converted || '';
  el('cnt-invalid').textContent   = s.invalid || '';
  el('cnt-hidden').textContent    = s.hidden || '';
}

// ── 載入清單 ───────────────────────────────────────────────
async function loadList() {
  const q = document.getElementById('searchInput').value.trim();
  const params = new URLSearchParams({ limit: 100, page: 1 });
  if (currentStatus !== 'all') params.set('status', currentStatus);
  if (q) params.set('q', q);

  const data = await fetch(`/api/line-inquiries?${params}`).then(r => r.json()).catch(() => ({ rows: [] }));
  inquiries = data.rows || [];
  renderList();
}

function renderList() {
  const el = document.getElementById('inqScroll');
  if (!inquiries.length) {
    el.innerHTML = `<div style="padding:32px;text-align:center;color:#9ca3af;font-size:13px">沒有符合的詢問</div>`;
    return;
  }
  el.innerHTML = inquiries.map(i => `
    <div class="inq-card ${i.id === currentId ? 'selected' : ''}" onclick="openInquiry(${i.id})">
      <div class="name">
        ${escHtml(i.display_name || 'LINE用戶')}
        <span class="badge badge-${i.status}">${statusLabel(i.status)}</span>
        ${i.message_count > 1 ? `<span style="font-size:11px;color:#6b7280;font-weight:400">${i.message_count} 則</span>` : ''}
      </div>
      <div class="snippet">${escHtml(i.last_message || '')}</div>
      <div class="meta">
        <span>${i.phone || ''}</span>
        <span style="margin-left:auto">${fmtTime(i.last_message_at)}</span>
      </div>
    </div>
  `).join('');
}

// ── 開啟詢問詳情 ──────────────────────────────────────────
async function openInquiry(id) {
  currentId = id;
  renderList(); // update selected state

  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center"><div class="loading-dots"><span></span><span></span><span></span></div></div>`;

  const data = await fetch(`/api/line-inquiries/${id}`).then(r => r.json()).catch(() => null);
  if (!data) { panel.innerHTML = `<div style="padding:24px;color:#dc2626">載入失敗</div>`; return; }

  panel.innerHTML = `
    <!-- header -->
    <div class="detail-header">
      <div>
        <div class="dh-name">${escHtml(data.display_name || 'LINE用戶')}</div>
        <div class="dh-meta">建立：${fmtTime(data.created_at)}　共 ${data.message_count} 則訊息</div>
      </div>
      <div class="detail-actions">
        ${data.status !== 'in_progress' && data.status !== 'converted' ? `<button class="btn-sm btn-outline" onclick="setStatus(${id},'in_progress')">標記進行中</button>` : ''}
        ${data.status !== 'converted' ? `<button class="btn-sm btn-success" onclick="openConvert(${id})">轉為案件</button>` : `<a href="/case-detail?id=${data.converted_case_id}" target="_blank" class="btn-sm btn-outline">查看案件 ${escHtml(data.converted_case_number||'')}</a>`}
        ${data.status !== 'invalid' && data.status !== 'converted' ? `<button class="btn-sm btn-danger" onclick="setStatus(${id},'invalid')">標記無效</button>` : ''}
        ${data.status !== 'hidden' ? `<button class="btn-sm btn-yellow" onclick="setStatus(${id},'hidden')">隱藏</button>` : `<button class="btn-sm btn-outline" onclick="setStatus(${id},'new')">取消隱藏</button>`}
      </div>
    </div>

    <!-- 客戶資料 -->
    <div class="detail-client">
      <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px">客戶資料</div>
      <div class="client-grid">
        <div class="client-field">
          <label>姓名</label>
          <input id="cf-name" value="${escHtml(data.display_name||'')}" placeholder="LINE 顯示名稱">
        </div>
        <div class="client-field">
          <label>電話</label>
          <input id="cf-phone" value="${escHtml(data.phone||'')}" placeholder="聯絡電話">
        </div>
        <div class="client-field">
          <label>Email</label>
          <input id="cf-email" value="${escHtml(data.email||'')}" placeholder="電子信箱">
        </div>
        <div class="client-field">
          <label>地址</label>
          <input id="cf-address" value="${escHtml(data.address||'')}" placeholder="施工地址">
        </div>
      </div>
      <button class="save-client-btn" onclick="saveClient(${id})">儲存資料</button>
    </div>

    <!-- 對話記錄 -->
    <div class="chat-area" id="chatArea">
      ${renderMessages(data.messages)}
    </div>

    <!-- 回覆框（已轉案或無效時隱藏） -->
    ${data.status !== 'converted' && data.status !== 'invalid' ? `
    <div class="reply-box">
      <textarea class="reply-textarea" id="replyInput" placeholder="輸入要傳給客戶的訊息…" rows="1"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply(${id})}"
      ></textarea>
      <button class="reply-send" onclick="sendReply(${id})">傳送</button>
    </div>` : `<div style="padding:10px 16px;font-size:12px;color:#9ca3af;border-top:1px solid #e5e7eb;text-align:center">此詢問已${statusLabel(data.status)}，不可回覆</div>`}

    <!-- 備註 -->
    <div class="note-section">
      <div class="note-label">內部備註</div>
      <textarea class="note-textarea" id="noteInput">${escHtml(data.staff_note||'')}</textarea>
      <button class="note-save" onclick="saveNote(${id})">儲存備註</button>
    </div>
  `;

  scrollChat();
}

function renderMessages(msgs) {
  if (!msgs || !msgs.length)
    return `<div style="text-align:center;color:#9ca3af;font-size:13px;padding:20px">尚無訊息記錄</div>`;
  return msgs.map(m => `
    <div class="msg-row ${m.direction}">
      <div style="display:flex;flex-direction:column;${m.direction==='out'?'align-items:flex-end':''}">
        ${m.direction==='out' ? `<div class="msg-sender">${escHtml(m.sender_name||'客服')}</div>` : ''}
        <div class="msg-bubble">${escHtml(m.content||'')}</div>
        <div class="msg-time">${fmtTime(m.created_at)}</div>
      </div>
    </div>
  `).join('');
}

function scrollChat() {
  const el = document.getElementById('chatArea');
  if (el) el.scrollTop = el.scrollHeight;
}

// ── 動作 ──────────────────────────────────────────────────
async function setStatus(id, status) {
  await fetch(`/api/line-inquiries/${id}/status`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  loadStats();
  loadList();
  openInquiry(id);
}

async function saveClient(id) {
  const body = {
    name:    document.getElementById('cf-name')?.value,
    phone:   document.getElementById('cf-phone')?.value,
    email:   document.getElementById('cf-email')?.value,
    address: document.getElementById('cf-address')?.value,
  };
  await fetch(`/api/line-inquiries/${id}/client`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  showToast('客戶資料已儲存');
  loadList();
}

async function saveNote(id) {
  const note = document.getElementById('noteInput')?.value || '';
  await fetch(`/api/line-inquiries/${id}/note`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ note })
  });
  showToast('備註已儲存');
}

async function sendReply(id) {
  const input = document.getElementById('replyInput');
  const message = input?.value?.trim();
  if (!message) return;

  const btn = document.querySelector('.reply-send');
  if (btn) { btn.disabled = true; btn.textContent = '傳送中…'; }

  const r = await fetch(`/api/line-inquiries/${id}/reply`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message })
  });

  if (btn) { btn.disabled = false; btn.textContent = '傳送'; }

  if (r.ok) {
    if (input) { input.value = ''; input.style.height = 'auto'; }
    openInquiry(id); // refresh chat
  } else {
    const err = await r.json().catch(() => ({}));
    alert(`傳送失敗：${err.error || r.status}`);
  }
}

// ── 轉案 ──────────────────────────────────────────────────
let convertTargetId = null;
function openConvert(id) {
  convertTargetId = id;
  document.getElementById('convertModal').style.display = 'flex';
  document.getElementById('convertTitle').value = '';
  document.getElementById('convertNotes').value = '';
}
function closeConvert() {
  document.getElementById('convertModal').style.display = 'none';
}
async function doConvert() {
  const id = convertTargetId;
  if (!id) return;
  const body = {
    case_type: document.getElementById('convertType').value,
    title:     document.getElementById('convertTitle').value.trim(),
    notes:     document.getElementById('convertNotes').value.trim(),
  };
  const r = await fetch(`/api/line-inquiries/${id}/convert`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (r.ok) {
    const d = await r.json();
    closeConvert();
    showToast(`已轉為案件 ${d.case_number}`);
    loadStats();
    loadList();
    openInquiry(id);
  } else {
    const err = await r.json().catch(() => ({}));
    alert(`轉案失敗：${err.error || r.status}`);
  }
}

// ── 工具函式 ──────────────────────────────────────────────
function statusLabel(s) {
  return { new:'新詢問', in_progress:'進行中', converted:'已轉案', invalid:'無效', hidden:'已隱藏' }[s] || s;
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts.replace(' ', 'T'));
  if (isNaN(d)) return ts;
  const now = new Date();
  const diff = now - d;
  if (diff < 60000)  return '剛剛';
  if (diff < 3600000) return `${Math.floor(diff/60000)} 分鐘前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)} 小時前`;
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${mm}/${dd} ${hh}:${mi}`;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;pointer-events:none;transition:opacity .3s';
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
}
</script>
