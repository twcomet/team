<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 360" width="420" height="360" role="img" aria-label="繪新 TWCOMET 完整標誌">
  <defs>
    <!-- Neon glow for triangle -->
    <filter id="tri-neon" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Pink glow for text -->
    <filter id="text-glow" x="-15%" y="-20%" width="130%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Dot glow -->
    <filter id="dot-g" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Triangle stroke gradient -->
    <linearGradient id="tg" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF3399"/>
      <stop offset="60%"  stop-color="#FF0080"/>
      <stop offset="100%" stop-color="#CC0066"/>
    </linearGradient>
    <!-- Chrome metallic gradient for 繪新 text (vertical) -->
    <linearGradient id="chrome-text" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D8EEFF"/>
      <stop offset="25%"  stop-color="#A8C8F8"/>
      <stop offset="55%"  stop-color="#8868D8"/>
      <stop offset="80%"  stop-color="#9848A8"/>
      <stop offset="100%" stop-color="#C040A0"/>
    </linearGradient>
    <!-- Chrome gradient for TWCOMET (subtle) -->
    <linearGradient id="chrome-en" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C0D8F8"/>
      <stop offset="50%"  stop-color="#9070CC"/>
      <stop offset="100%" stop-color="#C050A0"/>
    </linearGradient>
    <!-- Neon pink fill for glow duplicate -->
    <linearGradient id="glow-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF80C0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF0080" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- ── Triangle element ─────────────────────────────────── -->
  <!-- Outer triangle glow -->
  <polygon points="320,35 50,295 368,225"
    fill="none" stroke="#FF0080" stroke-width="5"
    filter="url(#tri-neon)" opacity="0.7"/>

  <!-- Outer triangle crisp -->
  <polygon points="320,35 50,295 368,225"
    fill="none" stroke="url(#tg)" stroke-width="2.2"
    stroke-linejoin="round"/>

  <!-- Inner triangle — double-line -->
  <polygon points="308,52 66,283 356,216"
    fill="none" stroke="#FF99CC" stroke-width="1.1"
    stroke-linejoin="round" opacity="0.65"/>

  <!-- Decorative corner squares -->
  <g filter="url(#dot-g)">
    <!-- Apex upper-right -->
    <rect x="325" y="24" width="9" height="9" rx="1.5" fill="#FF0080" transform="rotate(20,329.5,28.5)"/>
    <rect x="338" y="38" width="5" height="5" rx="1"   fill="#FF5CAD" opacity="0.85"/>
    <!-- Bottom-left -->
    <rect x="37"  y="292" width="8" height="8" rx="1.5" fill="#FF0080" transform="rotate(15,41,296)"/>
    <rect x="50"  y="305" width="5" height="5" rx="1"   fill="#FF5CAD" opacity="0.8"/>
    <!-- Bottom-right -->
    <rect x="372" y="228" width="8" height="8" rx="1.5" fill="#FF0080" transform="rotate(-10,376,232)"/>
    <rect x="363" y="242" width="5" height="5" rx="1"   fill="#FF5CAD" opacity="0.8"/>
  </g>
  <!-- Mid-edge dots -->
  <g filter="url(#dot-g)" opacity="0.65">
    <circle cx="185" cy="165" r="3.5" fill="#FF5CAD"/>
    <circle cx="344" cy="130" r="2.5" fill="#FF99CC"/>
    <circle cx="210" cy="260" r="2.5" fill="#FF5CAD"/>
    <circle cx="95"  cy="194" r="2"   fill="#FF99CC"/>
  </g>

  <!-- ── 繪新 text ──────────────────────────────────────────── -->
  <!-- Pink glow layer (bloomed shadow under chrome text) -->
  <text x="210" y="222"
    font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif"
    font-size="148" font-weight="900"
    text-anchor="middle"
    fill="url(#glow-fill)"
    filter="url(#text-glow)"
    letter-spacing="4">繪新</text>

  <!-- Chrome metallic layer -->
  <text x="210" y="222"
    font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif"
    font-size="148" font-weight="900"
    text-anchor="middle"
    fill="url(#chrome-text)"
    letter-spacing="4">繪新</text>

  <!-- ── TWCOMET ─────────────────────────────────────────────── -->
  <!-- Pink glow -->
  <text x="210" y="255"
    font-family="'Orbitron','Arial Black',Arial,sans-serif"
    font-size="28" font-weight="900"
    text-anchor="middle"
    fill="#FF4499"
    filter="url(#text-glow)"
    letter-spacing="10"
    opacity="0.5">TWCOMET</text>

  <!-- Chrome -->
  <text x="210" y="255"
    font-family="'Orbitron','Arial Black',Arial,sans-serif"
    font-size="28" font-weight="900"
    text-anchor="middle"
    fill="url(#chrome-en)"
    letter-spacing="10">TWCOMET</text>
</svg>
